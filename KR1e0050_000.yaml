body:
  text: 春秋通説目録春秋類卷一隱公卷二桓公卷三莊公卷四閔公卷五僖公上卷六僖公下卷七文公卷八宣公卷九成公卷十襄公卷十一昭公卷十二定公卷十三哀公臣等謹案春秋通説十三卷宋黃仲炎撰端平初尚書李鳴復進其書於朝仲炎字若晦溫州布衣其書大意謂春秋有教有戒其教存乎書法其戒存乎事實而無褒貶蓋一掃言例之拘而毅然直攄胸臆者然如論子同生一條謂左氏因記太子生之禮并問名等語故起此事恐非經文録經者誤以傳文加之又如宋伯姬卒一條謂書卿送葬故書卒與上書宋災為兩節此類非一皆不免於好為異説至於觸類引伸旁通槩論往往涉及後代史事斷其得失亦非釋經之正體獨其文辭條暢而議論亦嚴正不茍有足取者况春秋因史以成經故凡言史者必以春秋為權度仲炎引史以證春秋而即執春秋以斷史其理亦本相通言各有當未可概以泛濫譏也乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋通説原序春秋者聖人教戒天下之書非褒貶之書也何謂教所書之法是也何謂戒所書之事是也法聖人所定也故謂之教事衰亂之迹也為戒而已矣彼三傳者不知其紀事皆以為戒也而曰有褒貶焉凡春秋書人書名或去氏或去族者貶惡也其書爵書字或稱族或稱氏者褒善也甚者如日月地名之或書或不書則皆指曰是褒貶所繫也質諸此而彼礙證諸前而後違或事同而名爵異書或罪大而族氏不削於是褒貶之例窮矣例窮而無以通之則曲為之解焉専門師授襲陋仍訛由漢以來見謂明經者不勝衆多然大抵爭辨於褒貶之異究詰於類例之疑滓重煙深莫之澄掃而春秋之大義隱矣自大義既隱而或者厭焉不知歸咎於傳業之失而曰聖人固爾也故劉知幾有虛美隱惡之謗王安石有斷爛朝報之毁遂使聖人修經之志更千數百載而弗獲伸於世豈不悲哉故曰春秋者聖人教戒天下之書非褒貶之書也昔之善論春秋者惟孟軻氏莊周氏為近之軻之説曰孔子作春秋而亂臣賊子懼是以戒言也周之説曰春秋以道名分是以教言也斯二者庶幾孔子之志也夫人之所以異於禽獸者以其有道也如是而君臣如是而父子如是而長幼男女親疏內外之差等不齊也敘此者為禮順此者為樂理此者為政防此者為刑堯舜三王之治皆是物也時乎衰周王政不行物情放肆於是紊其敘乖其順廢其理決其防而天下蕩然矣孔子有憂之而無位以行其志不得已而即吾父母國之史以明之陳覆轍所以懼後車也遏人變所以返天常也霸圖之盛王迹之熄也盟會之繁忠信之薄也雖有彼善於此者卒非治世之事也聖人何褒焉至於吳楚之陵中國臣子之姦君父鬬干戈以濟貪忿之志悖理道以傷天地之和者亦何待貶而後見其惡也若夫筆削有法而訓教存焉崇王而黜霸尊君而抑臣重內而輕外辨禮之非防亂之始畏天戒重民生為萬世立治準焉嗚呼使後之為君父為臣子為夫婦為兄弟為黨友為中國御四方者由其法戒其事則彞倫正而禍亂息矣余由童至壯研思是經嘗眩於舊説如手棼絲目暗室難於解辨蓋久而後能破之旁稽記載互參始末為書十有三卷名曰春秋通説通説者去褒貶之茅塞而通諸教戒之正途也夫春秋固有以隻字垂法者矣如加王於正削吳楚僭號而從其本爵之類是也而非字字有義也亦固有所謂例者矣如書其君殁曰薨外諸侯曰卒內大夫書卒外大夫不書卒之類是也此皆通例也先儒謂左氏非左丘明丘明乃孔子前輩故孔子云左丘明恥之丘亦恥之先丘明而後己尊之也楚左史倚相能讀三墳五典八索九邱蓋今左氏傳即楚左史也古者史世其官則傳是書者倚相之後也故左傳載楚事比他國為特詳是得其實公穀亦莫明其所自來或云子夏門人要皆非親受經於聖人者故於説經首失其義而其間亦或有得者榖梁氏爾若夫具載事實則左氏尚可考故當據事以觀經事或抵牾難於盡從則以經為斷上以伸仲尼之志雖以立異取譏於世而不辭也紹定三年五月朔黃仲炎序
