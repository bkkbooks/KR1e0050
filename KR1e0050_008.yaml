body:
  text: 春秋通説卷八宋黃仲炎撰宣公元年春王正月公即位公子遂如齊逆女三月遂以夫人婦姜至自齊宣之遂猶桓之翬也或曰譏喪娶或曰譏不親迎其猶放飯流歠而問無齒決者乎夏季孫行父如齊世謂季孫行父家無私積魯之忠臣也今觀春秋書季孫行父如齊則是附姦黨惡之輩豈得謂之忠臣哉仲爲不道殺嫡立庶舉魯國之人皆疾之使行父而忠於魯必以死爭之矣今不惟不能爭又且翼成其事當宣公篡立之初則爲之納賂於齊以請會如其所爲是亦一仲遂爾其後仲遂旣死宣公旣薨懼公孫歸父之害己而後號之人曰使我殺嫡立庶以失大援者仲也夫嗚呼當其時不能治也而嘆息於易世之後其將誰欺然則其家無私積者猶公孫𢎞之布被焉爾晉放其大夫胥甲父于衞放流放之也書曰放驩兜于崇山是也晉放其大夫胥甲父于衞放無罪也公會齊侯于平州公子遂如齊六月齊人取濟西田春秋之亂至於篡弑之紛紛者無他焉由王室不競而強大之邦力可以討賊者茍於貪賂而不顧也自強大之邦茍於貪賂而不顧使世之亂臣賊子得以賂免於是篡弑之禍始接踵於天下矣故許田入鄭而桓篡成郜鼎入魯而督罪釋濟西入齊而宣位定春秋備書于册以見利賂之禍如此其極使爲人上者必務禁絶之而後亂臣賊子有所懼而不敢動於惡矣秋邾子來朝邾自僖文之世常與魯抗今宣篡立而反朝之非畏魯乃畏齊也齊悦魯之利邾畏齊之壓而公論不復存矣此所以爲春秋之亂也楚子鄭人侵陳遂侵宋晉趙盾帥師救陳宋公陳侯衞侯曹伯會晉師于棐林伐鄭冬晉趙穿帥師侵崇崇秦之與國也左氏載晉欲求成於秦趙穿曰我侵崇秦急崇必救之吾以求成焉冬趙穿侵崇秦弗與成夫機心一動鷗鳥高飛況於人乎秦弗與成是晉人以詐失之也晉人宋人伐鄭二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元秦師伐晉夏晉人宋人衞人陳人侵鄭秋九月乙丑晉趙盾弑其君夷臯左氏載孔子曰宣子古之良大夫也爲法受惡惜也越竟乃免説者多從之謂弑君者穿而非盾也盾之不幸特以亡不越竟反不討賊受此名爾不知非孔子之言也夫春秋以弑君名趙盾者豈以天下至惡之名而加之無罪之人哉蓋趙穿之弑實趙盾主之也朱氏論此謂如司馬昭之弑高貴郷公雖非昭自下手而所以使賈充成濟之徒抽戈用命者昭也謂非昭弑可乎觀弑靈之後宣子復使趙穿逆公子黑臀于周而立之蓋盾之於穿豈特不討而已又且使之援立新君以固其位觀此則穿之弑非盾使之而誰也夫内蓄不臣之謀而外爲掩覆之迹當時之人有不能盡知者而春秋必察焉以正其名則無所逃罪矣故曰作春秋而亂臣賊子懼冬十月乙亥天王崩三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望魯郊僭禮也郊牛之口傷改卜牛牛死是於僭禮之中又知天意之不享也葬匡王楚子伐陸渾之戎楚子伐陸渾之戎遂至于雒觀兵于周疆蓋名爲伐戎實在偪周也夏楚人侵鄭秋赤狄侵齊宋師圍曹冬十月丙戌鄭伯蘭卒葬鄭穆公四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向孟子曰愛人不親反其仁治人不治反其智禮人不荅反其敬行有不獲者皆反求諸已其身正而天下歸之魯宣公挾齊侯以平莒郯之爭而莒人不肯是行有不獲者反求諸已可也怒而伐之然且不可況因以爲利乎公伐莒取向蓋負販小人之所羞爲也秦伯稻卒夏六月乙酉鄭公子歸生弑其君夷陸淳云子公弑君之賊其惡易知子家縱其爲逆罪莫大焉故書爲首惡也是不然觀左氏鄭靈公食大夫黿召子公而弗與子公怒染指於鼎嘗之而出公怒欲殺子公子公與子家謀先子家曰畜者猶憚殺之況君乎反譖子家子家懼而從之夏弑靈公子家即歸生也方子公與子家謀先子家未可則弑未成及子家旣從則弑遂成是成弑君之事全在子家豈止於縱人爲逆也哉然鄭靈公不以禮遇其臣至於食大夫黿召子公而弗與以激其怒又自怒而欲殺之爲君如此雖欲無亂亦不可得已赤狄侵齊秋公如齊公至自齊冬楚子伐鄭五年春公如齊夏公至自齊秋九月齊高固來逆叔姬左氏載春公如齊高固使齊侯止公請叔姬焉秋高固來逆女自爲也夫人所以能自立於天地閒者義而已矣茍爲不義則自視歉然惟人之畏百骸四體豈復我有哉觀魯宣公以不義得國倚強齊以自固土田薦賄玉帛造庭舉千乗之國惟齊是聽今遂見偪于齊連昏於齊之大夫而不敢違焉此孟子所謂人役者也叔孫得臣卒冬齊高固及子叔姬來齊高固脅娶魯女而挾以歸寧魯國之恥也楚人伐鄭六年春晉趙盾衞孫免侵陳夏四月秋八月螽冬十月七年春衞侯使孫良夫來盟夏公會齊侯伐萊秋公至自伐萊大旱冬公會晉侯宋公衞侯鄭伯曹伯于黑壤黒壤之會晉人止公以賂免焉蓋宣爲不義不特齊人得以無道加之而晉人亦得以無道加之也八年春公至自會夏六月公子遂如齊至黃乃復公孫敖如京師不至而復是無故而廢君命者惡而書之宜也公子遂如齊至黃有疾乃復是有故而返者何以書曰人臣奉命而出雖有疾不當復也有疾而自復猶無君命也禮未致事而死以尸將事辛巳有事于太廟或謂春秋書大事爲禘祫有事爲烝甞非也烝甞四時之常祭故春秋書丁丑烝乙亥甞不曰于某宫于某廟也惟三年一大祭故書禘于太廟或書大事于太廟其實一也案春秋閔以二年八月薨僖二年當除喪爲大祭至五年再大祭八年三大祭故經於僖八年書禘于太廟是也文十八年二月薨宣二年當除喪爲大祭至五年再大祭八年三大祭故經於宣八年書有事于太廟是也豈得謂之烝甞也哉仲遂卒于垂壬午猶繹萬入去籥辛巳有事于太廟旣卒事矣聞卿佐之喪可以無繹而繹猶不廢至於萬舞惡其聲聞而去籥焉是知其不可爲而爲之也所以見宣公薄卿佐之喪也雖然仲遂不道之臣也死而免於戮而見薄於君宜也何以書曰仲遂久專國柄作威作福雖宣公爲仲遂所立而卒不能堪焉於其生也忌之於其死也幸之故書曰仲遂卒于垂壬午猶繹明宣公無悲慼之心者由仲遂專國之所致也此所以戒人臣也戴記檀弓仲遂卒于垂壬午猶繹仲尼曰非禮也卿卒不繹此漢儒所傳爾卿卒不繹禮之常者也若夫春秋所書之意有不止此者非漢儒所能盡傳也繹者祭之明日享爲尸之人及凡執事助祭之人也穀梁子謂祭之旦日享賔是也在商謂之彤在周謂之繹萬者舞之摠名也武舞用干戚文舞用羽籥戊子夫人嬴氏卒晉師白狄伐秦楚人滅舒蓼秋七月甲子日有食之旣冬十月己丑葬我小君敬嬴雨不克葬庚寅日中而克葬喪事有進而無退凡葬未啟殯日雖吉而遇雨止可也若旣啟殯不爲雨止矣然則冐雨乎曰喪禮有所謂潦車蓑苙者蓋備雨有具也今遇雨止無備可知矣春秋書雨不克葬惡薄其親也城平陽楚師伐陳九年春王正月公如齊公至自齊夏仲孫蔑如京師齊侯伐萊秋取根牟八月滕子卒九月晉侯宋公衞侯鄭伯曹伯會于扈晉荀林父帥師伐陳辛酉晉侯黑臀卒于扈冬十月癸酉衞侯鄭卒宋人圍滕楚子伐鄭晉郤缺帥師救鄭陳殺其大夫洩冶左氏載陳靈公與孔寧儀行父通於夏姬皆衷其衵服以戲于朝洩冶諫曰公卿宣淫民無則焉公告二子二子請殺之公弗禁遂殺洩冶孔子曰詩云民之多辟無自立辟其洩冶之謂乎此非孔子之言也昔者紂爲不道微子去之箕子爲之奴比干諫而死孔子曰殷有三仁焉以比干爲仁則必不以洩冶爲非矣邦無道危行言孫此世之明哲見幾不仕而高尚者之爲也若夫有位于朝食君之禄則旣以身許國矣豈可緘黙茍容與俗俱靡以自立辟爲戒以善保身爲得哉此非所以爲人臣之訓也雖然春秋書陳殺其大夫洩冶非以罪洩冶也所以見君殺諫臣未有不喪亡者也是故桀殺龍逄而夏亡紂殺比干而殷亡觀洩冶見殺其明年靈公弑又明年楚遂縣陳可爲後世明戒矣十年春公如齊公至自齊齊人歸我濟西田奴顔事齊致其悦以歸田可恥也已夏四月丙辰日有食之己巳齊侯元卒齊崔氏出奔衞其曰崔氏惡世官也公如齊五月公至自齊癸巳陳夏徴舒弑其君平國六月宋師伐滕公孫歸父如齊葬齊惠公晉人宋人衞人曹人伐鄭秋天王使王季子來聘公孫歸父帥師伐邾取繹大水季孫行父如齊冬公孫歸父如齊齊侯使國佐來聘齊惠公卒嗣子立未踰年而以爵通於諸侯當凶釁而行吉禮無君臣父子之義矣饑楚子伐鄭十有一年春王正月夏楚子陳侯鄭伯盟于辰陵公孫歸父會齊人伐莒秋晉侯會狄于櫕函冬十月楚人殺陳夏徴舒此討賊也何以書權在荆蠻也丁亥楚子入陳納公孫寧儀行父于陳公孫寧儀行父者陳大夫之與其君淫使其君見弑者也楚子不討而反納之其殆二臣許以陳輸楚故使之爲鄉𨗳歟十有二年春葬陳靈公楚子圍鄭夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績孔子荅季路三軍孰與之問曰暴虎馮河死而無悔者吾不與也必也臨事而懼好謀而成者也蓋用兵臨敵不貴乎徒勇而貴乎能懼徒勇而不能懼則不量彼已之勢不度可否之宜甞試一擲其能戰勝鮮矣又易之師曰長子帥師弟子輿尸凶凡主帥而不能制命亦未有不敗者也晉景公繼靈成之後霸業不競諸侯解體楚雖荆蠻而君明臣良兵鋒四克彼已強弱之勢亦可想見今楚方圍鄭鄭遂降楚晉人救之已無及矣當時晉大夫如士會荀首皆知楚之未易敵而不欲戰惟先縠耻於避楚以中軍佐先濟于河荀林父實主中權無所節制始欲歛兵而卒不果也蓋先縠狃於徒勇而不能懼林父奪於輿尸而不能决犯馮河之戒失長子之職則其喪師於邲不亦宜哉秋七月冬十有二月戊寅楚子滅蕭晉人宋人衞人曹人同盟于清丘宋師伐陳衞人救陳陳附楚者也宋以清丘之盟而伐之衞背盟而救之伐者義而救者不義矣然宋以附庸之蕭見滅於楚不勝其憤楚之私而洩其怒於陳非實爲中國伸其義也十有三年春齊師伐莒夏楚子伐宋秋螽冬晉殺其大夫先縠十有四年春衞殺其大夫孔達夏五月壬申曹伯壽卒晉侯伐鄭秋九月楚子圍宋葬曹文公冬公孫歸父會齊侯于穀十有五年春公孫歸父會楚子于宋自晉霸不競而楚爭諸侯於是伐陳而陳服討鄭而鄭降圍宋而宋請平徃徃駢首南向者不止此矣然陳亂無君而楚來討賊國人皇皇惟命是聽固不足責至如鄭宋被圍初皆闔城拒守綿歴時月力不能支然後請服此亦有不得已者獨魯不然方楚子在宋兵未及魯而望風納賄惟恐或後是以有榖之會焉此可見魯君大夫茍免自營怵於威武之甚矣夏五月宋人及楚人平六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸秦人伐晉王札子殺召伯毛伯按左氏王孫蘇與召伯毛伯争政使王子㨗殺召戴公及毛伯衞子㨗即札子也威福君之大柄亷恥國之大維今子弟專殺是君無威福之柄也朝臣争政是國無亷耻之維也君無柄國無維所以爲東周之衰亂也秋螽仲孫蔑會齊高固于無婁初稅畝古者井田八家皆私百畝其中爲公田八家耕之以奉其上所謂藉也藉之爲言借也借民力爲之而非稅也今魯初稅畝是於公田之外又稅其私畝也孔子曰始作俑者其無後乎壞井田之制開厚歛之門使民不聊生國無善治蓋自是始矣冬蝝生螽始生者爲蝝螽蜚蔽天或來自他處不必見其生也故不曰螽生蝝生於境内見其生也故曰蝝生左氏公羊皆云不爲灾非也凡物不爲害不書周之冬夏之秋也秋稼結實而蝝生敗之豈得不爲害哉饑春秋書饑者凶荒之甚者也莊公二十八年大無麥禾亦饑歲也而不言饑蓋當時雖無素備然猶知告糴于齊以爲凶荒之救故其民猶未至於流亡也今宣公歲饑見於再書者是其國旣無蓄積之備又無救荒之策坐視其民之飢而死爾蓋必如詩所謂饑饉降喪民卒流亡孟子所謂凶年饑歲老弱轉乎溝壑壯者散而之四方者矣故春秋以饑書也嗚呼使民至此烏在其爲民父母哉十有六年春王正月晉人滅赤狄甲氏及留吁昔者聖王之於逺畧也蓋有道矣於其來也接之而不傷義於其叛也討之而不傷仁肅慎來賀王命賄之無過禮也故曰接之而不傷義薄伐玁狁至于太原不窮追也故曰討之而不傷仁春秋霸者始異乎此方其致荒服之親附則屈意奉承周旋無閒如晉侯會狄于櫕函是也及乗其衰亂則窮追深入殄滅無遺如晉師滅赤狄潞氏晉人滅赤狄甲氏及留吁是也斯二者皆非所以爲待要荒之道故春秋書之以爲戒也夏成周宣榭火臺望氛祥榭講軍實成周之地有宣榭者興王之遺迹也宣王承幽王之後中國衰弱强暴侵陵於是脩車馬備噐械南征北討中興王業其用武於四方則必有講肄之所即成周宣榭是也宣榭火興王之迹泯矣故聖人重之而書示不忘古也千載而下尚有悲石鼓文字之磨滅如韓愈氏歌詩者不亦春秋意乎秋郯伯姬來歸郯伯姬來歸出也讀詩至葛覃則知婦人事君子之本茍失斯道至於睽孤宜矣故書以戒婦人也冬大有年十有七年春王正月庚子許男錫我卒丁未蔡侯申卒夏葬許昭公葬蔡文公六月癸卯日有食之己未公會晉侯衞侯曹伯邾子同盟于斷道秋公至自㑹冬十有一月壬午公弟叔肸卒公弟叔肸者公弟之爲大夫者也大夫卒故書也其曰公弟猶曰公子也以先君之子稱之故曰公子以今君之兄弟稱之故曰公弟所以書者用見魯之大夫皆公族爲之爾左氏謂凡稱弟皆母弟非也同先君之氣類即爲兄弟豈得以同母稱弟異母不稱弟哉此非聖人之教也程氏謂先儒説母弟者蓋縁禮有立嫡子同母弟之文其曰同母蓋爲嫡爾非以爲加親也十有八年春晉侯衞世子臧伐齊公伐把夏四月秋七月邾人戕鄫子于鄫甲戌楚子旅卒吳楚之君不書葬者春秋惡僭號尊王室存中國也其以子稱者從本爵也公孫歸父如晉冬十月壬戌公薨于路寢歸父還自晉至笙遂奔齊歸父襄仲之子宣公之黨故聞宣公薨而遂奔齊也奔齊而不奔喪無君臣之義矣禮人臣受命在外聞君薨畢事則奔喪未畢則爲位而哭春秋通説卷八
