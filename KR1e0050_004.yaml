body:
  text: 春秋通說卷四宋黃仲炎撰閔公元年春王正月齊人救邢夏六月辛酉葬我君莊公秋八月公及齊侯盟于落姑季子來歸季友初傅子般而子般見弒再相閔公而閔公又弒其於託孤靖難之功何有哉案左氏成季之將生也桓公使卜楚丘之父卜之曰男也其名曰友在公之右既而成風聞成季之繇乃事之而屬僖公焉蓋季子援僖之志已定於此時矣般閔之弒固季友之意也為人臣而竊交於宫梱受援立之託以求得志於他時是國之巨姦也其後文公敬嬴亦私事公子遂而屬宣公遂為之殺惡及視非倣於季友之為乎故由季友挾擁僖之功而後人盜魯權者纍世殆天之喪魯爾春秋不書季友之出而書其歸蓋與其出而惡其歸也說春秋者因以春秋書字為褒辭遂曰季子賢者也以大姦慝為大善良豈不誤天下後世哉故曰春秋之紀事為戒而已矣其於名字無擇也冬齊仲孫來齊仲孫來不言使且非有聘盟之事何也蓋覘魯也因魯難而竊來覘之將以取之也夫覘鄰國之難而圖取之齊侯於是乎不仁矣受命而覘國仲孫於是乎不能正其君矣或曰齊侯不仁固也然仲孫覘魯而歸公曰魯可取乎對曰魯不棄周禮未可動也君其務寧魯難而親之謂非正其君可乎曰善格君者當正救其非心而已楚莊為陳夏氏亂伐陳因縣陳申叔時諫曰諸侯之從也討有罪也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎楚子曰善哉乃復封陳蓋當時陳以淫昏致討縣而滅之初無難者而申叔時之諫特曰不可貪而已今仲孫受命覘魯見其猶未可動而後止之若使魯亂如陳則必贊其君取之矣包藏禍心睥睨鄰國尼於其所不可動則必不恕其所可動者矣比諸申叔時之諫不亦遠哉齊魯先世盟在王府俾其後嗣無相害也莊公不以齊為讎而事齊惟謹今其即世骨猶未寒試使可取亦何忍哉而仲孫不知及此謂之不能正其君可也二年春王正月齊人遷陽夏五月乙酉吉禘于莊公禮三年喪畢致新死之主以進於廟廟之遠主當遷入祧於是乃大祭於太廟以序昭穆故謂之禘禘之為言諦也言審諦昭穆之序也襄十五年晉穆公卒其十六年晉人答穆叔曰以寡君之未禘祀是知三年喪畢乃為禘也故曰吉禘今閔公斬焉在衰絰之中而輒舉吉禘之祀廢三年之通喪非禮也其不于太廟而于莊公之宫又非禮也秋八月辛丑公薨案左氏共仲使卜齮弒公于武闈成季以僖公適邾共仲奔莒乃入立之夫季友以閔元年歸魯則是既相閔公矣其明年閔公弒豈有賢者相其君而恬視其君之遇害哉蓋季友志在立僖視閔為路人幸其弒焉爾為閔之臣而有二心於僖不忠莫大焉觀春秋書公薨於季子來歸之後則季子之情狀可察矣故曰作春秋而亂臣賊子懼為內諱故不言弒其不地則弒自見矣其不書葬國內亂不得以成禮葬之也九月夫人姜氏孫于邾公子慶父出奔莒姜氏慶父同為弒逆之迹可見矣冬齊髙子來盟魯自慶父作亂賊殺子般使齊以霸國之力治之一反手之易爾遲遲三年間致魯君再弒國再亂及姜氏慶父不為國人所容出奔邾莒而後髙子來盟以定魯僖之位仁者救人豈如是之不迫哉桓公存三亡國而義士猶曰薄德者蓋於此見之矣其不言使杜預云齊侯使來平亂僖公新立因遂結盟故不稱使也十有二月狄入衛鄭棄其師春秋諸侯土芥用其民而不恤者往往而是然未有自棄其師如鄭人之甚者也案左氏鄭伯惡髙克使帥師次于河上久而弗召師潰而歸髙克奔陳夫惡一大夫不能去之至付以兵事使久于外而逃之固非刑政矣且民何罪焉暴師邊鄙聽其久困而自潰非棄之乎故書曰鄭棄其師不言師潰者潰因於棄之非師自潰也春秋通說卷四
