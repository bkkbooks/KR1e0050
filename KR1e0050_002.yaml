body:
  text: 春秋通說卷二宋黃仲炎撰桓公元年春王正月古者嗣君踰年而後改元者蓋君喪在殯緣臣子之心不忍遽改且先君之終年不可為嗣君之元年也故雖以臣弒君弟繼兄如桓公者亦必踰年而後改元魯史載之故孔子述之為萬世訓眀矣是以秦漢而下皆由之雖漢安帝繼殤帝亦終延平而為永初桓帝繼質帝亦終本初而為建和唐宣宗以叔繼姪亦終㑹昌六年而為大中獨本朝太祖以開寶元年十月上仙太宗嗣位是年十二月改為太平興國元年異乎逾年改元之義蓋當時必有其故而史或闕之不然豈當時宰相如薛居正沈倫盧多遜輩不考諸春秋也哉公即位書公即位言非禮也古者舊君既殁嗣子必以君命即位于柩前如尚書顧命成王崩康王麻冕黼裳尸天子位大誥諸侯訖王乃釋冕服反喪服蓋君臣父子之義於此兩得焉即王者之事可以知諸侯之事矣魯之隱莊閔僖成襄皆合此禮故春秋不復以即位書之若夫桓文宣成昭既於君薨之日立為君矣又復於明年歲首行即位之禮以誇於衆執喪而冕此春秋所以書也三傳者不得其說妄以為攝不書文姜出不書亂故不書公出不書是何多岐也又謂繼故不書繼正則書之至於繼故而書者則曰此成其志焉爾既以書為善又以書為惡使觀春秋者何所考信哉故曰例窮而無以通之而曲為之解是也胡氏亦惑於其說謂國君逾年改元而後行即位之禮何其未之思也夫即位與改元事體不同國不可曠時無君豈待逾年也哉如乙丑成王崩癸酉康王即位相去才九日爾若君薨嗣君未立必待逾年改元之後則何以繫民人之望絶窺伺之萌哉至疑喪服不可入廟則以為冢宰攝行朱氏因之又為權宜借吉之說皆失之矣三月公㑹鄭伯于垂陳恆弒其君孔子沐浴而朝告於哀公曰請討之明上無天子而天下有弒逆之賊而列國之君大夫皆所當憤疾而討之也使列國之君大夫皆有憤疾而討之之心則弒逆之人當無所容於世而其禍息矣惟當時列國之君不惟不能疾之又為其黨與以成之如鄭莊㑹于垂以定魯桓四國㑹于稷以立宋督而後亂臣賊子之禍始接踵於天下矣故春秋書公㑹鄭伯于垂公㑹齊侯陳侯鄭伯于稷以成宋亂明黨逆之罪以教天下後世治亂臣賊子之獄者必治其黨也治其黨則為惡者孤矣故曰作春秋而亂臣賊子懼鄭伯以璧假許田夏四月丁未公及鄭伯盟于越許田者許之田猶言邾田非魯之舊也魯隱末年從齊鄭入許得是田於許邑春秋雖不書魯取許田而書鄭假許田于魯者則知許田非魯有而魯取之許明矣然許鄭之鄰也鄭之欲許田尤急於魯之欲許田也當魯隱為鄭莊所餌悉力以佐其兵鋒故許田入魯而鄭不敢爭也今鄭莊因魯桓有篡立之事知其情方臲卼而可以撼動之也遂持璧以假之而婉致其直取之意於是魯不敢靳焉此可以見鄭莊謀利之巧又以見其黨桓之惡者由有所利而為之也其盟于越者申固假田之約也秋大水春秋於水旱螽螟雨雹凶饑之變悉書者所以謹天戒憂民生著人事乖戾所致明有國者所不當諱隱也此義行則為人君者必有引咎自責側身修行如殷湯周宣者矣必有稱朕過失詔羣臣議如漢文帝者矣為人臣者必有取四方水旱災變入奏言之如魏相之於宣帝李公沆之於真宗者矣若夫人君以災變為諱而不樂於聽聞人臣揣摩君意而不敢以聞於是姦諂之術行欺蔽之害起或天下水旱而曰不為災或海內蟲蝗而曰不傷稼或謂聖德已至而天變不足懼或謂氣數偶爾而非人事所關遂使弊政不除黎元受害者豈非不講春秋之罪哉淫雨不止則為大水漢儒多以為至隂之沴殺氣之應也而蘇軾氏則謂陽極為水繇政事緩弱所致蓋以春夏川澤洋溢秋冬水脉收縮見之是皆未為的要之政事失中即干隂陽之和而致旱乾水溢之變不必泥一方之說也冬十月二年春王正月戊申宋督弒其君與夷及其大夫孔父荀子有云肉腐生蟲魚枯招蠧自古人君受亂臣賊子之禍者未有無其故者也左氏載宋殤公立十年十一戰民不堪命孔父嘉為司馬督為太宰督因民之不堪命先宣言曰司馬則然於是殺孔父而弒殤公由此觀之殤公之禍蓋在於屢戰而民不堪命者為之故也夫數戰則疲民阻兵則失衆計其屢戰之時國人苦之行者死於鋒鏑居者敝於誅求肝腦塗地六親不能以相保必有疾視其上者矣此督所以得肆其逆也故書曰宋督弒其君以為兵火弗戢之戒明矣孔父與夷之傅也位為大臣職主兵事當亟戰疲民之日不能諌正其君遂使督借以聲衆歸罪於己而殺之以及其君故以不能諫正其君則不忠以不能先覺其亂則不智不忠不智其殺身禍君宜也公羊子乃以賢目之豈不謬哉茍以孔父為賢則凡敗亂其國之臣卒死於敗亂者皆賢矣胡氏襲公羊之說至以孔父比漢汲黯孔融蓋未之思爾夫猛獸在山藜藿為之不採朝有君子固姦邪所憚而不敢乘也若使不免為姦邪所乘則無貴乎君子矣汲直在漢淮南寢謀此豈孔父所能望哉孔融仕於垂亡之漢權位不足以行其志當曹操雄姦兵柄在手征伐四克羽翼既成孔融雖有忠憤之心而不得施者勢也豈若孔父身居要職而不能格其君之非使至於亂哉蓋孔父之罪當與從君於昏死於私昵者同科而以比肩於正直忠良之士失之甚矣滕子來朝先儒論滕侯爵而書子凡有數說一曰以其朝篡逆之魯桓故貶而書子不知春秋凡書外國來朝魯桓者即明其黨惡之罪不待降爵也茍以降爵為貶則凡不降爵者皆無貶乎鄭伯㑹桓而猶爵以伯也把侯朝桓而猶爵以侯也何滕之獨見削哉且滕終春秋稱子者豈聖人因罪滕子之朝桓遂併及其子孫而不赦耶一曰去公侯之爵而從子男者殺貢賦也如平丘之盟鄭子産爭承曰鄭伯男也而從公侯之貢懼不給也是亦不然當時五等爵貢在人耳目者實不可掩如鄭伯男也而從公侯之貢亦其實不可爾豈得實為公侯之爵而自貶以從伯子男之貢其誰信之且晉以霸强誅求小國故小國爭承貢賦以求殺焉固其宜也今滕於魯皆列國爾雖滕小於魯畏而朝之亦何至爭承貢賦如事霸國者而自降其爵哉闢此二說則知杜預云侯降而子為時王所黜者蓋得之矣或謂周室衰弱豈能黜陟諸侯不知周之失政正在此爾王朝刑罰不能略施於强大之邦而區區用於杞滕之小國故春秋從其實而書之以見吐剛而茹柔畏强禦而侮鰥寡者非王政也三月公㑹齊侯陳侯鄭伯于稷以成宋亂公㑹鄭伯于垂蓋鄭成魯亂也而不書成亂非諱之也既書公㑹即知其為成魯亂矣稷之㑹宋不與焉不特言成宋亂則無以明其所為也或曰宣十七年晉靈公為扈之盟亦成宋亂爾襄十三年晉平公為夷儀之㑹亦成齊亂爾雖㑹盟無宋齊之文何以不特舉其所為耶曰宋昭無道不能其大夫至于君祖母以及國人蓋弒賊者衆而晉不能討猶有說也晉平公伐齊以報朝歌之役齊人以弒莊公說是敵怨而不討亦有說也未有受賂以成宋督之亂如四國者故舉其尤者也夏四月取郜大鼎于宋戊申納于太廟魯桓篡弒之賊也其黨弒逆以取賂器固其常習不足罪已而經書取郜大鼎于宋戊申納于太廟者所以深悲魯先公之廟而為賂器之藏也左氏載㑹于稷以成宋亂為賂故立華氏也以郜大鼎賂公齊陳鄭皆有賂春秋舉魯而言則三國之得賂可知矣甚哉利賂之為害也君臣天地之大義也弒逆天下之大惡也齊陳鄭之君一蔽於利賂之欲至於叛大義黨大惡而不顧況其他乎是以自古有道之君必清心寡欲不殖貨利有道之臣必奉公潔已務絶包苴故能使朝廷清明政刑不繆不然則上下征利賄賂公行而有罪者得以賂免不賢者得以利進賞罰必至於僣濫禮義必至於消亡國家必至於危亂矣可不戒哉可不戒哉秋七月杞侯來朝蔡侯鄭伯㑹于鄧主㑹者鄭而先書蔡者序爵也于鄧鄧與㑹也於是荆楚寖强謀害中國蔡鄭鄧逼近於楚故懼而㑹焉當時中國惟齊為大不求以為主顧與二小國謀之此乃鄭莊自恃其瑣瑣之智既敗宋入郕取戴入許定魯桓之位成宋督之亂謂人莫己若故挾蔡以誑鄧不知其力之不足而欲以長諸侯禦大患難矣孟子有言王不待大霸必有大國蓋王者以德霸者以力以德服人則凡有知者莫與之較以力服人而力之所不勝則殆矣若鄭莊者無大國而求霸者歟九月入杞或謂隱伐邾稱公此不稱公者惡公以不正入人之國故削公以示貶也信斯言也則隱伐邾無貶乎蓋春秋據實紀事其稱公者公親將也不稱公者非公親將也然其為陵虐小國之罪均爾公及戎盟于唐冬公至自唐隱盟戎不至此何以至榖梁子曰危之也是不然等盟戎爾危桓而不危隱其說不通矣蓋春秋之義中國與戎盟耻也隱不至隱猶有不得已之意焉桓䇿勳于廟是不耻其所耻故即其實而至之也此義明則中國不得以和戎為功矣故富鄭公弼奉使契丹增幣以講好而終身耻道其事豈非有得於春秋之義哉凡公返行而䇿勳飲至則書否則不書三年春正月何休謂桓三年以後有月無王見桓無王而行也如休之說則桓元年二年書王者豈以桓為有王哉聖人正以諸侯之無王故修春秋以明尊王之教若諸侯有王則春秋可無筆矣杜預又謂周室不班歷故不稱王不知周室之衰天子不班歷諸侯不奉朔久矣使如杜之說則昭二十三年以後子朝之亂王室無君而春秋書王正月者豈亦班歷也哉胡銓氏又謂桓元年書王以端其本二年再書王以待天王之誅至是三年矣天王不能討故去王以示義抑不思春秋之時亂臣賊子之禍接踵於天下而天王皆不討也若以天王不能討而去王以示義則二百四十二年經皆當去王矣信斯說也則孔子修春秋不但行法於諸侯大夫而禠奪其爵氏又將加討於天王而禠奪其稱號也不亦僭哉且天下之惡無大於篡逆者汙宫壞室殺之無赦當不俟終日何待二年之後耶此皆不通之論也然則桓三年以後無王者蓋如夏五闕文爾公㑹齊侯于嬴桓公以篡逆得國其初不能不懼天下之討也竊計當時周室微弱不足懼已所可懼者桀黠之鄭强暴之戎大國之齊宋而已於是元年㑹鄭而鄭與魯二年成宋亂而宋與魯又於是年盟戎而戎與魯至此又成婚于齊而為嬴之㑹其自保之計可謂至密而不知上天之網終於不漏故禮成不反之禍萌於婚齊之日觀春秋書桓三年公㑹齊侯于嬴十八年公薨于齊則知世之惡人焉可自恃其為計之密哉夏齊侯衛侯胥命于蒲春秋非王者不言命其書齊衛胥命罪僭王也三𫝊以為不盟妄矣使其不盟則㑹與遇皆不盟爾曷為以胥命書哉六月公㑹把侯于郕秋七月壬辰朔日有食之既公子翬如齊逆女翬桓之謀主也桓自命為大夫故稱公子九月齊侯送姜氏于歡公㑹齊侯于歡齊侯越境而送女是愛之不以其道也魯侯因㑹而納婦是婚之不以禮也姜氏禍魯兆於此矣夫人姜氏至自齊冬齊侯使其弟年來聘有年春秋十二公惟桓宣以不道得國宜無以致豐祥之慶然惟桓宣之世有年大有年何哉昭二十五年書有鸜鵒來巢左氏曰書所無也蓋書有以見無也桓宣之世日食大水蟲災譴略同而宣又大旱蝝生冬饑者再以此觀之則桓三年書有年則他歲無年可知矣宣十八年書大有年則他歲大無年可知矣四年春正月公狩于郎田狩之義二習兵所以衛民也取物所以奉先也故曰國之大事在祀與戎田狩之謂也若夫逐盤遊之樂恣從禽之好至於敗德荒政病民殄物者危亡之道古人所甚戒也郎逺地也公之逺狩于郎者其殆逐盤遊之樂恣從禽之好乎夏天王使宰渠伯糾來聘聘諸侯非正也況寵篡逆者乎時桓王有討鄭之志故聘魯以求助不知寵篡逆以墮三綱刑政亡矣豈可復以討諸侯哉五年春正月甲戌己丑陳侯鮑卒甲戌己丑三傳皆以為魯史舊文而孔子因之非也孔子修春秋以筆削自命若魯史有二日並存之訛不應述而不削遺無故之疑也此必聖人筆削之後傳録者誤爾或謂甲戌下脫一所書之事然夏齊侯鄭伯如紀齊侯鄭伯朝於紀者將以襲紀也小人隂險之情狀豈不可畏哉天王使仍叔之子來聘求魯而不見答故復遣聘也至於使仍叔之子則又以見王朝用人之謬矣古者公卿大夫之子必由於學俟其成德逹材而後用之然必四十而後從政則其未仕之前所以涵飬而通練多矣周衰政教廢失凡公卿大夫老不堪政即使其子代之不惟不出於成德逹材之彥往往不待强仕之年如武氏子仍叔子之類以乳臭之童而任邦國之政即子産所謂未能操刀而使割也豈不繆哉此可為後世取士用人者之戒矣葬陳桓公城祝丘秋蔡人衛人陳人從王伐鄭周政狃於弱甚矣桓王一旦憤然欲振其威權以鄭伯不朝而親將以伐之此亦有志於扶衰拯敝者而伐鄭何以書曰不擇罪而致討不命將而親征蓋妄舉躁動之師也當桓王之時魯有不道之桓宋有不臣之督天下之罪孰有大於此者而天討不能加也聘幣之使方接踵於魯庭寵篡逆以墮三綱不足以言王政矣鄭伯不朝罪或可略而必討之不置此謂不擇罪而致討者也天子之征諸侯也內則使卿士外則任方伯將王命以臨之王不自征也今不忍一朝之忿挾不足倚仗之人以天子威重而自將以伐諸侯一戰不勝而王室益以微矣此謂不命將而親征者也不擇罪而致討者非義不命將而親征者非謀非義非謀而欲以威諸侯服天下不亦難哉或曰鄭小而魯宋大者也以王之力不能治鄭則何以討魯宋之罪哉曰陳恆弒其君孔子請討之以為陳恆之事民之不與者半以魯之衆加齊之半可克也夫陳氏厚施於民而民從之故民之與之者半不然皆不與爾魯桓宋督之事計其國人皆莫與之也舉國人之所不與者而以天子之名義討之其孰曰不可哉討當其罪則天威振而人心服矣尚何鄭伯不朝之足怒耶惜也桓王欲振其威權而不知計之出於此也左氏載繻葛之戰王卒大敗而春秋不言戰明王者無敵於天下也不言敗為王者諱也此皆春秋尊王之教也大雩雩求雨之祭也何以書雩而加大僣也大雩帝用盛樂天子之禮也魯郊用辛日雩亦用辛如昭二十五年書上辛大雩季辛又雩其為雩上帝明矣然則魯雩當何如曰天子祭天諸侯祭土社稷山川之在封內者諸侯祭之宜也螽觀斯螽動股之詩則知其常有也觀螽斯蟄蟄之詩則知其常多也何以書為災焉爾冬州公如曹春秋以爵書公者宋公是也以官書公者祭公周公州公虞公是也此皆居王者三公之任者也左氏載隱十一年王取塢劉之田于鄭而與鄭人蘇忿生之田溫原絺樊州陘隤懷此皆王畿之地王朝公卿食采之邑也王朝三公食采於州故曰州公而非州國也明矣人臣之位孰如三公之尊固當與國家同其休戚今以王師敗衄于鄭則懼而如曹平安則保其位危難則逃其君兹豈人臣之義哉楚雖國亡得包胥而外援至唐雖兵亂有李勉而朝廷尊國有人焉雖喪敗之餘猶有可振起者今觀州公之事則王室何賴於若人哉宜聖人惡而書之為萬世人臣之戒也左氏謂淳于公如曹度其國危遂不復所謂國危者王國爾非州國也淳于州公姓氏也六年春正月實來實來者當如郭公之類簡編脫誤爾說者以實為州公豈其然乎夏四月公㑹紀侯于郕秋八月壬午大閲據臧僖伯所稱講事者四時之制則搜苖獮狩三年之制則治兵振旅初無大閲之名也此書壬午大閲者得非大合國人而閲之以夸示其甲兵之盛異於講事之常制乎此可以見其好武佳兵之甚矣蔡人殺陳他左氏載五年陳亂文公子他殺太子而代之則是他既為君矣春秋諸侯雖以篡弒立者踰年必稱君他既立踰年不稱君而曰陳他何也榖梁子曰匹夫行故匹夫稱之也他以匹夫行而淫于蔡蔡人不知他為君而殺之故以殺陳他赴於魯也由此觀之凡為人君而去鑾旗之飾失藩衛之嚴微服盤遊見斃賊手猶殺一夫而已可無畏哉九月丁卯子同生左氏不緣經而載事者多矣九月丁卯子同生者蓋左氏因記太子生之禮并問名等語故起此事恐非經文也録經者誤以傳文加之爾如文八年公子遂㑹雒戎盟於暴杜注云本或作伊雒之戎此後人妄取傳文加之之類不然春秋書子同生甚無義也冬紀侯來朝七年春二月己亥焚咸丘杜預曰火田也焚林而田明年無田竭澤而漁明年無漁故春秋書焚咸丘惡盡物也夫求盡物於山澤聖人且猶惡之況求盡利於民乎夏榖伯綏來朝鄧侯吾離來朝說者皆以榖伯鄧侯朝乎篡逆之魯桓故貶而名之不知春秋書其事即見其罪焉爾不以名為貶也以名榖鄧為貶則不名者無貶歟然則名之何也榖梁子曰失國也故名八年春正月己卯蒸冬祭為蒸蒸進也冬之時百物成熟凡可薦者皆進而祭之也蒸用建亥之月故傳曰閉蟄而蒸今蒸用建子不及時矣不及時則為怠正月己卯蒸是也亟舉則為黷夏五月丁丑蒸是也天王使家父來聘夏五月丁丑蒸秋伐邾冬十月雨雪祭公來遂逆王后于紀祭公來不稱使無君命也遂逆王后于紀專君命也九年春紀季姜歸于京師王后歸不書而書紀姜者事由祭公非王者之命失正始之道也夏四月秋七月冬曹伯使其世子射姑來朝君父在而世子行㑹朝之事是國有二君也父而使之雖篤子之愛不可以為訓也子而行之雖從父之令不足以為孝也十年春王正月庚申曹伯終生卒夏五月葬曹桓公秋公㑹衛侯于桃丘弗遇冬十有二月丙午齊侯衛侯鄭伯來戰于郎十有一年春正月齊人衛人鄭人盟于惡曹夏五月癸未鄭伯寤生卒秋七月葬鄭莊公九月宋人執鄭祭仲突歸于鄭鄭忽出奔衛三傳者皆雜褒貶以亂經而公羊為甚公羊之最謬者以孔父為死義以祭仲為行權以齊襄滅紀為盡祖禰之心以宋襄喪師為比文王之戰似此之類其誤天下後世不淺矣鄭伯寤生卒祭仲執國之政受命以奉其嫡子忽為君有死無二仲之職也一旦見執於宋貪生茍免遽立突而黜忽視變易其君不啻如辨髦雖斧鉞刀鋸猶恐不足以痛懲之況可許以權乎以祭仲為權是使世之姦臣賣君賣國以自為利者皆借權以自解則天下國家之禍安有己哉漢高后欲王諸吕王陵固爭而陳平不爭既而陵以急得罪平以緩收功宜平之賢於陵也先儒論此則以陵為可法平為可罪蓋不如是則黨邪禍正榮存醜亡身謀而國不計君逋而讎是與者將接踵於天下矣夫有平之功且不免罪況不能為平之功者乎此可以觀春秋之教黜公羊之妄矣柔㑹宋公陳侯蔡叔盟于折公㑹宋公于夫鍾冬十有二月公㑹宋公于闞十有二年春正月夏六月壬寅公㑹把侯莒子盟于曲池秋七月丁亥公㑹宋公燕人盟于榖丘八月壬辰陳侯躍卒公㑹宋公于虛冬十有一月公㑹宋公于龜丙戌公㑹鄭伯盟于武父丙戌衛侯晉卒十有二月及鄭師伐宋丁未戰于宋市井小人嬉游狎昵無所不至指天誓心以示無他一旦言意之不快則舉挺刃而鬭反目若世讎者即魯宋二君之所為也十有三年春二月公㑹紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績孟子有言爭地以戰殺人盈野爭城以戰殺人盈城又曰善戰者服上刑春秋書諸侯之戰蓋明其以爭戰殺人宜服上刑焉爾至於衛侯背殯從戎廢居喪之禮稱爵以交鄰國上刑之服又有甚焉或曰喪制有從金革而無避者非歟曰為寇在門庭而宗廟社稷之存亡所繫者是以從權制而無避也故徐戎並興東郊不開伯禽雖在喪服之中而征築並舉蓋度輕重緩急有不得已焉者矣今衛侯從齊宋燕以出戰豈有門庭之寇事之不得己哉直好戰而已爾三月葬衛宣公夏大水秋七月冬十月十有四年春正月公㑹鄭伯于曹無冰夏五夏五闕月當是傳經之誤榖梁氏以為孔子傳疑非也夫文不關於教戒而遺無故之疑者豈春秋意哉鄭伯使其弟語來盟秋八月壬申御廩災乙亥嘗諸侯親耕以奉粢盛必廩而藏之故魯有御廩猶月令季秋藏帝藉之收于神倉是也春秋書壬申御廪災乙亥嘗凡祭散齊七日致齊三日嘗於乙亥則是壬申為致齊之初日也御廪之災不於他時而於嘗薦致齊之日其異甚矣得非桓為不道而宗廟之靈將不歆其祀乎冬十有二月丁巳齊侯祿父卒宋人以齊人蔡人衛人陳人伐鄭其言以者何也以之為言用也趙子曰凡不用我師而用彼師者曰以何以知之以定四年書蔡侯以吳子及楚人戰于柏舉知之也左氏載柏舉戰事並吳楚自戰而蔡不交鋒也今伐鄭之役得非宋人用四國之師而不自用其師乎夫不用吾國之師而用他國之師是不愛他國之民也宋人是已以吾國之師而為他國之用是不愛吾國之民也齊蔡衛陳是已二者皆不仁也十有五年春二月天王使家父來求車榖梁子曰求車非禮也求車猶可求金甚矣或又曰車服上之所賜下者也而求之下其過甚於求金不知二者皆不足論也當周轍既東王畿之地僅儕於列國方物之貢不至於京師天子特擁虛器於其上用度空乏至於下求凡春秋書求賻求車求金者皆所以見王室之衰替諸侯之不臣焉爾寧有輕重於其間哉三月乙未天王崩夏四月己巳葬齊僖公五月鄭伯突出奔蔡鄭世子忽復歸于鄭突出忽歸復正也何以書惡祭仲之擅廢置君也衛叔文子所謂視君不如奕棋者祭仲是也許叔入于許傳曰人衆能勝天天定亦能勝人春秋紀列國之變所以見人欲橫流之中而未嘗無天道也鄭莊公吞噬許國挾齊魯之力入許而逐其君使其大夫國人奔潰四出可謂人欲橫流矣及身沒之後權臣擅命二子爭國幾於喪亡故許叔因鄭之亂得還其舊都非所謂天道之昭昭者乎茍知天道之昭昭如是則凡世之肆其欲者可以戒矣此春秋書許叔入許之義也先儒謂許叔能復其宗社故春秋賢而字之抑不思許叔罹鄭莊之虐遲徊于外者十有五年不能乞靈於王室假援於諸侯以復君父之仇也今幸鄭之亂乘閒以入其國此雖甚愚者為計亦不容不出於此何以謂之賢哉春秋之紀事為戒而已矣其於名字無擇也王使榮叔來錫桓公命是寵篡逆也而書榮叔柔㑹宋公陳侯蔡叔盟于折是以臣敵君而為不信之盟也而書蔡叔豈亦賢而字之耶朱氏謂春秋非字字皆有義者此類也公㑹齊侯于艾邾人牟人葛人來朝秋九月鄭伯突入于櫟冬十有一月公㑹宋公衛侯陳侯于袲伐鄭為納突也魯桓以弟篡兄鄭突以庶奪嫡故突之求入于鄭魯必為之盡力焉同惡相濟之道也十有六年春正月公㑹宋公蔡侯衛侯于曹夏四月公㑹宋公衛侯陳侯蔡侯伐鄭秋七月公至自伐鄭冬城向十有一月衛侯朔出奔齊春秋諸侯之出奔者皆為其臣所逐也鄭伯突以庶奪嫡遂為祭仲所制不堪仲之為而謀殺之未成而仲知之是突之出奔者祭仲逐之也衛朔以讒鬭取置伋壽於死地故二公子泄職怨之而立黔牟是朔之出奔者泄職逐之也二者俱以不義得之以不義失之爾不然則其大夫國人皆將安之以為君矣援己者無德色異己者無叛心所謂神之主而民之望也庸可逐乎十有七年春正月丙辰公㑹齊侯紀侯盟于黃盟于黃平齊紀也蓋齊欲害紀而魯平之義也何以書曰春正月及齊紀盟夏五月及齊師戰見魯桓反覆不常以誤紀之託紀侯不擇所主以自誤其國也曽子曰為人謀而不忠乎魯桓是已易曰比之匪人不亦傷乎紀侯是已二月丙午公㑹邾儀父盟于趡夏五月丙午及齊師戰于奚六月丁丑蔡侯封人卒秋八月蔡季自陳歸于蔡蔡季聞君死而歸必嘗得罪於君而出矣以為其自歸則志在於爭國以為蔡人召之則非出於王命二者必有一焉皆罪也癸巳葬蔡桓侯桓侯者桓公也侯字誤也春秋之法五等諸侯殁皆稱公緣臣子之心而尊之也故漢孔融為鄭康成立鄉曰昔太史公廷尉吳公謁者僕射鄧公皆漢之名臣又四皓有園公夏黃公潜德隱耀世嘉其尚皆悉稱公然則公者仁德之正號不必三事大夫此即春秋書公之義也啖助謂蔡人請諡於王而加諡於本爵者妄矣及宋人衛人伐邾冬十月朔日有食之十有八年春王正月公㑹齊侯于濼公與夫人姜氏遂如齊或謂公本與夫人俱至于濼而不書夫人者是必夫人尚有所憚不敢出㑹也使公能制之於始不與偕往於齊豈有後日之禍不知桓公身為篡弒之賊天理絶矣尚何責以夫夫婦婦之道耶制於孽婦禍至殺身殆天奪之魄也書所謂從逆凶者桓公是已夏四月丙子公薨于齊公見弒於齊不言弒為內諱也言薨于齊則弒自見矣丁酉公之喪至自齊秋七月冬十有二月己丑葬我君桓公春秋君弒不書葬者仇人當國或國內亂不得以成禮葬焉爾桓之書葬者仇人在齊而其國固無恙焉故得以成禮葬之也春秋通說卷二
