body:
  text: 春秋通說卷五宋黃仲炎撰僖公上元年春王正月齊師宋師曹師次于聶北救邢夏六月邢遷于夷儀齊師宋師曹師城邢救本善也春秋之書救則皆不善者也所謂不善者不誠於救或救而無功也或救不在諸侯而在大夫不親與國而勤逺略也邢有狄患三年矣齊嘗一救之不足以退狄師也至此再救之以三國之師沛然有餘力矣而猶待於聶北之次邢不勝困以遷其國然後城之曷若城之於未遷之時哉此謂不誠於救者也不誠於救而不得不救者孟子所謂假仁者也秋七月戊辰夫人姜氏薨于夷齊人以歸案左氏哀姜孫于邾齊人取而殺之于夷以其尸歸君子以齊之殺哀姜也為已甚矣女者從人者也為內諱故不言殺曰薨于夷則殺自見矣楚人伐鄭楚何以先稱荆而後稱楚曰從其實也詩稱蠢爾蠻荆是楚以荆稱舊矣至春秋之初猶以荆通于中國故春秋從而荆之今始改為楚故春秋亦從而楚之爾說者謂自州而國之乃春秋漸進之法謬矣八月公㑹齊侯宋公鄭伯曹伯邾人于柳㑹于柳者謀救鄭而不能也九月公敗邾師于偃冬十月壬午公子友帥師敗莒師于酈獲莒拏十有二月丁巳夫人氏之喪至自齊夫人氏者經文闕姜字也公榖以去姜為貶信斯言也則夫人孫于齊書姜氏者無貶歟二年春王正月城楚丘楚丘非衛邑也何以知其非衛邑也以春秋書法而知之也春秋凡書城外邑必有所繫如城緣陵不言把必曰諸侯城緣陵以見緣陵之為外邑而非魯自城也如城虎牢必繫於諸大夫㑹戚之下曰遂城虎牢以見虎牢之為外邑而亦非魯自城也若書城內邑則無所繫矣如城中丘城祝丘之類是也楚丘之城既無所繫豈得為外邑哉況隱公七年書天王使凡伯來聘戎伐凡伯于楚丘以歸繫楚丘於來聘之下益知為魯邑明矣左氏載成季之生也公使卜楚丘之父卜之卜楚丘者魯大夫也以其國邑為氏故曰卜楚丘也衛詩稱作于楚宫作于楚室而未嘗曰楚丘也惟序詩者稱衛楚丘此乃漢儒㳂襲三傳之訛說爾然則城楚丘何以書曰僖公承國家喪亂之餘即位期年未皇他務遽以城築之役罷敝人民所謂諸侯卑而守四竟未能撫民而用其力者兹為可戒也或曰若是則齊桓封衛之事於經奚見哉曰齊之恤魯也三年而後定於恤邢也四年而後城遲徊延緩無救焚拯溺之意故聖人惡而書之若夫衛為狄所滅其遺民渡河奉戴公以廬于曹齊桓不踰時間使公子無虧帥車三百乘甲士三千以戍曹歸其器用故衛賴以復存齊桓此役似忠於人者惟忠於人故不書也故曰春秋之紀事為戒而已矣夏五月辛巳葬我小君哀姜虞師晉師滅下陽虞公貪璧馬之賂道晉師以伐虢宫之竒諫不聽故虢亡而虞從之經書虞師晉師滅下陽踰三年晉人執虞公以為貪而拒諫者之戒明矣下陽虢公邑也秋九月齊侯宋公江人黃人盟于貫穀梁子載貫之盟管仲曰江黃遠齊而近楚楚為利之國也若伐而不能救則無以宗諸侯矣桓公不聽遂與之盟管仲死楚伐江滅黃桓公不能救故君子閔之是知春秋書貫之盟所以著江黃致禍之由而齊桓實誤之也唐正觀時康國求內附太宗曰前代帝王好招來絶域以求服逺之名無益於用今康國內附儻有急難於義不得不救師行萬里豈不疲勞勞百姓以取虛名朕不為也故寧失目前之侈觀以免後日之尤悔若太宗者可謂有管仲之慮矣冬十月不雨楚人侵鄭三年春王正月不雨夏四月不雨徐人取舒六月雨書六月雨者見不雨之所終也言自十月不雨至于五月也北史神龜元年自正月不雨六月辛卯澍雨乃降即春秋書六月雨之辭也聖人何喜焉而榖梁子曰喜雨也於是說春秋者多從之可謂過矣夫久晴而雨乘除常數小人獻佞指為天休君臣之間動色相賀有驕矜而無戒懼者此亂朝之事豈聖人之意哉善乎富公弼告神宗曰願陛下不以今日得雨為喜更以纍年災異為憂此可以言春秋矣秋齊侯宋公江人黃人㑹于陽榖冬公子友如齊蒞盟楚人伐鄭四年春王正月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘蔡有附楚之罪而齊侯帥七國之師以侵之非過也何以書曰齊侯之侵蔡不惟疾其附楚而已案左氏齊侯與蔡姬乘舟于囿蕩公公懼變色怒而歸之未之絶也蔡人嫁之故明年因伐楚之師而侵蔡是謂逞人欲而非奉天討也八國之兵及其竟而民潰可見威聲震駭之甚矣夏許男新臣卒楚屈完來盟于師盟于召陵齊桓帥諸侯以伐楚次師于陘奉辭而不迫庶幾王者之征終於不交兵而講和好春秋諸侯之攻伐未有若此者也何以書曰以管夷吾之智而於治楚一大事不得其要領而止蓋蹈乎薄德之譏也觀左氏載管夷吾奉辭于楚以二事責之曰昭王不復也包茅不貢也是責其所不足責而略其所當責也昭王之事不當問楚矣所可責者包茅爾然未為切也自平王以來諸侯放恣周之禾麥且見取于鄭魯不貢賻至勤使命之來王賦不共滔滔皆是何止一楚哉自古帝王之征不庭不暇責以禮也蓋必以其侵陵彊邑患苦人民為問罪之首事如宣王六月之詩玁狁孔熾我是用急王于出征以匡王國是也若其揣力度時未能進討則出於和親之下䇿亦必約其休師息旅無至敗盟如漢文帝遺胸奴書墮壞前惡以圖長久使兩國之民若一家子元元萬姓下及魚鱉上及飛鳥跋行喙息之類莫不就安避危是也今楚怙恃其强陵虐小國漢陽諸姬彼實盡之駸駸入于中夏敗蔡師虜蔡侯加兵於鄭者未有已也齊桓責楚當以此先焉今顧無一語及之既而屈完來盟亦止曰同好而已何夷吾之慮若是其踈哉蓋齊方以諸侯主諸侯非如王者之於天下君臣分定所願拱已垂裳以臨之也其意常樂天下之多事而以號召排拯為功焉猶貨醫者幸人之有疾貪將者喜國之有寇故其不以侵陵問楚者留其疾而遺之寇也是以既盟之後明年楚滅弦又明年楚圍許又明年楚滅黃兵車徜徉比召陵以前不少挫而齊為楚故以勤諸侯者自若焉夫使諸侯不能一日不虞楚之患即不能一日不藉齊之功此管仲之術也故曰五霸者三王之罪人也齊人執陳轅濤塗陳轅濤塗有誤軍之罪而齊執之討不忠也何以書曰濤塗為齊謀則詐為其國謀則忠也左氏載陳轅濤塗謂鄭申侯曰師出於陳鄭之間國必甚病若出於東方循海而歸可也蓋知齊師所過必大為其國之擾故濤塗不欲其出乎已之國也齊不自反顧乃執其臣而兵其國仁者果如是乎大抵兵事一動不惟有戰鬬死傷之憂而師之所處荆棘生焉所過國邑人民力困於誅求膽寒於侵掠誠有如濤塗之所謂甚病者夫以齊桓用兵號為節制而猶若此況以悍將驅暴兵無法以馭之所過殘滅者多矣可不謹哉秋及江人黃人伐陳八月公至自伐楚葬許穆公冬十有二月公孫茲帥師㑹齊人宋人衛人鄭人許人曹人侵陳五年春晉侯殺其世子申生申生自縊而死而曰晉侯殺之何也有讒不見而置申生於死地即晉侯殺之矣夫世子國之本不可動也自古人君以讒害之者豈特自戕其天性哉國之亂亡鮮不由比故張九齡謂晉獻公聽驪姬之讒殺申生三世大亂漢武帝信江充之誣殺戾太子京城流血晉惠帝用賈后之譖廢愍懷太子中原塗炭隋文帝納獨孤后之言黜太子勇遂亡天下由此觀之可不戒哉可不畏哉把伯姬來朝其子夏公孫兹如牟公及齊侯宋公陳侯衛侯鄭伯許男曹伯㑹王世子于首止秋八月諸侯盟于首止周惠王以惠后故將廢太子鄭而立王子帶故齊帥諸侯㑹王世子以定其位也定王世子之位義也何以書曰以王世子而外交强國脅君父以定其位非子已以諸侯而不朝於王而致世子於外而㑹之非臣已此豈可為訓哉或曰不如是則惠王將易世子奈何曰使世子懼不孝不懼不得立使齊侯朝京師諫於王而定之則為人子為人臣之道盡矣漢史載髙帝欲易太子叔孫通諫不聽張良畫計以為上所不能致者四人請從太子游及髙帝晏置酒太子侍四人者從故太子得不易識者非之謂決無是事不然使四皓實能制髙帝使不敢廢太子是張良為其子立黨以制其父也嗚呼世子挾賔客以自固如四皓者然且不可而況外假强國之援哉此春秋所以書首止之事為後世戒也其書㑹世子者見世子在首止而諸侯往㑹之也其曰諸侯盟于首止者見世子不與盟也鄭伯逃歸不盟案左氏首止之盟王使周公召鄭伯曰吾撫女以從楚輔之以晉可以少安鄭伯喜於王命故逃歸不盟蓋齊桓不朝于周而致王世子于外以定其位黨臣子以脅君父此惠王之所不能平也故撫鄭從楚以泄其忿焉鄭伯喜於王命而逃歸不盟此可以見人心矣楚人滅弦弦子奔黃九月戊申朔日有食之冬晉人執虞公三傳謂虞虢為諸侯非也虞公虢公皆仕於王朝為三公者也左氏莊十五年王使虢公命曲沃伯以一軍為晉侯而此稱虞公可見其為王朝之三公矣晉師滅虢而經不書滅虢而書滅下陽此滅虞而不書滅者蓋下陽者虢公食采之地虢公邑而居之故滅下陽則虢亡矣虞公亦居於食采之地今晉執虞公而地入于晉可知故不言滅也六年春王正月夏公㑹齊侯宋公陳侯衛侯曹伯伐鄭圍新城秋楚人圍許諸侯遂救許諸侯遂救許無功也案左氏許僖公見楚子于武城許男面縛䘖璧大夫衰絰士輿櫬楚子以武王克殷事命之則是許既降楚矣冬公至自伐鄭七年春齊人伐鄭夏小邾子來朝鄭殺其大夫申侯秋七月公㑹齊侯宋公陳世子款鄭世子華盟於寧母盟于寧母謀鄭也子華曷為亦與於盟因子華而謀也今年春齊人伐鄭明年鄭伯始乞盟則子華之來決非君父之命矣子華姦人也叛其君父求介於大國以弱其國為霸主者若何受之雖夷吾進諫終却其請然納子華於㑹盟亦列姦而已矣曹伯班卒公子友如齊冬葬曹昭公八年春王正月公㑹王人齊侯宋公衛侯許男曹伯陳世子欵盟于洮王人即王官也猶僖二十九年王子虎盟翟泉亦以王人書是也時惠王不豫陳媯子帶之謀未己故齊侯復扳㑹王官而盟之以定王世子之位蓋王世子廢置之命制於諸侯矣鄭伯乞盟鄭伯始於逃盟而終於乞盟此豈有不可奪之志哉然齊之得鄭蓋因於屢伐之後亦非使人恱服之道矣夏狄伐晉秋七月禘于太廟用致夫人或問禘祫之說衆矣歷代諸儒援經立辨或以為天子祫禘祫嘗諸侯禘一祫一或以為祫祭祝取羣廟之主而明禘不然或以祫為三年一大祭或以禘為三年一大祭或以五年殷祭為禘或以為禘即是祫或以為王者禘其祖之所自出三歲祫祭天子諸侯大夫用之而五歲一禘所以報其繼天受形之祖非天子不得用然則何所折𠂻乎曰衆言殽亂折諸聖春秋有禘無祫魯語有問禘之說有禘自既灌之說未嘗及於祫也晉人告穆叔以為寡君之未禘祀則禘為三年喪畢之祭明矣春秋於文二年書大事于太廟此即除喪而禘祀爾而公羊氏曰大事者大祫也大祫者合祭也五年而再殷祭蓋以大祫為三年之祭以禘為五年之祭由公羊之說也公羊之說好為誣誕不必案之舊典漢承秦人滅學之後諸儒多治公羊春秋援為根據其言禘祫之制大率祖公羊之說爾戴記之書漢儒之雜說也是以後世紛紛之論未能歸一得非不折諸聖乎國之大事在祀與戎故周制四時之田春搜夏苗秋獮冬狩而又三年一治兵此天子諸侯之所同也春祠夏禴秋嘗冬蒸而又三年一大祭此亦天子諸侯之所同也四時之祭不及毁廟之主故三年大祭併毁廟之主而祭之也但三年之祭講於除喪祔入新主之時則謂之禘禘之為言諦也新主入廟舊主當遷因合祭之而審諦昭穆之序也即晉人所謂禘祀閔公之吉禘是也若講於非除喪祔主之時止於合祭而已不復審諦昭穆之序故不曰禘而曰有事曰大事即公羊之所謂大祫是也由此觀之則知三年大祭禘即是祫而諸儒之論皆可廢矣或曰僖之禘于太廟非除喪祔主之時何以不曰大事而曰禘也文之大事于太廟正除喪祔主之時何以不曰禘而曰大事也曰僖之禘于太廟雖非除喪祔主之時然致夫人之主于廟而審諦之故曰禘也文之大事于太廟雖除喪祔主之時然逆祀而躋僖公不得為審諦昭穆之序故不言禘也禘于太廟禮也禘而致夫人之主于廟則非禮矣夫人者左氏云哀姜是也帷箔不飾比弒二君不薨于寢而見殺于齊於禮不應祔廟僖公乃猶豫久之今特舉禘祀而致其主雖曰盡人子之愛然以大罪之人宜絶之先君而配之先君之廟可乎不可也聖人惡而書之以為萬世君母之戒嚴矣哉夫人不稱諡省文也曰禘而用致豈非新死者哉其為哀姜明矣冬十有二月丁未天王崩九年春王三月丁丑宋公御說卒夏公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘葵丘明天子之禁甚盛舉也何以書曰號令之出在齊諸侯之畏在齊所謂禮樂征伐自諸侯出此其尤者爾物不能兩大霸極盛則王極微矣王世子王之二也宰周公王之輔也自首止致王之二葵丘致王之輔而後晉文公為溫之㑹遂致王矣易曰履霜堅冰至蓋言順也故不以明天子之禁而不書也秋七月乙酉伯姬卒不稱國內女之未適人者也未適人不卒此何以卒穀梁子曰許嫁笄而字之死則以成人之喪治之也九月戊辰諸侯盟于葵丘甲子晉侯詭諸卒冬晉里克殺其君之子奚齊十年春王正月公如齊狄滅溫溫子奔衛晉里克弒其君卓及其大夫荀息世子申生死於讒而里克不平其事奚齊卓子死於亂而荀息不食其言二子者皆用其死力於晉國者也然里克不免乎弒君之名荀息不免乎從昏之罪殺身而無益于國何哉人臣之義在於正諫其君之非而已茍能以死力正諫其君鮮有不能回其君之聽者不幸而不聽以至於死則臣子之義盡矣漢髙帝欲廢太子立趙王如意張良極諫不聽叔孫通又諫時大臣多固爭於是上知羣臣心不附趙王乃止不立故漢室之不亂非忠諫之功乎今里克荀息雖各盡其死力而莫能知此也方獻公使太子之伐臯落氏也里克嘗諫矣然一不見聽遂退而不復言及驪姬譖而不能爭也申生死而不能明也蓄憤久之而以三公子之徒作亂是里克雖有不徇其君之心而不能辨之於早也申生之死奚齊卓子之為也千載而下聞者猶寃之況當時哉荀息於此不惟不能諫又且成其君之邪志以死奉奚齊及里克殺奚齊卓子而荀息死之是荀息雖有不愛其死之心而不能用之於義也故里克不免弒逆之名荀息不免從昏之罪春秋書之為萬世人臣之戒明矣卓子不當立者也其曰君卓何也國不可曠時無君雖立不以正踰年必稱君也夏齊侯許男伐北戎狄嘗入衛病邢伐晉滅溫楚自召陵之後滅弦圍許而中國不能討也北戎未有害而親將以伐之捨其强而弱是圖失治外之義矣晉殺其大夫里克秋七月冬大雨雪雨雪常也惟大而為害故書獨桓八年雨雪不言大者周之十月今之八月非雨雪之時故以異書也十有一年春晉殺其大夫㔻鄭父夏公及夫人姜氏㑹齊侯于陽榖男女正位天地之大義也魯僖亂之而不自正齊桓與之為亂而不能正皆罪而已矣秋八月大雩冬楚人伐黃十有二年春王三月庚午日有食之夏楚人滅黃不書出奔者君死於其位也秋七月冬十有二月丁丑陳侯杵臼卒十有三年春狄侵衛夏四月葬陳宣公公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹秋九月大雩冬公子友如齊十有四年春諸侯城緣陵說春秋者謂城邢之役不稱齊侯城衛楚丘不書諸侯城把緣陵不序諸侯蓋惡齊侯之專封也不知齊桓以霸自命禮樂征伐悉出其手何者非專而奚獨於封國專之耶春秋又豈容恕其他事之專而獨罪其專封哉蓋齊桓之專制自是終身之罪然其行事之非又有出於專制之外者春秋並著之以垂戒焉不特罪其專而已以城楚丘為封衛先儒之說誤矣其書於春秋者城邢城緣陵爾邢之城以緩書緣陵之城以有闕書明緩而有闕不得為愛人救物之誠者也城緣陵不序諸侯者即㑹鹹之諸侯城之故不復序也夏六月季姬及鄫子遇于防使鄫子來朝季姬不繫之國者內女未嫁者也出而遇鄫子于防使鄫子來請婚已也季姬寧有孟光之賢哉僖公非德愛也左氏謂季姬歸寧而公止之故遇于防而使之朝非也春秋內女適他國者必書曰歸于某季姬先未見於春秋而明年始書之豈得為已嫁鄫哉秋八月辛卯沙鹿崩沙山名鹿足也山冢崒崩且以為異況鹿乎左氏載晉人卜偃之言曰幾年將有大咎國幾亡此其驗也漢書謂春秋沙鹿崩晉史占之後六百四十五年有聖母興是為元皇后其誣甚矣狄侵鄭冬蔡侯肸卒春秋通說卷五
