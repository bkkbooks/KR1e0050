body:
  text: 春秋通説卷十二宋黄仲炎撰定公元年春王榖梁子謂定無正非正始也是不然桓宣之纂立皆書正月豈正始哉然定無正月者昭公薨于乾侯嗣子未立季氏雖專國而其分則人臣不當授正朔於其國故不書正月也此春秋存君之教也三月晉人執宋仲幾于京師晉人執衞侯歸之于京師是諸侯執人于天子之側也晉人執宋仲幾于京師是大夫執人于天子之側也由諸侯之無王以至於大夫之無王則其變極矣夏六月癸亥公之喪至自乾侯戊辰公即位昭公薨于乾侯閱六月而喪還定始即位盖爲季孫所持也秋七月癸巳葬我君昭公九月大雩立煬宫立煬宫猶立武宫也冬十月隕霜殺菽二年春王正月夏五月壬辰雉門及兩觀災因災以明僭也禮天子雉門其外爲庫門臯門其内爲應門路門是天子之門五而雉門爲象魏之門子家駒曰設兩觀乗大路此天子之禮也秋楚人伐吳冬十月新作雉門及兩觀新作者有加於舊也舊已僭矣今又加焉此乃季孫侈土木之奉以蠱其君之心術也以侈欲蠱其君使其君遂於侈欲而他有所不暇於是政柄之在已者可以泰然終執之矣唐宦者仇士良教其徒謂人主減玩好省游幸則吾屬恩且薄而權輕莫若殖財貨盛鷹馬日以聲色侈靡蠱其心使恱不知息則必闇外事萬幾在我矣此即季孫之謀也三年春王正月公如晉至河乃復二月辛卯邾子穿卒夏四月秋葬邾莊公冬仲孫何忌及邾子盟于拔君子不奪人親亦不可奪親也何忌不恤邾子之喪而強之盟奪人親也邾子執喪而盟奪親也四年春王二月癸巳陳侯吳卒三月公㑹劉子晉侯宋公蔡侯衞侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯把伯小邾子齊國夏于召陵侵楚晉自平丘之盟欲以無道行之遂失人心更二十餘年無諸侯㑹盟之事今楚囊瓦以貪虐柄國因裘馬之欲而執唐蔡之君蔡侯誓死歸晉求刷其恥晉爲是故大合諸侯于召陵凡從役者十八國前此未有也豈非囊瓦不道人所同憤故影響於南征之旅有不約而同者歟當是時使有忠良之士爲晉君謀之乗此事機奮伐荆楚則事權在中國不在吳夷矣奈何晉國之政制於貪鄙之臣荀寅取貨於蔡侯弗獲力沮其事以利欲之私而敗天下之義於是侵楚無成諸侯解體矣楚怒而致疾於蔡蔡急而求援於吳吳於是時方有圖中國之志欣然投𬒮引兵赴之一戰勝楚入其國都楚雖頓挫而天下大權吳遂執之而中國之事去矣封豕長蛇流毒滋甚盖召陵侵楚爲之也故合定公四年所載首末考之可以知世道雖衰人心猶可以義起也如此晉無忠良坐失機㑹可爲後世永鑒矣陳氏後傳謂召陵侵楚主其事者劉子爾是不然王室不競久矣成周之城方藉晉魏舒合諸大夫爲之宋仲幾不受功則見執于晉是權在晉也左氏載蔡侯如晉以其子元與其大夫之子爲質焉而請伐楚旣而荀寅言於范獻子以辭蔡侯曽未聞劉子與可否於其間也豈得謂劉子主其事哉劉子王官也晉挾之以令諸侯爾夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之五月公及諸侯盟于臯鼬把伯成卒于㑹六月葬陳惠公許遷于容城秋七月公至自㑹劉卷卒葬把悼公楚人圍蔡晉士鞅衞孔圉帥師伐鮮虞捨諸夏之大計而區區盡力於中山者晉大夫貪鄙之謀也葬劉文公冬十有一月庚午蔡侯以吳子及楚人戰于柏舉楚師敗績其曰蔡侯以吳子者盖謀出於蔡侯而吳爲之用也楚囊瓦出奔鄭庚辰吳入郢楚雄江漢二百餘年地大兵強馮陵上國有方城漢水爲之險蔽雖桓文二霸不能以兵入之今吳人乃能乗一戰之威擣其都邑班處其宫使其君臣奔竄四出幾於覆祀者其故何哉盖瓦以貪虐柄楚國之政不惟諸侯怨之而國人亦莫不怨之也觀柏舉之陳吳夫槩謂闔廬曰楚瓦不仁其臣莫有鬭志先伐之其卒必奔盖不仁而失衆其下必有與之偕亡者此吳人所以得逞其志席卷楚都若渉無人之竟也不然以楚之强大豈其一戰不勝遽不能保其國哉經書楚囊瓦出奔鄭吳入郢其爲有國者不用仁賢以失人心致敗亡者之戒明矣五年春王三月辛亥朔日有食之夏歸粟于蔡歸粟于蔡左氏謂周亟矜無資也周亟矜無資仁術也何以書孟子曰今人乍見孺子將入于井皆有怵惕之心非所以納交於孺子之父母也非所以要譽於郷黨朋友也此言惻隠之心自内而𤼵者所以爲仁之端也若夫有所觀望借恩惠爲締交之計豈得謂之仁哉吳方敗楚天下莫强焉蔡則附吳者也魯方畏吳則不敢不私厚於蔡故歸粟于蔡盖因有所觀望借恩惠爲締交之計而非由怵惕惻隠之心以生者也不然通春秋二百四十二年考之列國饑饉多矣而魯未有以粟歸之者而歸粟于蔡獨見於蔡侯以吳敗楚之明年則其情可見矣故魯之葬宋共姬也以楚不以宋也魯之歸粟于蔡也以吳不以蔡也二者事殊而情類也於越入吳吳在楚而越入吳所謂螳螂捕蝉不知黄雀擬其後也越有數種有東越南越閩越甌越前此國名爲越故春秋以越書之今其自别於羣越始改號於越故春秋以於越書之從赴告之實而已矣六月丙申季孫意如卒秋七月壬子叔孫不敢卒冬晉士鞅帥師圍鮮虞六年春王正月癸亥鄭游速帥師滅許以許男斯歸二月公侵鄭公至自侵鄭或謂魯侯久不親將今親將以侵鄭是稍復其兵權非也盖三家之謀使其君親將以結怨於列國使列國莫之助而後已得以專其國也他日公再侵齊者亦出於此謀爾夏季孫斯仲孫何忌如晉季孫斯新繼父政故挾仲孫如晉要結强援以自固也秋晉人執宋行人樂祁犂冬城中城季孫斯仲孫忌帥師圍鄆仲孫忌不言何杜預云闕文是也公羊子以爲譏二名妄矣春秋列國之君大夫二名者多矣何獨於此焉譏哉七年春王正月夏四月秋齊侯鄭伯盟于鹹齊人執衛行人北宫結以侵衛齊侯衛侯盟于沙大雩齊國夏帥師伐我西鄙自晉失諸侯而齊景有代興之志於是强鄭以信劫衛以威國夏之師又以脅魯盖欲祖乎齊桓滅遂盟柯之故術也然不知今之齊異乎昔之齊矣昔之齊齊侯之齊也今之齊其不爲陳氏幾希矣觀晏子語晉叔向謂民三其力二入於公凍餒疾痛而陳氏實燠休之公弃其民而歸於陳氏夫不能自保其民而欲以威天下霸諸侯此孟子所謂縁木而求魚也九月大雩冬十月八年春王正月公侵齊公至自侵齊二月公侵齊三月公至自侵齊曹伯露卒夏齊國夏帥師伐我西鄙公㑹晉師于瓦公至自瓦晉師之出爲救魯也救魯所以禦齊也齊方爭霸而晉禦齊宜不容緩也今師不果進者盖當時列國之政皆制於大夫晉六卿齊陳氏相爲表裏故晉師之出姑爲是具文以塞責爾秋七月戊辰陳侯柳卒晉士鞅帥師侵鄭遂侵衞葬曹靖公九月葬陳懷公季孫斯仲孫何忌帥師侵衞冬衞侯鄭伯盟于曲濮從祀先公左氏謂陽虎欲去三桓順祀先公而祈焉公榖因之皆以從祀爲順祀復閔於僖之上是大不然如陽虎欲去三桓而祈福於先公何獨求福於閔而復閔於僖之上耶必無是理也春秋書躋僖公必明舉其諡今若退僖亦當明言何乃混然謂之先公也以經意考之從之爲言猶承也今人語遵從即爲遵承漢永光四年詔罷郡國廟謂疏逺卑賤共承尊祀非皇天祖宗之意是也周廟先公后稷魯廟太祖周公今推而上之以承祀后稷祭同於周廟踰禮甚矣韋元成謂父不祭於支庶之室君不祭於臣僕之家主不祭於下土諸侯此即春秋書從祀先公之義也天保之詩曰禴祠烝嘗于公先王箋云公先公后稷也孫氏亦以先公爲后稷盜竊寳玉大弓春秋書盜者不罪爲盜而罪致盜也使爲國者紀綱素立刑政素明則安有盜竊公行之事哉今陽虎以陪臣之賤行亂于國中脫甲公宫竊魯先君之分器以出則魯之無紀綱刑政於此極矣故書曰盜竊寳玉大弓非徒罪分器亡也罪紀綱刑政之亡焉爾九年春王正月夏四月戊申鄭伯蠆卒得寳玉大弓得寳玉大弓者盖陽虎歸之也使陽虎不自歸則魯寜得復之哉故書曰得寳玉大弓言魯無刑政不足以復先君之分器而其得之者幸得之爾六月葬鄭獻公秋齊侯衞侯次于五氏齊欲霸而不能也秦伯卒冬葬秦哀公十年春王三月及齊平夏公㑹齊侯于夾谷公至自夾谷夾谷之㑹孔子相禮盖見於左氏穀梁雜記而論語軻書未嘗及也使孔子實相此禮當其時以齊人爲魯疆埸之虞而求免焉以㑹之何足爲侉詫哉觀春秋書公㑹齊侯于夾谷猶公㑹齊侯于羸之類皆諸侯私㑹焉爾彼俗儒者竊意聖人舉動宜夐異乎常人况儐相㑹同必有赫赫之效於是侈張其狀如所謂視歸乎齊侯命司馬行法斬優施却萊夷索汶陽田等事皆不足信之談爾使實可信則仲尼之智數風采不過如魯曹沬趙藺相如能面折齊秦之君於柯澠池之事似非聖人氣象也方齊景公欲攘晉之霸急於求諸侯以魯未附齊故成仇敵今旣平而㑹將善魯以勸來者何至以兵劫魯侯也況魯政制于三家而魯侯特擁虗器於其上爾齊劫魯侯亦何爲者通春秋考之齊侯㑹盟多矣固未嘗有衷甲之變也今觀左氏載犂彌言於齊侯曰孔丘知禮而無勇若劫之必得志則是魯用孔子反爲齊人所輕而召其變也汲黯在朝淮南爲之寝謀司馬輔政遼人戒其邊吏國有君子固敵國姦人之所敬憚也曽謂聖人相魯乃不逮是就使齊人果有衷甲之變而聖人處此豈無理義之論足以愧之如燭之武之解鄭圍展喜之郤齊寇從容辭氣化暴爲仁亦何至疾聲厲色以兵刃爲威以敢殺爲能以求索爲功哉由此觀之凡侈言夾谷之功者皆淺心陋識未聞孔子之道者也晉趙鞅帥師圍衞齊人來歸鄆讙龜隂田鄭莊之仇宋也以祊田歸魯晉文之求霸也以曹衞田畀宋餌人以利所以固結其心藉爲己用爾今齊以三邑歸魯盖鄭莊晉文之故術也明年黄之盟結魯叛晉又明年垂葭之次使魯師伐晉盖取償於魯也春秋書齊人來歸鄆讙龜隂田與齊人來歸衞寳無異文也王制不行私意奪與均爲有罪焉爾自左氏榖梁子以爲夾谷相禮致之後世儒者遂㳂其説如揚雄氏謂齊人章章歸其侵疆爲魯用聖人之效可謂淺而誣矣孔子仁義禮樂之主也位天地立人極爲前王繼絶統爲萬世開太平非一國之事一時之功也若必以當時動化觀之則孔子以匹夫而居亂世聚天下之英才而游乎其門聰明者黙辯博者訥好勇者怯堂堂者失歩趨於窮厄之日而不忍去築場於哀泣之餘而不能忘故孟子曰以徳服人者中心悦而誠服也如七十子之服孔子也推此道以用天下國家可知己何必以返魯三邑爲盛事哉故曰凡侈言夾谷之功者皆淺心陋識未聞孔子之道者也叔孫州仇仲孫何忌帥師圍郈秋叔孫州仇仲孫何忌帥師圍郈郈叔孫氏邑也侯犯以郈叛故叔仲帥師以圍之圍之不克至於再舉其强可知矣盖春秋之世諸侯無天子故大夫無諸侯大夫無諸侯故陪臣無大夫上行之下效之也宋樂大心出奔曹宋公子地出奔陳冬齊侯衛侯鄭游速㑹于安甫叔孫州仇如齊宋公之弟辰曁仲佗石彄出奔陳宋公以私寵向魋之故使其母弟國卿群然奔叛盖君不君則臣不臣也十有一年春宋公之弟辰及仲佗石彄公子地自陳入于蕭以叛夏四月宋樂大心自曹入于蕭冬及鄭平叔還如鄭蒞盟十有二年春薛伯定卒夏葬薛襄公叔孫州仇帥師墮郈衛公孟彄帥師伐曹季孫斯仲孫何忌帥師墮費夷其險故曰墮盖摧毁其城塹險固而平之也始三家各險其私邑之城以傾公室其後家臣各據其城以傾三家於是叔孫墮郈季孫墮費盖以郈費城郛之險圍之弗克故用大師以墮之也後世有務設險以資叛臣敵國者於此可鑒矣秋大雩冬十月癸亥公㑹齊侯盟于黃結叛晉也前歳齊人歸魯田之計盖在此爾十有一月丙寅朔日有食之公至自黃十有二月公圍成公至自圍成公親將以圍其叛邑返而告至若至自他國者可以見魯四境之内皆敵國矣成孟氏邑而公圍之何也盖三家者亦知自治郈費之難於是使其君圍之盖欲以君之名位臨之也不知由已之無君而三邑之臣亦效其無君久矣故雖以公圍成而弗克也十有三年春齊侯衛侯次于垂葭夏築蛇淵囿大蒐于比蒲衛公孟彄帥師伐曹秋晉趙鞅入于晉陽以叛説者謂荀寅士吉射以伐君不克而奔朝歌實叛也若趙鞅將晉陽之甲以逐君側之惡人是忠於君也而亦書叛者惡兵其君側也兵其君側雖忠猶曰叛也是不然春秋紀事惟其實而已矣未有忠而可謂之叛也趙鞅入于晉陽必犯上無君實為背叛之事如王處仲蘇峻之徒志在僣逆而以誅君側爲名者也冬晉荀寅士吉射入于朝歌以叛晉趙鞅歸于晉薛弑其君比十有四年春衛公叔戍來奔衛趙陽出奔宋二月辛巳楚公子結陳公孫佗人帥師滅頓以頓子牂歸夏衛北宫結來奔五月於越敗吳于檇李吳子光卒公㑹齊侯衛侯于牽公至自㑹秋齊侯宋公㑹于洮齊景公爲牽洮之㑹謀救范中行氏盖黨叛臣以敵君也無君臣之義矣天王使石尚來歸脤榖梁子曰脤爼實也祭肉也生曰脤熟曰膰歸脤猶歸膰也宋先代之後於周爲客故天子有事膰焉盖禮之特異者不例施於諸侯也今石尚歸脤于魯故書衛世子蒯聵出奔宋衛公孟彄出奔鄭易曰有夫婦然後有父子有父子然後有君臣又曰男女正則家道正正家而天下定矣衛靈不道一歳之内世子與其大臣出奔者五人由不能正其家焉爾故始於失夫婦之義而終於失父子君臣之義也蒯聵得罪於母以出而孟彄其黨也宋公之弟辰自蕭來奔大蒐于比蒲邾子來㑹公邾子來㑹公者㑹公于比蒲也其不言公蒐于比蒲者公雖在比蒲而治兵之事實三家主之公不與也城莒父及霄十有五年春王正月邾子來朝鼷鼠食郊牛牛死改卜牛二月辛丑楚子滅胡以胡子豹歸夏五月辛亥郊壬申公薨于髙寢鄭罕逹帥師伐宋齊侯衛侯次于渠蒢邾子來奔喪秋七月壬申姒氏卒姒氏定之妾哀之母也哀公即位未踰年未得以夫人之禮喪其妾母故曰姒氏卒八月庚辰朔日有食之九月滕子來㑹葬禮天子崩諸侯近者奔喪逺者㑹葬今邾滕視魯皆諸侯爾而奔喪㑹葬如事天子之禮者盖春秋之末王室旣㣲霸權又替弱之肉强之食故强者極於暴虐以求多弱者極於奉承以免禍可哀也哉丁巳葬我君定公雨不克葬戊午日下昃乃克葬辛巳葬定姒冬城漆世有得盜賄韞匵而守之者其城漆之類乎漆者邾庶其以之來奔者也春秋通説卷十二
