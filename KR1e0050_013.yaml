body:
  text: 春秋通説卷十三宋黄仲炎撰哀公元年春王正月公即位楚子陳侯隨侯許男圍蔡禮父母之讎不共戴天昔蔡侯以吳子敗楚師致吳入郢壞宗廟撻平王墓楚昭奔隨僅以身免良可痛已旣復國而圍蔡復讎也復讎義也何以書惡其徒逞志于小國也壞宗廟撻平王墓者吳子爾今楚不能報吳而蔡是討未得爲復讎者也鼷鼠食郊牛改卜牛夏四月辛巳郊秋齊侯衛侯伐晉冬仲孫何忌帥師伐邾邾子方朝魯又奔魯喪所以奉魯者至矣無故而伐之何哉盖亂世之人行如禽獸弱之肉强之食也二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田癸巳叔孫州仇仲孫何忌及邾子盟于句繹三人伐而二人盟何也季孫之汰不屑與於盟也盖自視猶君矣夏四月丙子衛侯元卒滕子來朝晉趙鞅帥師納衛世子蒯聵于戚衛世子蒯聵得罪於父靈公以出被天下不孝之名不能爲申生之死幸其父没求入其國以爭君位是蒯聵之無父也輒蒯聵之子也父逐於外不能號慕毁瘠以感動王父而復之位王父死而已立曽不以父亡未復爲辭及蒯聵求入輒拒而不受甚者以兵圍之是輒之無父又甚於蒯聵也父子天性而絶滅至此其與梟獍奚别哉是以子路問衛君待子爲政子將奚先孔子曰必也正名乎名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足聖人之意盖謂蒯聵不父而輒不子父子名義旣悖而不正他何可爲哉冉有問於子貢曰夫子爲衛君乎子貢曰吾將問之入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨出曰夫子不爲也賢兄弟讓則惡父子爭矣故春秋備書蒯聵求納衛師圍戚之事以著父子相戕之禍爲後世戒明矣公羊子妄許衛輒以拒蒯聵爲尊祖天下豈有無父之理哉漢臣雋不疑至引此以斷戾太子事盖公羊誤之也或謂倉卒之際不以此義裁之則奈何曰斥之以詐足矣戾太子旣亡武帝即有追悔之意爲之族江充家黃門蘇文助譖太子至焚殺之李壽加兵刃於太子亦以他事族田千秋一言明太子寃驟至丞相上又作思子宫歸來望思之臺悼念不已盖太子自殺久矣若此時尚在豈有隠而不出者哉且自征和二年太子出亡越後元元年二月立皇子弗陵爲太子已即位五年而有衛太子事非詐而何雖不必謬陳經義可也秋八月甲戌晉趙鞅帥師及鄭罕逹帥師戰于鐡鄭師敗績冬十月葬衛靈公十有一月蔡遷于州來蔡殺其大夫公子駟三年春齊國夏衛石曼姑帥師圍戚齊景公爲衛輒圍蒯聵于戚盖助逆子以圍父也無父子之義矣夏四月甲午地震五月辛卯桓宫僖宫災桓親盡而廟不毁者盖三桓私於其祖也僖亦親盡也僖何以不毁以其存桓不得不存僖也故春秋因二宫之災以著三家之非禮焉爾季孫斯叔孫州仇帥師城啓陽宋樂髠帥師伐曹秋七月丙子季孫斯卒蔡人放其大夫公孫獵于吳冬十月癸卯秦伯卒叔孫州仇仲孫何忌帥師圍邾四年春王二月庚戌盜殺蔡侯申盜殺蔡侯申不言弑非其君也盖盜自他國至者也自他國至者盖刺客也春秋末世禮義不明俗習於亂故有在下之人好務勇俠以犯上爲能以輕死爲義至爲其主報仇他國如聶政荆軻之事者即春秋書盜殺蔡侯申之爲也左氏謂公孫翩逐蔡侯申射之而卒非也若翩是公族大夫春秋當書翩弑其君豈得謂之盜殺蔡侯哉蔡公孫辰出奔吳葬秦惠公宋人執小邾子夏蔡殺其大夫公孫姓公孫霍晉人執戎蠻子赤歸于楚城西郛六月辛丑亳社災春秋書亳社災猶書宣榭火示不忘古也不忘古者懷賢尚徳之教也亳社者湯社也湯都亳故曰亳社社無屋而曰災何也災社木也古者立社必樹所宜木如宰我謂夏以松殷以柏周以栗是也武王翦商而不去亳社者存先代興王之制也自成湯距魯哀時年代久逺社柏之豐大可知己一旦野燎煨燼故春秋重而書之亦猶思其人而愛其樹之意也彼傳者不得其義徒見湯社至周猶存遂曰亡國之社所以爲戒也徒見社無屋而言災遂曰亡國之社屋之也屋之者不使受天陽也信斯言也則武王之於亳社旣存之以爲戒又蔽之使不受天陽則其防慮不亦過乎從傳者之説甚非武王存亳社之美意與春秋書亳社災之深意也秋八月甲寅滕子結卒冬十有二月葬蔡昭公葬滕頃公五年春城毗夏齊侯伐宋晉趙鞅帥師伐衛秋九月癸酉齊侯杵􅍫卒冬叔還如齊閏月葬齊景公禮喪不數閏其以閏月葬數閏也數閏短喪也六年春城邾瑕晉趙鞅帥師伐鮮虞吳伐陳夏齊國夏及髙張來奔叔還㑹吳于柤秋七月庚寅楚子軫卒齊陽生入于齊齊陳乞弑其君荼陳乞者齊之權臣也利於得權而易置其君故立陽生而弑荼也冬仲孫何忌帥師伐邾宋向巢帥師伐曹七年春宋皇瑗帥師侵鄭晉魏曼多帥師侵衞夏公㑹吳于鄫秋公伐邾八月己酉入邾以邾子益來魯之君臣俛首以奉吳令鄫之㑹百牢輸之惟謹爾何怯也至於恃其威力虐執邾君若虎豹之噬羊豕何壯也以是觀之凡能屈己受辱甘爲人下者必其作威肆虐好爲人上者也宋人圍曹冬鄭駟𢎞帥師救曹八年春王正月宋公入曹以曹伯陽歸孟子謂王不待大霸必有大國曹伯陽不量力度徳而悦霸説於公孫彊以背晉而奸宋其速亡也宜哉吳伐我讀春秋而知魯之爲國始末三變焉魯始受敵國之兵如戰于郞戰于奚而不言伐我西鄙者盖邊鄙有備敵至則戰故言戰不言其伐也觀左氏載奚之戰先是齊人侵魯疆吏來告公曰疆埸之事謹守其一而備其不虞姑盡所備焉事至而戰又何謁焉以此知當時魯之邊鄙尚有素備也其後疆場之備弛故敵兵得以乗之而春秋書曰伐我北鄙伐我西鄙然猶見鄰敵之寇止爲邊患而不能直造其國也今哀公之世如受吳齊之師則又不復云伐我北鄙伐我西鄙而直言伐我者以見其直造于我國都也夫使敵兵得踰越邊鄙而直造其國都則其爲國可知矣漢世邊備不講故匈奴數爲邊患然止邊患而已不能控弦深入也至如苻秦之直抵淮淝吐蕃之變及渭橋始不可以邊患言矣其猶吳伐我之謂哉夏齊人取讙及闡歸邾子益于邾魯以不道肆虐于邾物極必反於是吳攻其國齊取其田不勝困挫乃始歸邾子于邾易所謂不威不懲者小人也哉秋七月冬十有二月癸亥把伯過卒齊人歸讙及闡九年春王二月葬把僖公宋皇瑗帥師取鄭師于雍丘取鄭師者盡俘以歸掩爲己有也不言敗言取敗可知矣夏楚人伐陳秋宋公伐鄭冬十月十年春王二月邾子益來奔公㑹吳伐齊三月戊戌齊侯陽生卒夏宋人伐鄭晉趙鞅帥師侵齊五月公至自伐齊葬齊悼公衛公孟彄自齊歸于衛薛伯夷卒秋葬薛惠公冬楚公子結帥師伐陳吳救陳荆楚救中國者非能施徳也爭諸侯焉爾吳季子所謂二君不務徳而力爭是也十有一年春齊國書帥師伐我夏陳轅頗出奔鄭五月公㑹吳伐齊甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書艾陵之戰魯挾吳以讎齊也而不書公者公與伐而不與戰也一戰敗齊而吳益横矣魯季孫曰小勝大禍也齊至無日矣命脩守備焉是徒知小勝大為國之禍而不知戎勝華為天下之禍也故當春秋之季政在大夫禄去公室齊田魯季蹙狹自營舟中之人競為敵國至於挾非類以鬭同儕遂使封豕長蛇之害橫放于天下此仲尼所以猶三嘆於管仲之功也孟子曰五伯者三王之罪人也今之諸侯五伯之罪人也今之大夫今之諸侯之罪人也盖於春秋見之矣秋七月辛酉滕子虞母卒冬十有一月葬滕隠公衛世叔齊出奔宋十有二年春用田賦用田賦者計田以歛民財如漢靈帝時調民田每畝歛十錢之類是也自宣公初稅畝則什取二矣至哀公時有二吾不足之嘆於是以田賦之當時列國如陳轅頗為司徒亦賦封田以嫁公女有餘以為已大器是亦於常賦之外以田歛之也夫為國者用之以道則寡取於民而有餘用之不以道則多取於民而不足魯未稅畝以前豈其國不可為哉特其君臣侈欲不如後日之甚爾故仲尼謂冉有曰君子之行也度於禮施取其厚事舉其中歛從其薄如是則以丘亦足矣所謂以丘亦足者猶言以井丘什一之制亦足也又曰若不度於禮而貪冐無厭則雖以田賦将又不足為人君者可不察哉夏五月甲辰孟子卒魯語陳司敗問昭公知禮乎孔子曰知禮孔子退揖巫馬期而告之曰君子亦有黨乎君娶於吳爲同姓謂之吳孟子君而知禮孰不知禮是陳司敗亦以聖人黨魯昭而爲之諱也不知孔子謂昭公知禮者正未嘗諱也凡人之於禮未必不知之而鮮能行之君娶於吳爲同姓而謂之吳孟子此豈不知禮者哉使不知禮則不謂之孟子矣陳司敗不能察此而以聖人爲黨不亦過乎觀春秋書孟子卒則知昭公諱娶同姓謂非知禮不可也然知諱之而卒娶之則昭公不能行禮之罪自不可掩矣公㑹吳于橐臯秋公㑹衛侯宋皇瑗于鄖宋向曹帥師伐鄭冬十有二月螽十有三年春鄭罕達帥師取宋師于嵒夏許男成卒公㑹晉侯及吳子于黃池黃池之㑹吳霸諸侯而書先晉侯者存中國也楚公子申帥師伐陳於越入吳吳以驟起之雄馮陵中國黃池之㑹遂霸諸侯然身未及還而越入其國兵敗于郊太子爲虜不數年而越滅吳何其亡之驟也魏文侯問吳之所以亡於李克對曰數戰數勝文侯曰數戰數勝國之福也何故亡對曰數戰則民疲數勝則主驕以驕主御疲民未有不亡者也故春秋書於越入吳以爲後世好戰勝而亡國者之戒明矣哉秋公至自㑹晉魏曼多帥師侵衛葬許元公九月螽冬十有一月有星孛于東方盜殺陳夏區夫十有二月螽十有四年春西狩獲麟春秋非災異不書而書獲麟何也先儒之説多矣曰文成致麟也曰麟爲作經之符也曰感麟見之非時而春秋爲之始終也然皆於狩獲之㫖未竟焉夫麟王者之瑞也傳云麟一角眀海内共一主也又其爲物至靈故賈誼弔屈賦云使麒麟可係而覊兮亦何異於犬羊言不可搏執也今麟之見乃爲魯鄙田狩者所得是與熊豕豹鹿同出於罘罝弓矢捕擊委頓之餘故曰西狩獲麟言麟以狩獲厄之甚也王者不興海宇分裂天之未欲平治天下此其證也當是時晉分於三卿齊歸於田氏吳楚爭霸諸侯而於越又竊乗其後周室之命去喪亡無幾矣是以春秋之作始於隠者起周之不王終於麟者止周運之當厄也雖然人事之變至此極矣春秋之紀變於此備矣然亦不特爲麟而止也故以世變大略觀之則始於無王終於無霸始於諸侯强終於大夫强譬諸風日淒𦂳草木黃落則隠桓而下之春秋也天地凜冽冰雪陵厲則定哀而上之春秋也或問孟子曰王者之迹熄而詩亡詩亡然後春秋作以詩攷之如衛鄭齊秦風魯僖頌皆春秋時列國詩也而曰詩亡何哉曰孔子作春秋盖在魯定哀之世是時不復有詩矣非謂自隐始也先儒謂黍離降爲國風不復有雅故曰詩亡非也春秋通說卷十三
