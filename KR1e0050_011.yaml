body:
  text: 春秋通説卷十一宋黃仲炎撰昭公元年春王正月公即位叔孫豹會晉趙武楚公子圍齊國弱宋向戌衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢三月取鄆夏秦伯之弟針出奔晉按左氏秦伯之弟針富於秦懼得罪焉而奔晉猶以車千乘行世有畏影而走之日者不知走之日而影不離身也針懼以富得罪既知富之為已纍矣猶挾纍而逃之豈不愚哉昔鄭公孫黑肱有疾盡歸其邑于公曰生於亂世貴而能貧民無求焉可以後亡齊以崔氏之亂與晏氏邶殿其鄙六十晏子辭曰慶氏之邑足欲故亡吾邑不足欲也益之以邶殿乃足欲足欲亡無日矣不受邶殿非惡富也恐失富也嗚呼使針而知此豈至於出奔哉此可為貪富者之戒也然為人兄而不能詔其弟使之侈富而奔之秦伯亦有罪已六月丁巳邾子華卒晉荀吳帥師敗狄于大鹵秋莒去疾自齊入于莒莒展輿出奔吳叔弓帥師疆鄆田葬邾悼公冬十有一月己酉楚子麋卒楚公子比出奔晉二年春晉侯使韓起來聘夏叔弓如晉秋鄭殺其大夫公孫黑冬公如晉至河乃復季孫宿如晉榖梁子謂公如晉則不得入季孫宿如晉則得入惡季孫宿也不知春秋於季孫何責哉斥其君而禮其臣所以成季孫之亂者晉之罪也三年春王正月丁未滕子原卒夏叔弓如滕五月葬滕成公襄五年季孫行父卒六年滕子來朝名曰朝公實以季孫宿新繼父位而來爾滕為季孫所厚故滕子卒而卿共葬事也秋小邾子來朝八月大雩冬大雨雹季氏專國有無君之志人道乖戾干犯隂陽故冬春之間大雨雹者再時魯人申豐區區以不藏冰為咎可謂矯誣上天矣得非有所畏而不敢正言之歟抑豈非黨附季孫故曲為之解使其君莫之疑歟後世如漢張禹借經學以文姦謂春秋書日食地震為諸侯相殺邊冦內侵所致使成帝不疑王氏盜權者蓋用申豐之術也北燕伯欵出奔齊按左氏燕簡公多嬖寵欲去諸大夫而立其寵人燕大夫殺公之外嬖公懼而奔是昵嬖寵而蔑冢卿失君人之道矣故李德裕戒武宗不宜與賤人圖柄臣者其知此哉四年春王正月大雨雹夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷會于申楚人執徐子秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳執齊慶封殺之遂滅賴九月取鄫春秋國言滅邑言取鄫國也自襄六年見滅於莒遂為莒邑至是魯乘莒亂而有之故言取也書取鄫者明魯人茍貪其土無興滅繼絶之義也冬十有二月乙卯叔孫豹卒五年春王正月舍中軍舍中軍者季氏獨強也左氏謂初作三軍三分公室而各有其一及其舍之四分公室季氏擇二而二子各一楚殺其大夫屈申公如晉夏莒牟夷以牟婁及防兹來奔秋七月公至自晉戊辰叔弓帥師敗莒師于蚡泉魯三家者納莒之叛臣而受其賂邑莒人來討則設詐以敗之豈復有禮義亷恥之心哉茍無禮義亷恥之心則宜其無所不至矣孟子曰無禮義則上下亂此季氏所以逐其君也秦伯卒冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳六年春王正月把伯益姑卒葬秦景公夏季孫宿如晉葬把文公宋華合比出奔衛秋九月大雩楚薳罷帥師伐吳冬叔弓如楚齊侯伐北燕七年春王正月暨齊平平以釋怨復於善也春秋書平則皆非善者也鄭人來輸平結魯以仇宋也公及齊侯平莒及郯假義以為利也宋人及楚人平大夫自相謀也暨齊平三家所欲也及齊平及鄭平結叛晉也故曰皆非善者也若夫暨猶及也二傳有汲汲不得已之辨妄矣書曰咨爾羲暨和又曰及祖甲及我周文王豈亦有汲汲不得已之辨哉三月公如楚叔孫婼如齊涖盟夏四月甲辰朔日有食之秋八月戊辰衛侯惡卒九月公至自楚冬十有一月癸未季孫宿卒十有二月癸亥葬衛襄公八年春陳侯之弟招殺陳世子偃師陳侯寵公子留以搖冢嗣致其弟招殺之於是陳侯卒國內亂楚遂滅陳蓋世子國之本不可動也自古人君以私愛廢殺世子者未有不如陳侯之亂其國者也可不戒哉夏四月辛丑陳侯溺卒叔弓如晉楚人執陳行人干徴師殺之陳公子留出奔鄭秋搜于紅搜狩者因田獵以治兵有國者歲時不能廢也經書搜狩八豈其通二百四十二年之間而搜狩止此歟蓋近於禮者不書書其非禮者也公狩于郎言逺地也公及齊人狩于禚言與讎狩也然猶稱公狩見兵權猶在公也自襄昭以來兵權制於三家故搜于紅大搜于比蒲之類皆不稱公蓋公不得與焉爾陳人殺其大夫公子過大雩冬十月壬午楚師滅陳執陳公子招放之于越殺陳孔奐葬陳哀公九年春叔弓會楚子于陳許遷于夷夏四月陳災秋仲孫貜如齊冬築郎囿十年春王正月夏齊欒施來奔秋七月季孫意如叔弓仲孫貜帥師伐莒戊子晉侯彪卒九月叔孫婼如晉葬晉平公按左氏諸侯之大夫會晉平公葬欲因見新君鄭子皮以幣行至用百兩千人之費舉鄭而言則諸大夫可見矣不亦侈而病民乎流弊日甚至于戰國如秦楚燕魏之會趙葬各出鋭師萬人比諸大夫會葬晉平時又十倍矣淫靡若此民何以堪哉十有二月甲子宋公成卒十有一年春王二月叔弓如宋葬宋平公夏四月丁巳楚子虔誘蔡侯般殺之于申楚子虔誘蔡侯般殺之蓋詐殺也詐殺楚之常習也而春秋必以誘書者明楚之用詐而戒他國之效尤也此義不明而後有為天子而行詐如唐憲宗使曹華殺沂軍士者矣楚子虔何以名傳曰絶之也抑不思楚子虔不道非止一事孰非可絶者何獨於此焉絶之蓋春秋諸侯卒弒殺例稱名故名蔡侯則不得不名楚子也楚公子棄疾帥師圍蔡五月甲申夫人歸氏薨大搜于比蒲搜以大名有盡物之害也喪不廢搜無忌君之心也所以為此者三家焉爾公不與也仲孫貜會邾子盟于祲祥秋季孫意如會晉韓起齊國弱宋華亥衛北宫他鄭罕虎曹人把人于厥憗九月己亥葬我小君齊歸冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之十有二年春齊髙偃帥師納北燕伯于陽三月壬申鄭伯嘉卒夏宋公使華定來聘公如晉至河乃復五月葬鄭簡公楚殺其大夫成熊秋七月冬十月公子憗出奔齊楚子伐徐晉伐鮮虞十有三年春叔弓帥師圍費南蒯以費叛故叔弓帥師圍之也費季氏邑而叔弓圍之何也三家合為一體以弱公室也春秋之世諸侯無天子故大夫無諸侯大夫無諸侯故陪臣無大夫上行之則下效之爾夏四月楚公子比自晉歸于楚弒其君虔于乾溪自古暴虐人之君未有不暴虐其身者也觀楚虔乘晉之衰肆其威𦦨兵車無歲不至於中國執徐子殺齊慶封以討陳亂為名而滅陳殺陳孔奐于徴師以討蔡般為名而滅蔡執蔡世子有用之淫刑以逞視人命如土芥所至風靡沛然自以為得志矣當時晉叔向能先䇿其必自禍曰桀克有緡以喪其國紂克東夷以殞其身楚小位下而亟暴於二王能無咎乎蓋不數年而有乾溪之變春秋備紀其迹以為暴君虐主之戒豈不明哉後代如秦始皇剗滅六國鞭笞宇內侈心肆志亦自以為萬世帝王之業不知一夫作難七廟為墟蓋出乎爾者反乎爾者也楚公子棄疾殺公子比秋公會劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于平丘八月甲戌同盟于平丘公不與盟晉人執季孫意如以歸公至自會平丘之集偶乘楚靈之死爾使楚靈不死晉寧得以合諸侯哉然諸侯方脫楚靈之虐駢首從晉使晉人以德綏之是飢易食渴易飲也今晉人令於諸侯曰寡君有革車四千乘在雖以無道行之必可畏也於是斥魯侯於盟執其大夫以歸蓋借是以威諸侯無乃又倣楚靈之不道乎自是人心失望晉不能合諸侯者十有餘年故春秋書平丘之會盟不但以其盟王官為罪也惡無道焉爾蔡侯廬歸于蔡陳侯吳歸于陳楚平即位封陳蔡而皆復之禮也何以書曰周道既衰諸侯無伯固昔桓公之所恥也冬十月葬蔡靈公公如晉至河乃復吳滅州來十有四年春意如至自晉三月曹伯滕卒夏四月秋葬曹武公八月莒子去疾卒冬莒殺其公子意恢十有五年春王正月吳子夷末卒二月癸酉有事于武宫籥入叔弓卒去樂卒事春秋前書有事于太廟仲遂卒于垂壬午猶繹萬入去籥明有卿佐之喪翌日可廢繹而猶繹非也此書有事于武宫籥入叔弓卒去樂卒事明廟樂既陳雖有卿佐之喪不可以去樂而去樂亦非也可以廢繹而猶繹是薄卿佐之喪也不可以去樂而去樂是輕祖考之祭也豈非昭公之時三家專政故視卿佐之喪重於廟祭歟聖人斟酌典禮而裁處其中以律斯世違乎此者必書使後之王者有考也唐裴寬議廟樂謂廟尊忌卑則作樂廟卑忌尊則備而不奏斯亦庶幾春秋之義矣或曰君在祭樂之中適有卿佐之喪不以聞卒事而以聞夏蔡朝吳出奔鄭六月丁巳朔日有食之秋晉荀吳帥師伐鮮虞冬公如晉十有六年春齊侯伐徐楚子誘戎蠻子殺之夏公至自晉秋八月已亥晉侯夷卒九月大雩季孫意如如晉冬十月葬晉昭公十有七年春小邾子來朝夏六月甲戌朔日有食之秋郯子來朝八月晉荀吳帥師滅陸渾之戎陸渾之戎錯處伊雒王畿之地晉荀吳帥師滅之義也何以書曰荀吳用兵周疆不請命於天子而以有事於雒行詐罔上罪莫大焉其與楚子觀兵而問鼎者情狀不異矣冬有星孛于大辰先儒謂大辰心也心為明堂天子之象前星為太子後星為庶子孛星加心天子嫡庶將亂也觀此年星孛于大辰之後五年景王崩朝猛爭立王室大亂天之垂象信哉楚人及吳戰于長岸十有八年春王三月曹伯須卒夏五月壬午宋衛陳鄭災六月邾人入鄅秋葬曹平公冬許遷于白羽十有九年春宋公伐邾夏五月戊辰許世子止弒其君買三傳皆謂許止進藥於君父而藥殺罪在不嘗藥而被弒君之名若是則罪疑從重豈聖人忠厚之心哉蓋止進藥而藥殺是殺不以刃而以藥也猶漢霍光夫人顯私使乳醫淳于衍行毒藥殺許后是也茍以不嘗藥而蓋其藥殺之情則世之亂臣賊子皆得借是以逃罪矣已卯地震秋齊髙發帥師伐莒冬葬許悼公二十年春王正月夏曹公孫會自鄸出奔宋鄸曹邑也公孫會自鄸出奔宋者蓋自其國都出止于鄸又自鄸而奔宋故春秋以自鄸書爾公羊子乃謂自鄸者叛也不言叛為公子喜時之後諱也喜時賢者也賢者子孫故君子諱之其誣經以誤世甚矣春秋於列國大夫叛則書叛奔則書奔未有奔而可誣為叛也未有叛而可諱為奔也叛者人臣之大惡也昔者周公以管叔監殷管叔以殷叛管叔非聖人之後歟而周公不能赦也今以曹公孫會為賢者之後雖叛其君父而猶為之諱焉則是周公不當誅管叔而當為管叔諱之寧亂天下國家而已矣豈理也哉從公羊之説則凡賢者之後皆可肆其惡而無恐矣秋盜殺衛侯之兄縶賊人犯上曰盜盜殺衛侯之兄縶蓋賤者爾左氏謂殺衛縶者齊豹也齊豹為司寇大夫作其不義而書曰盜非也使衛大夫殺衛公子春秋當以兩下相殺之辭書之不應曰盜殺也若謂大夫作不義故以盜書則春秋大夫之不義至於弒逐其君者衆矣曷不皆以盜書耶冬十月宋華亥向寧華定出奔陳十有一月辛卯蔡侯廬卒二十有一年春王三月葬蔡平公夏晉侯使士鞅來聘宋華亥向寧華定自陳入于宋南里以叛秋七月壬午朔日有食之八月乙亥叔輒卒冬蔡侯朱出奔楚按左氏蔡朝吳奔鄭蔡侯朱奔楚皆由楚臣費無極之讒也詩云讒人罔極交亂四國費無極是已有國家者可無畏哉公如晉至河乃復二十有二年春齊侯伐莒宋華亥向寧華定自宋南里出奔楚大搜于昌間夏四月乙丑天王崩六月叔鞅如京師葬景王王室亂王室亂者朝猛爭國無主乃亂也書曰密邇王室詩曰王室如燬王室之為言猶王家也劉子單子以王猛居于皇秋劉子單子以王猛入于王城冬十月王子猛卒按經書王子猛卒則知上文書王猛者文闕也王則不當名名則不為王矣子猛子朝皆景王庶子也王世子壽早世子朝有寵於王欲立之未成而王崩其朝臣劉蚠單旗惡子朝而立王子猛於是子朝因之以作亂蓋劉單主王子猛而尹氏主王子朝故春秋書劉子單子以王猛居于皇入于王城尹氏立王子朝以見王之冢嗣不能早定而劉單尹氏皆非重臣碩輔各以私意立君為宗社之禍也向使景王能為身後之謀早定世子之位選擇賢佐寄以柱石如漢武帝所以任霍光者則晏駕之後安有庶孽爭攘之禍哉朝用憸壬嗣不早建此禍亂所由起也春秋書之為萬世戒明矣十有二月癸酉朔日有食之二十有三年春王正月叔孫婼如晉癸丑叔鞅卒晉人執我行人叔孫婼晉人圍郊夏六月蔡侯東國卒于楚秋七月莒子庚輿來奔庚輿虐而好劔國人患之其亡也宜哉戊辰吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧雞父之戰七國喪師於吳其為血刃生民之禍可勝歎哉胡子髠沈子逞滅何也滅者覆國絶祀之稱也蓋胡沈空其國之衆以徇危亡之事一敗塗地身死衆殱有滅之道焉故曰滅陳夏齧為吳所生得故曰獲天王居于狄泉尹氏立王子朝天王敬王也敬王立不書而書立王子朝者敬王宜立子朝不宜立也然子朝猛之兄敬王猛之弟也何敬王宜立而子朝不宜立曰天生民而立之君使司牧之豈以為亂首耶是故王者天下歸往之謂也自古聖賢繼世雖不幸不蚤定青宫之器受傳璽於慿几之日則必因羣臣庶民之歸而後踐天位焉漢髙帝崩羣臣迎立代王太尉勃上天子璽代王曰奉宗廟重事也寡人不足以稱羣臣固請然猶西鄉讓者三東鄉讓者再明為衆所戴非巳欲也今子朝以力劫神器塗炭京邑是自為亂首不足以王矣若夫敬王不與於朝猛之爭以待神器之自至非宜在王位者哉故春不書敬王立而書立王子朝者教戒之義明矣或曰王子猛不書立豈亦宜立歟曰子猛卒於方事而未及立者也其曰悼王者追尊之爾八月乙未地震冬公如晉至河有疾乃復公如晉而不得入者四皆不言其故也此獨書有疾乃復以見他還者皆晉人郤之也二十有四年春王二月丙戌仲孫貜卒婼至自晉夏五月乙未朔日有食之秋八月大雩丁酉把伯郁釐卒冬吳滅巢葬把平公二十有五年春叔孫婼如宋夏叔詣會晉趙鞅宋樂大心衛北宫喜鄭遊吉曹人邾人滕人薛人小邾人于黃父有鸜鵒來巢劉向因公榖二傳謂鸜鵒宜穴而巢為隂居陽位之象是不然春秋書有鸜鵒來巢蓋以有為異不以巢為異也鸜鵒非魯地所有今忽有來巢其異可知矣如漢桓帝時濟隂有五色大鳥見于已氏時以為鳳凰者蓋羽孽也續漢志以為政事衰缺梁冀專權所致亦有鸜鵒來巢之類爾秋七月上辛大雩季辛又雩魯大雩僣禮也不踰月再雩是僣禮之中又瀆禮也九月己亥公孫于齊次于陽州程氏論易至屯之九五屯其膏小正吉大正凶以為人君之屯既膏澤有所不下是威權不在已威權不在已而欲驟正之求凶之道也故惟小正則吉小正漸正之也魯昭公之於季孫惟懵於漸正之義而驟伐之故及於禍是殆不然春秋書公孫于齊以見魯侯今日之失國由於前日之失政其禍在漸致而不在驟伐也易曰履霜堅氷至蓋言順也由辨之不早辨也魯政逮於季孫四世矣魯之人民知有季氏而不知有其君與夫諸侯之國知有季孫而不知有魯侯者亦久矣始於僖公成於成襄不能蚤正而預慮及至昭公寄命意如之手身如羇旅受人指麾去亡國無幾矣事勢至此已無可奈何不勝其憤而驟伐之幸而得志則如漢和帝之誅竇憲桓帝之誅梁冀魏孝莊之誅爾朱榮不幸而不勝也則如齊簡公之謀田常髙貴鄉公之討司馬昭唐文宗之圖宦者爾向使不為剛決而務含忍則如齊鬱林王知蕭鸞之有異志而取之不能漢獻帝知曹操之不臣而圖之不果唐昭宗知朱溫之必篡而殺之不克皆翻及於亡雖欲小正之豈可得哉蓋世有病疣者於其萌蘖不能治也月養而歲護之俟其豐大則不可為矣驟決之則速斃不決之則終亦斃其有不斃者幸爾由此觀之有國家者可不謹其微哉齊侯唁公于野井齊侯憫昭公之失國而唁之禮也何以書以齊國之力可以討季孫之罪而不能也徒以言語相勞苦其婦人女子之仁乎冬十月戊辰叔孫婼卒十有一月己亥宋公佐卒于曲棘十有二月齊侯取鄆齊侯取鄆以居公是降公為邑大夫也二十有六年春王正月葬宋元公三月公至自齊居于鄆昭公雖出奔而春秋每歲必書公之所處者存君也存君者天地之大義也故范氏唐鑑用春秋之法削武后紀而系之中宗垂教戒於萬世嚴矣夏公圍成成內邑不附公而圍之宜也何以書按襄十五年齊侯伐我北鄙圍成公救成至遇蓋成邊于齊而齊所欲取者也今昭公在齊而齊因借之以取成謂魯侯名位猶足以加成而成可必得也不知三家者方合黨以去其君而成為孟氏私邑舉其邑之人知有孟氏而不知有魯君者非一日矣故成為孟氏死守以抗昭公如吠堯之犬自為其主豈復可以逆順之理化之哉故書公圍成見為人君而失政之久者雖其國人猶敵國也秋公會齊侯莒子邾子把伯盟于鄟陵季氏逐其君當時列國如齊宋衛莫不有憤焉不平之意欲謀納公如盟于鄟陵會于扈既而皆中輟無成何也蓋齊侯之所信者梁丘據而諸侯之所聽命者范獻子據與獻子皆嗜貨者也於是季孫皆以貨中之故據之言行而齊侯之意回鞅之辨起而宋衛二君之色沮甚矣利賂之為天下害也齊晉之臣溺於利賂雖以逐君之賊如魯季孫者一以賄入則為之變亂白黑顚倒是非庇其罪而不問他可知矣然則貪賄之習其可不深懲也哉公至自會居于鄆九月庚申楚子居卒冬十月天王入于成周杜預謂郟鄏為王城成周為洛陽天王入于成周者蓋敬王去郟鄏之都而遷于成周焉爾緣成周非舊都無堅城可衛故三十二年諸侯之大夫共城之也其不言京師何也京師者衆大之稱臣子尊上之辭也若天王自言則曰成周爾然則諸侯大夫城成周自臣子言之曰京師可也何乃亦謂之成周蓋不言成周則疑為郟鄏矣天王入于成周何以書天子無寧居由天下無勤王之臣子也尹氏召伯毛伯以王子朝奔楚二十有七年春公如齊公至自齊居于鄆夏四月吳弒其君僚楚殺其大夫郤宛秋晉士鞅宋樂祁犂衛北宫喜曹人邾人滕人會于扈冬十月曹伯午卒邾快來奔公如齊公至自齊居于鄆二十有八年春王三月葬曹悼公公如晉次于乾侯夏四月丙戌鄭伯寧卒六月葬鄭定公秋七月癸巳滕子寧卒冬葬滕悼公二十有九年春公至自乾侯居于鄆齊侯使髙張來唁公公如晉次于乾侯夏四月庚子叔詣卒秋七月冬十月鄆潰或謂昭公居鄆而鄆人逃之是不能撫其民之所致不知鄆本莒邑昭公元年取鄆叔弓帥師疆鄆田蓋以兵威劫鄆而有之爾今昭公失國又借齊之力取鄆而居之使鄆人再被兵其視魯侯蓋世讎也雖使昭公善於撫鄆亦恐不足以得其心矣先儒謂秦以逆取天下當無可保之理雖使順守終亦必亡其知鄆潰之義乎三十年春王正月公在乾侯夏六月庚辰晉侯去疾卒秋八月葬晉頃公冬十有二月吳滅徐徐子章羽奔楚被滅之國君死于位非奔則不書奔奔則書奔奔而不名者國小而逺於魯無往來之禮或滅之者不以其名赴史不得其名故不書爾吳滅徐徐子出奔而名者史得其名也三十有一年春王正月公在乾侯季孫意如會晉荀躒于適歷晉侯將納公而先使荀躒會季孫是以納君之事取必於季孫也其可哉齊侯之始謀納公也據取貨以沮之齊宋衛之再謀納公也鞅取貨以沮之今荀躒與季孫為會得無出於此哉是以晉侯雖有納公之志而卒於無成徒以空言慰唁之而已蓋蔽於荀躒而莫之察也自古君德不明為臣下所蔽欺者豈能濟天下之事哉夏四月丁巳薛伯穀卒晉侯使荀躒唁公于乾侯秋葬薛獻公冬黑肱以濫來奔十有二月辛亥朔日有食之三十有二年春王正月公在乾侯取闞夏吳伐越秋七月冬仲孫何忌會晉韓不信齊髙張宋仲幾衛世叔申鄭國參曹人莒人薛人把人小邾人城成周自王室亂敬王立黃屋無寧居者八年而後諸侯大夫始為成周之城非勤王之義矣且諸侯不以身服王事而以大夫共王事尢為不臣也十有二月已未公薨于乾侯春秋通説卷十一
