body:
  text: 春秋通說卷七宋黃仲炎撰文公元年春王正月公即位二月癸亥日有食之天王使叔服來㑹葬桓王崩七年而後葬見諸侯不恤天子之喪也僖公以夏四月葬而王使叔服先二月至魯見天子急於奉諸侯之喪也冠屨倒置至此極矣夏四月丁巳葬我君僖公天王使毛伯來錫公命天子錫諸侯者三諸侯終喪入見則有錫如禮所謂喪畢以士服見天子已見賜之黻冕圭璧然後歸是也諸侯嵗時來朝則有錫如詩所謂君子來朝何錫與之雖無與之路車乗馬又何與之元衮及黼是也能敵王所愾則有錫如詩所謂彤弓弨兮受言藏之我有嘉賔中心貺之鍾鼓旣設一朝饗之是也魯桓以簒弑得國王不能討更追錫之王之失道甚矣若夫文公成公皆非終喪入見與嵗時來朝敵愾而獻功者而王錫命之是恩禮之妄施也晉侯伐衛左氏載晉文公之季年諸侯朝晉衛成公不朝故襄公旣祥使告于諸侯而伐衛先且居曰效尤禍也請君朝王臣從師晉侯朝王于温經不書朝王而書伐衛者朝王正也伐衛不正也春秋之紀事爲戒而已矣故書其不正者不書其正者也伐衛之爲不正何也不務德而務兵也叔孫得臣如京師衛人伐晉衛人以小加大不量力也秋公孫敖㑹晉侯于戚魯以公孫敖㑹晉侯政在大夫也冬十月丁未楚世子商臣弑其君頵唐太子𢎞受春秋於率更令郭瑜至楚世子商臣弑其君喟然廢卷曰聖人垂訓何至此耶瑜曰孔子作春秋善惡必書故商臣之罪千載不滅𢎞曰然所不忍聞願讀他書嗚呼此不特太子𢎞不知春秋而郭瑜所對亦豈知春秋者哉世有不辨五音而借聽於聾者太子𢎞之於郭瑜是也夫亂臣賊子有内蓄姦謀外務掩覆如晉盾許止之類固以書名史册爲懼矣若其直情徑行敢犯大惡如楚商臣者即梟獍蝮蜥惟噬囓是逞何暇懼夫千載不滅之名哉然春秋所以書者正以明其爲禍之慘使世之爲君父者知所謹戒以務絶其萌焉爾易曰臣弑其君子弑其父非一朝一夕之故其所由來者漸矣由辨之不早辨也楚商臣之禍由楚子頵之不早辨也楚子頵之不早辨何也夫爲世子立師傅是世子之德所待以成者也師傅之邪正而世子之善惡分焉故世子與正人居不能不正猶生長於齊而不能不齊言也與不正者居不能無不正猶生長於楚而不能不楚言也商臣蠭目而豺聲固爲忍人然觀其一日弑逆之事皆出其師潘崇之謀則其平日之所見聞薰染者可知矣是則商臣之惡不得專爲氣質之咎也師傅非人而君不早辨此亂之所由作歟嗚呼使郭瑜而知此必足以袪世子𢎞之惑矣公孫敖如齊二年春王二月甲子晉侯及秦師戰于彭衙秦師敗績秦穆公反自殽陵悔過自誓未幾尋怨再致彭衙之衂是雖悔其非而未甞改也悔而不改何取於悔哉晉襄得志於殽可以已矣當秦兵再至則脩文告以郤之若魯展禽所以犒齊師者秦必愧而反矣不此之圖而逞志於再戰是則晉襄之罪也蓋秦穆憤於敗而不能平晉襄狃於勝而不能屈血氣用事而無理義以飬其心終於稔怨結仇黷武殘民而已春秋書秦晉之戰所以爲世之不能懲忿窒慾者之戒嚴矣哉丁丑作僖公主糓梁子云喪主於虞吉主於練作僖公主後也是不然春秋書作者剏始也如作丘甲作三軍蓋前此未有而今始剏也禮虞主用桑練主用栗其狀正方其寸尺則有天子諸侯之異作僖公主必有越乎常度者故書也三月乙巳及晉處父盟夏六月公孫敖㑹宋公陳侯鄭伯晉士縠盟于垂隴晉士縠會盟諸侯晉政在大夫也自十有二月不雨至于秋七月僖公三時不雨必特舉三首月此則歴時而數何也蓋僖三十三年間久不雨纔一見而已故詳言之文十八年閒久不雨者凡三見焉故從省文也糓梁子以爲閔雨不閔雨者妄也八月丁卯大事于太廟躋僖公大事于太廟者吉禘也未除喪而吉禘非禮也其不曰吉禘而曰大事者禘者審諦昭穆之謂也今行逆祀躋僖於閔上以臣先君故不得云禘也以此垂戒而後世猶有以恭陵而在康陵之上先後相踰失其次序如東漢之君者冬晉人宋人陳人鄭人伐秦公子遂如齊納幣使大夫納幣禮也何以書或曰惡居喪而圖婚也是不然案魯以此年十一月當除喪若納幣在十一月以前則爲喪娶在十二月則否今春秋槩以納幣繫於冬時之下不明其爲十一月與十二月者則知聖人所惡不在喪娶矣或又謂若使納幣在十二月喪事甫畢而遽圖婚亦有所未安者是亦不然魯人有朝祥莫歌者子路笑之孔子曰由爾責於人終無已夫聖人酌人情之平不應旣除喪而更以喪娶爲罪也然則何以書趙子謂婚禮不當使公族貴逺嫌也故魯公子遂宋公孫壽納幣然後書之三年春王正月叔孫得臣會晉人宋人陳人衞人鄭人伐沈沈潰夏五月王子虎卒外諸侯之大夫卒必有赴于魯者而經不書不以大夫同於諸侯也王朝之卿卒赴則書尊王朝也秦人伐晉秋楚人圍江雨螽于宋春秋書外國之灾有因弔問而知之者有聞而知之者宋大水公使弔焉是因弔問而知之者也六鷁退飛隕石雨螽之類非弔問也特聞而知之爾雨螽者自上而下者也如漢建武中陳留雨糓如稗實隋大定中京師雨毛如馬尾者皆自上而下也物自上而下者異也雨螽爲甚矣冬公如晉十有二月己巳公及晉侯盟晉陽處父帥師伐楚以救江城濮之役晉車七百乗輔以宋齊秦三大國之師蓋僅而勝楚今以一大夫將偏師而伐之何易歟此非晉之君臣敢於易楚也蓋其意謂楚方圍江而吾不能救則無以爲盟主必救之而憚於合諸侯於是姑出偏師以存救江之名而已故陽處父之師不徑以赴江之急而迂其途以抵方城之外於是號于人曰吾伐楚所以救江也且自秋圍江而晉逮冬遣救兵由他道遲徊數月閒楚師已下江城久矣夫非有救患分災之實而竊其名以欺天下不忠莫甚焉四年春公至自晉夏逆婦姜于齊逆婦而不言逆者之名蓋㣲者也古者冕而親迎猶以爲輕春秋諸侯但使卿行已非禮矣況㣲者乎王通氏曰婚禮廢天下無家道矣狄侵齊秋楚人滅江晉侯伐秦衞侯使寗俞來聘冬十有一月壬寅夫人風氏薨成風僖公之母莊公之嬖也死而稱夫人葬而稱小君所謂並后耦嫡亂之本也惠公仲子亦以妾亂正也而不稱夫人是當時猶不以夫人稱之也今以夫人稱成風則已甚矣或曰子爲君而不得尊其母可乎曰爲人子以所當得者加於其親而親安之則孝在是矣茍以其所不當得者加於其親使其親無以安之可謂孝乎五年春王正月王使榮叔歸含且賵三月辛亥葬我小君成風王使召伯來會葬榮叔之賵成風猶宰咺之賵仲子也召伯會葬抑又甚矣夏公孫敖如晉秦人入鄀秋楚人滅六冬十月甲申許男業卒六年春葬許僖公夏季孫行父如陳秋季孫行父如晉春秋書内大夫出聘者其㫖有四有書以見簡禮者有書以見謟禮者有書以見大夫專命者有書以見大夫私行者所謂簡禮者公孫遂如京師叔孫得臣如京師之類是也諸侯不朝而使大夫聘也諂禮者季孫行父如晉繼於公孫敖如晉之明年之類是也使幣頻煩而不知節也大夫專命者公子遂叔孫得臣如齊之類是也非君命而行也大夫私行者公子友如陳公孫兹如牟季孫行父如陳之類是也蓋公子友以原仲之舊而兹行父以娶婦之故於是托君命以遂其私也八月乙亥晉侯驩卒冬十月公子遂如晉葬晉襄公晉殺其大夫陽處父晉狐射姑出奔狄閏月不告月猶朝于廟自文公怠棄時政以閏月爲非常月而廢告月之禮漸致其後雖常月亦不告矣此子貢所以欲去告朔之餼羊也七年春公伐邾三月甲戌取湏句遂城郚齊靈公與臧紇言伐晉臧紇對曰抑君似䑕夫鼠晝伏夜動不穴於寢廟畏人故也今君聞晉之亂而後作焉非䑕而何觀魯文公聞晉難而伐邾取邑是亦臧紇之所謂䑕者爾夏四月宋公王臣卒宋人殺其大夫戊子晉人及秦人戰于令狐晉先蔑奔秦案左氏晉襄公卒靈公少晉人以難故欲立長君故趙盾使士會先蔑如秦逆公子雍先蔑之使也荀林父止之曰夫人太子猶在而外求君此必不行不聽旣而趙盾與大夫皆患穆嬴乃背先蔑而立靈公以禦秦師故令狐之戰先蔑奔秦大抵平其心以觀天下之故則是非利害未嘗不甚明一或錮於貪欲之私則如逐鹿者不見泰山矣觀荀林父之戒先蔑者平心之言也故卒不能逃其所料惟先蔑之意在於覬覦立君之功而不暇擇焉將以求福乃更得禍此可爲行險者之戒矣狄侵我西鄙秋八月公會諸侯晉大夫盟于扈晉大夫者蓋趙盾也趙盾夾輔幼君以靖晉國之難攝主齊盟使不失霸業可謂有功於國家者矣扈之盟何以書蓋盾内專廢置人主外專盟諸侯非人臣所得爲者此而不治則僭攘之禍接踵於後世矣漢史嚴延年劾奏霍光擅廢立無人臣禮雖寢不報而朝廷肅然敬憚焉夫霍光輔漢功不細矣而延年至以無臣禮劾之漢史以朝廷敬憚稱之豈非有得於春秋之義哉冬徐伐莒公孫敖如莒蒞盟八年春王正月夏四月秋八月戊申天王崩冬十月壬午公子遂會晉趙盾盟于衡雍春秋大夫之專國者未有不外結强援以自固者也公子遂會晉趙盾盟于衡雍其姦謀可見矣乙酉公子遂會雒戎盟于暴伊洛瀍澗中原之近境而謂之雒戎者蓋戎居其間也案左氏僖二十二年秦晉遷陸渾之戎于伊川宣三年楚伐陸渾之戎遂至于雒觀兵于周疆蓋成周伊雒之地徃徃皆戎居之故聖人惡而書之爲後世華戎雜處之戒也自此義不明而後世有因匈奴日逐之至而建南廷以安納之如漢世祖者矣徙武都之氐以實關輔如魏太祖者矣此春秋之學所以不可不講也公孫敖如京師不至而復丙戌奔莒觀遂之專敖之恣則文公之不能制其臣可知矣螽宋人殺其大夫司馬宋司城來奔宋昭公立二年閒大夫之見殺者再奔者一或由强宗犯公室如前年穆襄之族帥國人以攻公殺公孫固公孫鄭故書曰宋殺其大夫是也或以婦人奸國政如此年襄夫人因戴氏之族殺司馬公子卬逐司城蕩意諸故書曰宋殺其大夫司馬宋司城來奔是也蓋紀綱不立政權紛亂則君臣不能相保且仕於亂邦濫嬰戮辱非君子見幾之道也垂戒之義明矣大夫書官而不名史略文也九年春毛伯來求金夫人姜氏如齊婦人歸寧常事也何以書趙子曰無父母而歸寧非禮也二月叔孫得臣如京師辛丑葬襄王公子遂如晉葬晉襄公叔孫得臣如京師葬襄王是夷天子於諸侯也況自文公即位以來王再遣使會僖公成風之葬今天王崩魯不得不一報禮公孫敖將命而逃至於踰時然後叔孫再徃又在毛伯求金之後若有甚不得已者其爲慢上無君可見矣天王崩何以或書葬或不書葬蓋周以葬期告魯與魯遣使會葬則書之不然不書也晉人殺其大夫先都晉靈公幼政在趙盾大夫死者三人由盾之專殺也三月夫人姜氏至自齊晉人殺其夫夫士縠及箕鄭父楚人伐鄭公子遂會晉人宋人衞人許人救鄭夏狄侵齊秋八月曹伯襄卒九月癸酉地震震動也地靜爲常而動爲異也或謂震者戰而非動如漢天鳯三年詔云地有動有震震者有害動者不害是震與動異也曰非也動甚爲戰戰生於動爾豈可岐而二之哉冬楚子使椒來聘案左氏范山言於楚子曰晉君少不在諸侯北方可圖也於是出師以伐鄭遣使以聘魯以此見後代之邊患未有不因制防之隳而肆其侮也書所謂無怠無荒四夷來王信矣哉秦人來歸僖公成風之襚仲子惠公之嬖成風僖公之母也仲子繫之惠公可也成風繫之僖公何哉蓋以仲子爲妻者惠公也故曰惠公仲子以母成風爲夫人者僖公也故曰僖公成風因仲子成風以見惠僖之過也然惠不能正家而乖庶嫡之分僖欲厚其母而不節以禮鈞是二者則惠之過甚於僖矣衣服曰襚所以送死者成風旣葬五年而秦始歸襚不及事矣此又以見秦人之失禮也葬曹共公十年春王三月辛卯臧孫辰卒夏秦伐晉此年秦伐晉成三年鄭伐許昭十二年晉伐鮮虞皆脫人字如夏五闕月是也説春秋者皆云不稱人狄之也抑不思春秋諸侯舉無道之師以伐人者衆矣孰非可狄者何獨是耶宣二年秦伐晉猶此年伐晉也而以秦師書成四年鄭伐許猶三年伐許也而以鄭伯書定四年晉伐鮮虞猶昭十二年伐鮮虞也而以晉士鞅衞孔圉書何爲而不狄之哉此可以見其說之窮矣楚殺其大夫宜申自正月不雨至于秋七月及蘇子盟于女栗冬狄侵宋楚子蔡侯次于厥貉十有一年春楚子伐麇夏叔仲彭生㑹晉郤缺于承筐秋曹伯來朝公子遂如宋狄侵齊冬十月甲午叔孫得臣敗狄於鹹經書敗狄于鹹猶書敗狄于箕敗狄于交剛者惡詐戰也明中國不以信義服其心而區區挾詐以勝之也經書狄三有曰狄曰赤狄曰白狄未甞有所謂長狄者長狄之名起于左氏釋鹹之戰云獲長狄僑如於是公糓二傳因之遂有横身九畝之説大而異之之論其後劉向又指以爲晉齊魯三國篡弑之證可謂誣矣此聖人所以不語怪也十有二年春王正月郕伯來奔把伯來朝二月庚子子叔姬卒子叔姬者公之子未嫁者也卒而書者已許嫁而待以成人之禮也夏楚人圍巢秋滕子來朝秦伯使術來聘冬十有二月戊午晉人秦人戰于河曲季孫行父帥師城諸及鄆城其國邑宜無待於帥師也行父帥師以城諸鄆何也歉於義也案莊二十九年城諸及防則知諸魯地也襄十二年莒人伐我東鄙圍台季孫宿帥師救台遂入鄆則知鄆莒邑也莒邑而魯城之是城非其所有之地也城非其所有而慮莒必争於是乎將兵以徃焉故曰歉於義也其後城成郛至於帥師者蓋懼齊之強猶有説也若城啟陽雖魯之地亦帥師而徃者蓋欲務廣地於封疆之外故借兵力以威其鄰也是亦歉於義故也十有三年春王正月夏五月壬午陳侯朔卒邾子蘧蒢卒自正月不雨至于秋七月太室屋壞書太室屋壞者明不當壞而壞也文公怠禮荒政不足以承宗廟之祀或者隂譴所形乎唐明皇將幸東都而太廟屋壞宰相宋璟蘇頲以爲三年喪未終不可廵幸壞壓之變天戒也請罷東廵脩德以荅至譴此即春秋書大室屋壞之義也冬公如晉衞侯會公于沓狄侵衞十有二月己丑公及晉侯盟公還自晉鄭伯會公于棐自魯仲遂及晉趙盾爲衡雍之盟而後文公倡衞鄭以從晉凡公盟公會皆仲遂主之爾十有四年春王正月公至自晉邾人伐我南鄙叔彭生帥師伐邾夏五月乙亥齊侯潘卒六月公會宋公陳侯衞侯鄭伯許男曹伯晉趙盾癸酉同盟于新城垂隴之盟士縠主諸侯之盟新城之盟趙盾主諸侯之盟而不以士縠趙盾先諸侯者存君臣之分也秋七月有星孛入于北斗孛彗屬也偏指曰彗光芒四出曰孛其言入于北斗者公糓所謂入于魁中是也公至自會晉人納㨗菑于邾弗克納晉趙盾以諸侯之師八百乘納捷菑于邾邾人辭曰齊出玃且長趙盾曰辭順而弗從不祥乃還是過而能改也何以書曰不知其不可爲而爲之者過也㨗菑欲以庶奪嫡是非顯然天下誰不知之盾亦自知之矣而慮其不能加諸人也於是借八百乗之力以壓之旣而屈於邾人之言有終不可以勢力劫者然後退聽烏得爲改過而無罪哉九月甲申公孫敖卒于齊齊公子商人弑其君舍凡嗣子即位逾年則稱君未逾年則稱子未逾年而稱子者明先君殁未逾年縁孝子之心痛割方新不忍稱君且嵗不二君也舍立未逾年而稱君故春秋從而君之所以見舍之非禮焉爾亦猶宣十年齊惠公卒嗣子立未逾年而以爵通於諸侯故春秋亦從而爵之也若夫商人篡弑之惡則不待辨矣宋子哀來奔宋子哀者何宋君之子也春秋書君之子曰子如外書子糾子奚齊内書子般子野之類是父雖無道子不可以逃之也子而逃之失子之道矣宋子哀來奔其諸以昭公無道而逃之歟左氏曰高哀非也當以經爲斷冬單伯如齊齊人執單伯齊人執子叔姬女嫁必待男乃行也子叔姬之嫁也不由逆婦而自歸于齊失待男之義矣單伯送之尤非禮也齊人旣執單伯又執子叔姬是必齊以事怒魯故執其使與其女以恥魯爾左氏謂子叔姬者齊侯舍之母非也經未甞有他國自囚其國内之人而言執者豈得謂之舍母哉今叔姬稱子蓋子者時君之女方嫁齊明矣十有五年春季孫行父如晉三月宋司馬華孫來盟書司馬華孫惡世卿也夏曹伯來朝齊人歸公孫敖之喪公孫敖棄君命而從已氏以自絶於其國罪之大者也今其卒喪皆書于經若不以罪去國者此可見君弱臣強雖大夫有大罪而罰不能加也六月辛丑朔日有食之鼓用牲于社單伯至自齊晉郤缺帥師伐蔡戊申入蔡秋齊人侵我西鄙季孫行父如晉冬十有一月諸侯盟于扈十有二月齊人來歸子叔姬齊侯侵我西鄙遂伐曹入其郛十有六年春季孫行父會齊侯于陽穀齊侯弗及盟夏五月公四不視朔視朔者朔日視朝也朔者一月之始也朔不視朝則一月廢朝可知矣書夏五月公四不視朔以見文公自正月至五月廢朝也六月戊辰公子遂及齊侯盟于郪丘秋八月辛未夫人姜氏薨毁泉臺公羊子曰泉臺者郎臺也先君爲之已毁之蓋臆説爾若實是郞臺而經何以謂之泉臺乎左氏載有蛇自泉宫出入其國秋八月辛未聲姜薨毁泉臺葢魯以泉臺蛇妖所出而壞之也善乎魯申繻有言曰妖由人興也人無釁焉妖不自作人棄常則妖興今文公不知脩德以弭之顧乃歸咎於土木之無知而毁之豈不惑哉故書曰毁泉臺言非勝不祥之道也楚人秦人巴人滅庸冬十有一月宋人弑其君杵臼春秋不名弑君之賊者有二或賤而不足名也或衆而難於定名也宋昭公不能其大夫至于君祖母以及國人而見弑焉葢衆而難於定名也十有七年春晉人衞人陳人鄭人伐宋左氏載諸侯之大夫伐宋討曰何故弑君旣而立文公而還故春秋書曰晉人衞人陳人鄭人伐宋明不能討賊也或曰宋昭公不道不能其大夫至于君祖母以及國人而見弑焉禍由已召雖不討賊不亦可乎曰不然昔紂爲不道武王起而伐之應天順人之舉也而伯夷非之孔子曰伯夷叔齊古之賢人也而謂武未盡善明君臣之義不以無道廢也夏四月癸亥葬我小君聲姜齊侯伐我西鄙六月癸未公及齊侯盟于穀諸侯會于扈秋公至自穀冬公子遂如齊十有八年春王二月丁丑公薨于臺下薨于臺下非其所也秦伯罃卒夏五月戊戌齊人弑其君商人春秋篡弑之賊如魯桓齊懿蔡侯般楚子䖍之類雖幸免於王法之誅而卒受殺身之禍豈非天網不漏其以此始者必以此終歟弑商人者不名蓋賤者也六月癸酉葬我君文公秋公子遂叔孫得臣如齊冬十月子卒案左氏文公二妃敬嬴生宣公敬嬴嬖而私事襄仲宣公長而屬諸襄仲仲見于齊侯而請之齊侯新立而欲親魯許之冬十月仲殺太子惡及視而立宣公仲之立宣因交通宫梱奪正而與邪也故書曰子卒子者未踰年之君也不言弑内辭也上書公子遂叔孫得臣如齊則賊可見矣故曰作春秋而亂臣賊子懼夫人姜氏歸于齊夫人姜氏文公之妻太子惡及視之母也惡視旣爲仲遂所殺姜氏不勝其痛棄魯而歸齊觀其將行哭而過市市人皆哭此其情豈不大可哀哉春秋書姜氏歸于齊歸齊云者言不復返魯也此所以見文公用一仲遂致貽身後之禍不能保其妻子如此然則有國家者可不選任忠賢俾輔于後嗣哉季孫行父如齊莒弑其君庶其春秋通説卷七
