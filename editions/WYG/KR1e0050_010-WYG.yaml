body:
  text: 春秋通説卷十宋黄仲炎撰襄公元年春王正月公即位仲孫蔑㑹晉欒黶宋華元衛甯殖曹人莒人邾人滕人薛人圍宋彭城宋魚石奔楚楚爲之伐宋取彭城使魚石居之是魚石叛君而楚黨叛也諸侯之大夫討而圍之義也何以書政在大夫也夏晉韓厥帥師伐鄭仲孫蔑㑹齊崔杼曹人邾人杞人次于鄫秋楚公子壬夫帥師侵宋九月辛酉天王崩邾子來朝冬衛侯使公孫剽來聘晉侯使荀罃來聘左氏謂諸侯即位小國朝之大國聘焉禮也是知有諸侯而不知有天子也天王崩諸侯莫以君喪爲慼而嘉好之私不廢無臣子之義罪莫大焉尚得謂之禮乎二年春王正月葬簡王鄭師伐宋夏五月庚寅夫人姜氏薨六月庚辰鄭伯睔卒晉師宋師衞甯殖侵鄭惡伐喪也秋七月仲孫蔑㑹晉荀罃宋華元衛孫林父曹人邾人于戚己丑葬我小君齊姜叔孫豹如宋冬仲孫蔑㑹晉荀罃齊崔杼宋華元衞孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢書遂城虎牢惡用巧謀以偪鄭也昔齊桓甞討伐諸侯矣直伐之圍之未用他巧也至晉文城濮之戰狐偃先軫之徒始教其君以譎濟焉又至悼公用孟獻子之言城虎牢以偪鄭盖以虎牢鄭地諸侯之師據而城之扼其險要絶其道里使鄭人廹蹙無聊則不得不聽命於晉是不以城為守而以城為攻也其為計益巧矣夫為計益巧則為毒益深是以生人之禍不至於戰國嬴秦不止也説者多謂虎牢楚鄭之衝晉城而據之卒能遏楚而服鄭乃聖人所與不知城虎牢本不足以遏楚而楚之爭鄭自若也鄭人屢叛而後從者亦由憊於屢伐之故豈城虎牢之功哉且謂城虎牢以偪鄭而聖人與之則孔子乃孫武子之徒春秋乃兵家之書挈攻取之能者以教天下也誣經以誤世罪莫大焉經不繫虎牢於鄭者以十年戍虎牢而繫之鄭而此可以不繫之鄭也楚殺其大夫公子申三年春楚公子嬰齊帥師伐吳吳楚相攻諸侯之福也何以書曰諸侯以自治為福而不以二國相攻為福也幸强暴有相攻之釁而指以為福者此淺智之謀而非仁人之願也仁者之於物無不愛也鳥獸草木猶恐殘之况二國之民乎况吳楚相攻則荆揚之生齒必有被兵革之禍肝腦塗地父子不相保者矣故聖人憫而書之也公如晉夏四月壬戌公及晉侯盟于長樗公至自晉六月公㑹單子晉侯宋公衞侯鄭伯莒子邾子齊世子光己未同盟于雞澤單子王官也其致王官于㑹者是挾天子以令諸侯也盟者不相信也其同王官於盟者是以所不相信者施於所尊也罪莫甚焉陳侯使袁僑如㑹戊寅叔孫豹及諸侯之大夫及陳袁僑盟秋公至自㑹冬晉荀罃帥師伐許四年春王三月己酉陳侯午卒夏叔孫豹如晉秋七月戊子夫人姒氏薨葬陳成公八月辛亥葬我小君定姒冬公如晉陳人圍頓五年春公至自晉夏鄭伯使公子𤼵來聘叔孫豹鄫世子巫如晉叔孫豹覿鄫世子巫于晉以成屬鄫鄫小國也於是有莒患故魯屬之挾巫以覿晉而求庇焉魯人恤小寡之美意也何以書為亡鄫而書也今年豹覿巫于晉明年鄫見滅于莒則知魯為鄫謀者不忠矣世有受人託其妻子而凍餒之且為有罪况受人託國而亡其國者哉雖然亦以見晉悼之不仁也古之聖王子惠困窮惠鮮鰥寡於人情所甚忽者常加念焉此之謂仁也今晉受鄫巫之覿而莫或庇之得非以鄫之困窮削弱不足為中國之利害而遂藐然視之歟非仁者之用心矣仲孫蔑衛孫林父㑹吳于善道秋大雩楚殺其大夫公子壬夫公㑹晉侯宋公陳侯衞侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚雞澤之㑹晉侯使荀㑹逆吳子于淮上吳人不至盖至今始遣壽越如晉而晉人為之張皇焜燿奔走列國之大夫諸侯旣迎之於善道復㑹之於戚正漢汲黯所謂罷敝中國以事逺方之人是也説者皆謂鍾離善道以殊㑹吳書者外之也至㑹于戚遂同於中國是不然殊㑹者非外吳也尊吳爾吳在鍾離而諸大夫徃㑹之故曰㑹吳于鍾離吳在善道而二國徃㑹之故曰㑹吳于善道至戚之㑹吳人實來則不可以徃㑹之例書之故序於諸國之下也若謂戚之㑹春秋遂同之於中國則後日柤之㑹向之㑹復以殊㑹書者豈旣同之而復外之耶公至自㑹冬戍陳楚公子貞帥師伐陳公㑹晉侯宋公衞侯鄭伯曹伯齊世子光救陳十有二月公至自救陳陳有楚患諸侯戍而救之義也何以書不誠於救陳也盖晉之君臣知計利害而不知計是非以鄭居晉楚之衝利害為切則盡力以爭鄭以陳近楚之國利害為輕則不盡力以恤陳觀范宣子之言曰有陳非吾事無之而後可不思陳中國也義所當恤同室有鬬被髮纓冠豈曰非吾事哉戚之㑹諸侯返斾而後遣戍楚師伐陳而諸侯救之是姑存救陳之名而已猶非吾事之急也辛未季孫行父卒六年春王三月壬午把伯姑容卒夏宋華弱來奔秋葬杞桓公滕子來朝莒人滅鄫冬叔孫豹如邾季孫宿如晉十有二月齊侯滅萊七年春郯子來朝夏四月三卜郊不從乃免牲小邾子來朝城費季孫宿專魯之柄務强其私邑以弱公室自謂益城足以為慿藉無窮之計不知他日資南蒯之叛者費之城也然則設險者果何恃哉秋季孫宿如衞八月螽冬十月衞侯使孫林父來聘壬戌及孫林父盟楚公子貞帥師圍陳十有二月公㑹晉侯宋公陳侯衞侯曹伯莒子邾子于鄬鄭伯髠頑如㑹未見諸侯丙戌卒于鄵陳侯逃歸説春秋者皆謂陳侯逃歸罪陳侯也是不然東冰西炭寒者不得不西左淵右畔溺者不得不右陳侯困於楚師之虐而晉不能恤於是逃晉即楚以紓其患盖勢之所驅豈情所樂哉經書陳侯逃歸於㑹于鄬之下所以明晉悼不能恤陳而致陳之逃也責在晉也由此推之凡為人君不能恤其民而致民之叛者亦不得以自恕其責而惟民之責矣故漢龔遂論渤海盗賊以為民困於飢寒而吏不恤之所致此非察於勢之所驅而明為上者之責哉八年春王正月公如晉夏葬鄭僖公鄭人侵蔡獲蔡公子燮季孫宿㑹晉侯鄭伯齊人宋人衞人邾人于邢丘公在晉而季孫宿㑹晉侯盖襄公㣲弱權在季孫故也然晉侯捨魯之君而㑹其權臣亦豈為知義者哉公至自晉莒人伐我東鄙秋九月大雩冬楚公子貞帥師伐鄭晉侯使士匄來聘九年春宋災夏季孫宿如晉五月辛酉夫人姜氏薨秋八月癸未葬我小君穆姜冬公㑹晉侯宋公衞侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光伐鄭十有二月己亥同盟于戲晉悼公三歲之間而伐鄭者四伐而鄭服則盟盟而楚師至則又叛叛而又伐此不可專罪鄭之反覆也觀左氏八年鄭及楚平使伯駢告于晉曰君命敝邑脩而車賦儆而師徒以討亂略蔡人不從敝邑之人不敢寜居悉索敝賦以討于蔡今楚來討曰爾何故稱兵于蔡焚我郊保馮陵我城郭剪焉傾覆無所控告民死亡者非其父兄即其子弟夫人愁痛不知所庇而受盟于楚是則鄭人之情亦可哀已當時晉大夫惟荀罃能自知其過曰我實不能禦楚又不能庇鄭鄭何罪由此言之夫不能庇鄭而徒以責鄭之不服是伐無罪之國戮無辜之民爾勞師徒費盟歃道敝諸侯而不知止焉盖自霸國爭鄭以來未有如晉悼之不仁也楚子伐鄭十年春公㑹晉侯宋公衞侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光㑹吳于柤夏五月甲午遂滅偪陽公至自㑹楚公子貞鄭公孫輒帥師伐宋晉師伐秦秋莒人伐我東鄙公㑹晉侯宋公衞侯曹伯莒子邾子齊世子光滕子薛伯杞伯小邾子伐鄭冬盗殺鄭公子騑公子𤼵公孫輒春秋書盗者不罪為盗而罪致盗者也夫不罪為盗者非以盗為無罪也為不足罪爾茍為國者必能脩禮義之教明刑政之防其徳足以愛而人不忍其威足以畏而人不敢則安有盗犯其上者哉禮義不立刑政不脩其徳不足愛而怨叛起其威不足畏而侮慢生此盗所由作也易曰負且乘致寇至即春秋書盗之義也戍鄭虎牢楚公子貞帥師救鄭公至自伐鄭十有一年春王正月作三軍周制天子六軍諸侯之大者三軍次國二軍魯為次國舊止二軍爾今三家專魯於是三分公室而各有其一又増為一軍故曰作三軍也或謂魯頌云公徒三萬鄭氏注萬二千五百人為軍則三軍魯之舊爾何以謂之作三軍耶不知凡舉成數皆舉所近者若魯三軍則是三萬七千五百人大數當為四萬此頌美僖公宜侈其事不應減退其數以三萬言也此可見公徒三萬止謂二軍明矣夏四月四卜郊不從乃不郊鄭公孫舍之帥師侵宋公㑹晉侯宋公衞侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭秋七月己未同盟于亳城北公至自伐鄭楚子鄭伯伐宋公㑹晉侯宋公衞侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭㑹于蕭魚先儒多謂蕭魚之㑹不以盟書盖晉悼公推誠以感鄭故鄭亦以誠應之自是鄭不叛晉者二十有四年殊不思至誠感人帝王盛徳也晉悼公三歲之間大舉兵以加鄭者四挾瘠牛僨豚之勢惟恐鄭之不速斃也蕭魚之㑹特諸侯㑹爾若悼公待鄭則未能推赤心忘盟誓也當伯駢行成之際晉趙武入盟鄭伯鄭子展出盟晉侯而經不書以其不勝書故略之爾誠何有焉然自是不復叛者盖鄭被晉楚之師至是不勝憊矣不惟鄭憊而諸侯之師亦疲矣不惟諸侯疲而楚人之力亦困矣楚力旣困故其怒止於執鄭告絶之行人明年楚子審卒國内多事自是有吳人之敵疲於戰爭故不暇及鄭爾向使蕭魚之後楚之討鄭未巳則鄭人必又將受盟于楚而晉人必又將帥諸侯悉師以起矣夫論事不窮其實而舉盛徳之譽加於黷武之人使不仁者得竊仁之名則夫人何畏而不為不仁哉公至自㑹楚人執鄭行人良霄冬秦人伐晉十有二年春王三月莒人伐我東鄙圍台季孫宿帥師救台遂入鄆榖梁子謂遂繼事也受命而救台不受命而入鄆不知宿方專魯雖首事救台亦豈受命邪夏晉侯使士魴來聘秋九月吳子乘卒冬楚公子貞帥師侵宋公如晉十有三年春公至自晉夏取邿秋九月庚辰楚子審卒冬城防十有四年春王正月季孫宿叔老㑹晉士匄齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人㑹吳于向二月乙未朔日有食之夏四月叔孫豹㑹晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人伐秦已未衛侯出奔齊衛孫林父之出其君罪不容誅矣然使衞侯無甚失徳國人與之雖百林父亦安能肆其逆哉按左氏衛侯戒孫文子甯惠子食皆服而朝日旰不召射鴻于囿二子從之不釋皮冠而與之言棄信與禮他可知矣故師矌語晉侯曰良君將賞善而罰􅁋養民如子盖之如天容之如地民奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆其可出乎夫君神之主民之望也若困民之主匱神乏祀百姓絶望社稷無主將安用之弗去何為天生民而立之君使司牧之勿使失性天之愛民甚矣豈其使一人肆於民上以從其􅁋而弃天地之性必不然矣故春秋書衛侯出奔齊豈不足為後世人君之明戒哉衛侯不書名杜預云從告文也莒人侵我東鄙秋楚公子貞帥師伐吳冬季孫宿㑹晉士匄宋華閱衛孫林父鄭公孫蠆莒人邾人于戚㑹于戚謀定衛也衛孫林父出其君其罪大矣不令之臣天下所惡也今晉不能討乃因以定之豈非列國大夫皆林父之輩同惡而相濟歟十有五年春宋公使向戌來聘二月已亥及向戌盟于劉劉夏逆王后于齊春秋十二王而逆后者二盖以非禮而書也祭公因外交而逆者也劉夏非卿而逆者也因外交而逆者不稟命於王也非卿而逆者輕母儀之道也夏齊侯伐我北鄙圍成公救成至遇魯國三軍制於三家公室兵力不足故救成而不敢進也季孫宿叔孫豹帥師城成郛城成郛者名曰備齊其實城孟氏私邑爾假齊藉口以遂其私欺君罔上之謀也然孟氏邑而叔季城之何也三家合為一體以弱公室也秋八月丁已日有食之邾人伐我南鄙冬十有一月癸亥晉侯周卒十有六年春王正月葬晉悼公三月公㑹晉侯宋公衞侯鄭伯曹伯莒子邾子薛伯把伯小邾子于湨梁戊寅大夫盟或謂雞澤之㑹諸大夫與陳袁僑盟而曰諸侯之大夫此不曰諸侯者見晉悼雖使大夫任政而其精神猶足以制之故曰諸侯之大夫言有君也平公昏庸大夫直主中國之盟不復有君矣故不曰諸侯也是不然春秋凡出内大夫之名則書諸侯之大夫不出内大夫之名則不書諸侯之大夫也襄三年叔孫豹及諸侯之大夫盟二十六年豹及諸侯之大夫盟所謂出内大夫之名則曰諸侯之大夫是也湨梁之盟所謂不出内大夫之名則不曰諸侯之大夫是也皆所以見公室之㣲大夫强而任政也晉人執莒子邾子以歸齊侯伐我北鄙夏公至自㑹五月甲子地震叔老㑹鄭伯晉荀偃衞甯殖宋人伐許秋齊侯伐我北鄙圍成大雩冬叔孫豹如晉十有七年春王二月庚午邾子牼卒宋人伐陳夏衞石買帥師伐曹秋齊侯伐我北鄙圍桃髙厚帥師伐我北鄙圍防九月大雩宋華臣出奔陳冬邾人伐我南鄙十有八年春白狄來書白狄來者猶書介葛盧來之義也夏晉人執衞行人石買秋齊侯伐我北鄙冬十月公㑹晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊齊環數行不義陵虐魯國晉平公帥諸侯討之義也何以書曰晉平不能奉辭以討齊徒圍以重兵焚其四郭齊之民何罪哉然卒不得其服而止是以聖人惡而書之也杜預謂諸侯同心俱圍齊故曰同圍不知僖四年齊帥諸侯伐楚定四年晉帥諸侯侵楚時楚行不義而諸侯討之亦不可謂不同心者矣而不以同伐同侵書也盖同圍者經文圍字略如同字重冩之誤爾曹伯負芻卒于師楚公子午帥師伐鄭十有九年春王正月諸侯盟于祝柯晉人執邾子公至自伐齊取邾田自漷水昔申叔時謂楚子曰牽牛以蹊人之田而奪之牛牽牛以蹊信有罪矣而奪之牛罰已重矣以討召諸侯而以貪終之無乃不可乎邾人黨齊以伐魯牽牛以蹊者也取邾田自漷水而奪之牛也盖晉暴而魯貪也季孫宿如晉葬曹成公夏衞孫林父帥師伐齊秋七月辛卯齊侯環卒晉士匄帥師侵齊至穀聞齊侯卒乃還聞喪不伐而班師事之至善者也何以書榖梁子曰君不尸小事臣不專大名士匄外專君命故非之也然則為士匄宜奈何墠帷而歸命于介此説得之如公羊子云進退在大夫謬矣春秋之亂正在於人臣之無君故聖人惡而書之茍不以君命雖事之至善如士匄不伐喪者猶為有罪况不善者哉此義行而人臣之分得矣後世若隋髙熲將兵伐陳㑹陳有喪必請於文帝奉詔而班師斯亦庶幾春秋之義也八月丙辰仲孫蔑卒齊殺其大夫髙厚鄭殺其大夫公子嘉冬葬齊靈公城西郛西郛内城也古者天子守在四夷天子卑守在諸侯諸侯守在四鄰諸侯卑守在四竟今魯襄懼齊而城西郛是又捨四竟而守内城可謂卑之甚矣孟子曰國家閑暇及是時明其政刑雖大國必畏之矣豈徒以城築為固哉叔孫豹㑹晉士匄于柯城武城二十年春王正月辛亥仲孫速㑹莒人盟于向夏六月庚申公㑹晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子盟于澶淵霸者合諸侯大率以强弱為尊卑而王爵廢矣故齊侯爵也而處宋公之上薛與杞伯爵也而位莒子邾子之下豈非齊視宋為强把薛視邾莒為弱因其强弱而先後之歟此與匈奴之俗貴壯健而賤老弱者不異矣秋公至自㑹仲孫速帥師伐邾蔡殺其大夫公子燮左氏謂蔡公子燮欲以蔡之晉蔡人殺之書曰蔡殺其大夫公子燮言不與民同欲也盖其説有未盡者夫蔡公子燮欲去楚之晉是明于去舍之分者葢擇能者百事之義也雖不同衆而可以化衆不合俗而可以變俗聖人烏得而罪之然其可罪者在於不知化衆變俗之方爾蔡人習於事楚之久而非一旦所能奪也為燮之賛君者當以逆順之理開道其國人如盤庚遷都必先敷其所謂心腹腎腸者雖人心始疑未有不終信也茍獨持己見斷以必行不能開道羣情使之勉聽非取禍之道哉燮之見殺殆為是也春秋賤人犯上者書盗今殺燮者下之人爾不書盗而書蔡人何也盖蔡之大夫亦有與於殺燮者也蔡公子履出奔楚陳侯之弟黄出奔楚叔老如齊冬十月丙辰朔日有食之季孫宿如宋二十有一年春王正月公如晉邾庶其以漆閭丘來奔左氏謂邾庶其莒牟夷邾黒肱皆以地來奔求食而已不求其名故春秋皆名之以章其惡焉説者多從之而不知非聖人意也夫庶其牟夷黒肱竊邑叛君為盜賊穿窬之事彼何暇以書名史冊爲愧哉而盜賊穿窬之輩亦何足以重辱君子之譏哉然春秋所以書者正以見魯之罪焉耳當叛人竊邑奔竄使天下諸侯皆莫之容則盗賊穿窬之事當不禁而自絶今乃利其賂邑而招聚之則世之叛竊者復何所憚哉魯以周公伯禽之國而為盗賊穿窬之淵藪盗所隠器與盗同罪是以聖人惡而書之非徒以責叛人也庶其牟夷黒肱者邾莒之大夫也惟大夫得食采邑故以邑奔非大夫不得以邑奔矣左氏以為庶其非卿以地來雖賤必書尤妄也春秋非大夫不名夏公至自晉秋晉欒盈出奔楚九月庚戌朔日有食之冬十月庚辰朔日有食之曹伯來朝公㑹晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子于商任二十有二年春王正月公至自㑹夏四月秋七月辛酉叔老卒冬公㑹晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子薛伯把伯小邾子于沙隨公至自㑹楚殺其大夫公子追舒二十有三年春王二月癸酉朔日有食之三月巳已把伯匄卒夏邾畀我來奔葬把孝公陳殺其大夫慶虎及慶寅陳侯之弟黄自楚歸于陳陳侯之弟黄出奔楚有千乘之國而不能容其弟也陳侯之弟黄自楚歸于陳挾强楚之勢以制其兄也天倫之滅至此極矣晉欒盈復入于晉入于曲沃秋齊侯伐衞遂伐晉八月叔孫豹帥師救晉次于雍榆魯弱于齊而不能抗齊久矣豹豈不知之何待至雍榆而後止耶盖昔日魯有齊患而晉為之合諸侯以圍之晉有齊患魯於義不容恝也於是出救晉之師以為名而已矣已卯仲孫速卒冬十月乙亥臧孫紇出奔邾蘧伯玉曰不以道事君者其出乎晉人殺欒盈晉欒盈一奔臣爾非有兵柄在其手也當其奔楚之時平公為之再合諸侯于商任沙隨以錮之而卒莫能制之也至於自楚奔齊自齊入絳使其君臣奔走舉國騷動盖僅而後勝之此其故何哉主威衰奪政出多門卿大夫之間各為朋黨韓趙范中行氏則與欒盈為仇魏獻子及七輿大夫則與欒盈為黨故欒盈之亡也由范宣子逐之其復入也由魏獻子主之爾向使政由君出能正典刑羣臣同心以屏邪慝則安有奔亡復入如欒盈者哉平公不能知此區區率諸侯為錮欒氏之謀是猶寇在室廬而操挺刃以索諸路盖亦踈矣為人君者可不鑒哉齊侯襲莒二十有四年春叔孫豹如晉仲孫羯帥師侵齊夏楚子伐吳秋七月甲子朔日有食之旣齊崔杼帥師伐莒大水八月癸巳朔日有食之公㑹晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀冬楚子蔡侯陳侯許男伐鄭公至自㑹陳鍼宜咎出奔楚叔孫豹如京師大饑二十有五年春齊崔杼帥師伐我北鄙夏五月乙亥齊崔杼弑其君光齊崔杼自虚朾同盟專國柄者二十五年矣而其君終莫之疑也是以一旦動於惡焉易曰履霜堅冰至盖言順也臣弑其君子弑其父非一朝一夕之故其所由來漸矣由辨之不早辨也聖人於易示其象於春秋著其事所以為後世人君之戒嚴矣公㑹晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀齊取朝歌者晉人之私憾也杼弑其君天下之大惡也今晉㑹于夷儀伐齊以報朝歌之役齊人以弑君説而遂釋之是知有一已之私憾而不知有天下之大惡也昔者晉中行穆子圍鼓鼓人或請以城叛穆子弗許曰或以吾城叛吾所甚惡也人以城來我獨何好焉吾不可以欲城而邇姦所喪滋多乃殺叛人是不以已私欲而成人之叛也今晉平公以已私憾而成弑君之賊其亦異於穆子矣六月壬子鄭公孫舍之帥師入陳秋八月巳已諸侯同盟於重丘公至自㑹衞侯入于夷儀楚屈建帥師滅舒鳩冬鄭公孫夏帥師伐陳十有二月吳子遏伐楚門于巢卒二十有六年春王二月辛卯衞甯喜弑其君剽孫林父甯殖逐其君衎而立剽十三年矣今甯喜復弑其君剽而納衎視易置其君不如奕棋者何哉觀衎之求復使與甯喜言曰茍反政由甯氏祭則寡人盖喜之弑剽而納衎為政將由已故也其心本貪於專政其謀乃至於易君由此觀之國有專政之臣其為君者危亦甚矣衞孫林父入于戚以叛甲午衞侯衎復歸于衞夏晉侯使荀吳來聘公㑹晉人鄭良霄宋人曹人于澶淵秋宋公殺其世子痤晉獻公蔽於驪姬之䜛殺世子申生終其身莫之悔也宋平公惑於伊戾之譖致世子痤縊而死然徐悟其無罪也乃亨伊戾比晉獻公之罪可末減矣而春秋必書殺世子者所以戒後世為君父者來讒賊以滅天性雖悔罪不能贖也可不謹哉漢武帝信江充之誣殺戾太子其後感悟因車千秋之言明太子無罪遂族滅江充且為歸來望思之臺以寓其悲傷之意然則何及哉使武帝甞攷諸春秋書宋平公殺世子痤之事知後悔之無益則當致察於太子未亡之日矣晉人執衞甯喜八月壬午許男甯卒于楚冬楚子蔡侯陳侯伐鄭葬許靈公二十有七年春齊侯使慶封來聘夏叔孫豹㑹晉趙武楚屈建蔡公孫歸生衞石惡陳孔奐鄭良霄許人曹人于宋宋之㑹晉楚分霸也盖晉屈於楚而以弭兵為名也於是盟于宋楚先晉歃而書先晉者抑楚以存晉也衞殺其大夫甯喜人臣專國至於挾廢置人君之權鮮有不為其君所忌而及於禍者也霍光擁昭立宣存漢社稷然使天子凜然於驂乘之際卒貽赤滅之誅夫以霍光忠貫日月猶不免禍况以立君為利如衞甯喜者哉故雖有立衎之功而卒不為衎所容者術使然也此可以戒亂臣矣衞侯之弟鱄出奔晉秋七月辛巳豹及諸侯之大夫盟于宋冬十有二月乙亥朔日有食之二十有八年春無冰夏衞石惡出奔晉邾子來朝秋八月大雩仲孫羯如晉冬齊慶封來奔十有一月公如楚十有二月甲寅天王崩乙未楚子昭卒十二月甲寅天王崩乙未楚子昭卒盖相去四十二日則閏月明矣而不書閏月者明喪不數閏也禮謂三年之喪二十五月而畢若喪以閏數則二年之内已有二十五月安得謂之三年哉晉簡文帝之喪再周而遇閏博士謝攸引春秋乙未楚子昭卒之文不云閏月而言十二月者附正於前月喪事先逺以閏月祥此論得之矣二十有九年春王正月公在楚據春秋成公昭公皆正月在晉不書而此書在楚何也晉中國也公在中國猶在其國不為危且辱也若夫楚南蠻也而以秉禮之國徃朝事之至於滯留之久衣冠玉帛委在荆蠻已大屈辱矣而况非我族類其心必異得無有衷甲之變如宋之盟囚執之禍如唐侯蔡侯者哉此又可危之甚矣故春秋從逐君之例於歳正月書公在楚所以明臣子憂君父之情垂教於萬世者篤矣嗚呼使永嘉之臣子能講春秋之義則安有青衣行酒之辱哉夏五月公至自楚庚午衞侯衎卒閽弑吳子餘祭易説卦艮為閽寺唐李訓謂古閽氏今宦官也閽弑吳子豈無故而然哉是必由吳子與之狎昵或任以政事使不知其君之威而後動於惡爾故春秋書閽弑吳子餘祭所以為人君狎昵閹宦者之戒也自此義不明而後漢唐人主皆被其禍而國家亂亡隨之雖唐文宗有感於春秋之義内謀翦除而卒貽甘露之變蹀血禁廷者此非春秋誤之也盖春秋紀禍之著正欲為人君者有所戒懼而謹其㣲焉爾儻不於其㣲而致謹焉如蘇洵所謂旣去又去旣踈又踈始與之狎昵終委之政柄使禍亂之根盤結而不可㧞乃欲以一朝除之難矣仲孫羯㑹晉荀盈齊髙止宋華定衞世叔儀鄭公孫段曹人莒人滕人薛人小邾人城杞晉平公杞出也故治把子太叔所謂不恤宗周之闕而夏肄是屏者固已非義矣况大夫為政也哉晉侯使士鞅來聘把子來盟吳子使札來聘胡氏謂季札遜國事聖人不取故於春秋書吳子使札來聘無異於楚椒盖以不稱氏族為貶也不知春秋之紀事皆為戒而已矣不以稱氏族為襃亦不以不稱氏族為貶也椒札之名薳罷之氏公子嬰齊之族皆以見吳楚之强爭諸侯奸中國而已非有輕重於其間也若夫遜國之事自是季札之善聘魯之役自是吳子之謀二者不相關也聖人豈得因其聘魯而致不足於其遜國也哉秋九月葬衞獻公齊髙止出奔北燕冬仲孫羯如晉三十年春王正月楚子使薳罷來聘夏四月蔡世子般弑其君固五月甲午宋災宋伯姬卒經書宋災宋伯姬卒自是兩節如秋八月己巳諸侯同盟于重丘公至自㑹是公之還不必同於己巳諸侯盟之日也庚午衞侯衎卒閽弑吳子餘祭是閽之弑不必同於庚午衞侯卒之日也以此推之則宋伯姬卒亦豈必同於宋災之日哉左氏見經書宋伯姬卒於宋災之下遂謂伯姬待姆而逮於火也公榖二傳從而張其説謂春秋賢其正行凡所以書納幣書來媵書歸宋書卒葬詳其事者賢伯姬故也不知春秋所以詳其事者豈為是哉聖人豈以一婦人待姆之賢而書之若此費辭哉盖經書公孫壽納幣嫌使公孫也三國來媵惡非禮也伯姬歸于宋不待親迎而行也此書宋伯姬卒以書葬不可以不書卒也然而書葬者何也春秋諸侯之奉霸主也必使大夫弔喪卿共葬事而施於他國者殆鮮焉今為宋夫人卒而使卿共葬事若奉霸主者不已過乎此無他自宋向戌善於楚屈建克合晉楚之成故諸侯之畏楚者不敢不厚於宋是以叔弓為宋夫人送葬者為宋向戌也為宋向戌者為楚屈建也不然魯女適諸侯卒者多矣未有書卿送葬者而書卿送葬獨於共姬見之可以察其情矣禮不于其宜而于其勢此聖人所以惡魯也天王殺其弟佞夫王子瑕奔晉秋七月叔弓如宋葬宋共姬鄭良霄出奔許自許入于鄭鄭人殺良霄冬十月葬蔡景公晉人齊人宋人衞人鄭人曹人莒人邾人滕人薛人把人小邾人㑹于澶淵宋災故經書諸侯之㑹皆非禮也然未嘗書其所為而書其所為者舉其尤者爾㑹于稷以成宋亂㑹于澶淵宋災故是也蔡般以世子弑君父大惡也宋災小事也舎大惡不討而謀宋災所謂不能三年之喪而緦小功之察也自晉人廢討賊之義而後楚子虔得竊是義以行之以討陳亂為名而滅陳以討蔡亂為名而滅蔡盖澶淵之㑹為之也三十有一年春王正月夏六月辛巳公薨于楚宫楚宫者杜預謂公適楚好其宫歸而作之是也秋九月癸巳子野卒左氏載公薨于楚宫立胡女敬歸之子子野次于季氏秋九月癸巳卒毁也其曰毁者左氏失之爾公薨子野立則立子野者襄公所命也時季氏專國以為子野非已所立故於其次于季氏而害之以毁聞爾春秋書子野卒於公薨之下則姦臣之情狀豈不可見哉其曰子者未逾年之君也為内諱故不言弑猶子般子赤卒不言弑也已亥仲孫羯卒冬十月滕子來㑹葬癸酉葬我君襄公十有一月莒人弑其君密州春秋通說卷十
