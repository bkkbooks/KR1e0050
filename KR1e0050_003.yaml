body:
  text: 春秋通說卷三宋黃仲炎撰莊公元年春王正月三月夫人孫于齊榖梁子曰不言氏姓貶之也信斯言也則夫人前乎如齊與聞殺夫之事後乎禚之㑹祝邱之享顯示宣淫之迹而書姜氏者獨無貶乎曰春秋書其事即見其罪焉爾不必去氏姓以為貶也孫奔也奔而謂之孫内辭也臣子之於國惡不忍斥言之故婉其文焉奔而曰孫猶弑而曰薨之類皆内辭也然雖婉其文而未嘗没其實故言孫以見奔不地以見弑垂戒之義明矣夏單伯逆王姬單伯魯大夫爾左氏因見周有劉單遂以單伯為周大夫非也以左氏攷之列國大夫同姓氏者多矣如周有申伯鄭亦有申侯楚亦有申舟魯亦有申繻如衛有孔達宋亦有孔父鄭亦有孔叔陳亦有孔寜摭此之類可以知魯之單非周之單矣單伯逆王姬何以書王嫁女於齊而使魯主之也魯君見殺于齊君父之讎臣子不共戴天者也而為之主婚禮於衰絰之中無恩義之大者也然則王命辭乎曰君子不奪人親而亦不可奪親也王命使之奪人親也魯不辭而從命奪親也本朝夏竦以父死河朔母喪未除遂辭使北之命其抗表云義不戴天難下穹廬之拜禮當枕塊忍聞夷樂之音盖義得辭也秋築王姬之館于外榖梁子曰築之外變之正也仇讎之人非所以接昏姻也衰麻非以接弁冕也其說似是而非也盖春秋之義以為築之之為宜不若辭之之為正也冬十月乙亥陳侯林卒王使榮叔來錫桓公命啖助謂王不稱天者寵篡逆以黷三綱不能法天立道故去天以貶之信斯言也則孔子修春秋不但行法於諸侯大夫而禠奪其爵氏又將加討於天王而禠奪其稱號也不亦甚僭矣哉况桓之立四年天王使宰渠伯糾來聘五年使仍叔之子來聘八年使家父來聘此非寵篡逆以黷三綱不能法天立道乎而皆稱天王也何獨於追錫桓公命而去天以示貶哉若以去天示貶則每嵗正月所書之王不稱天者豈皆貶哉此可以見其妄矣盖春秋稱王稱天王稱天子者其義一爾若夫書其事即見其罪不以去天為貶也朱氏亦謂若稱天王其罪自見王姬歸于齊齊師遷紀郱鄑郚徙其國邑人民曰遷盖取之也紀蕞爾國而齊師一旦取其三邑則其國不可存矣齊襄禽獸之行何止宣淫也哉弱之肉强之食是亦禽獸而已矣二年春王二月葬陳莊公夏公子慶父帥師伐於餘丘於餘丘者猶咸丘祝丘中丘皆魯邑也邑而伐之是謀動干戈於邦内也大夫始竊兵權終為國禍盖於翬慶父見之矣秋七月齊王姬卒冬十有二月夫人姜氏㑹齊侯于禚左氏曰書姦也姜氏齊侯之醜行著矣然魯莊獨無罪乎人子雖無制母之理而婦人猶有從子之義誠莊公痛其父之死視齊為不共戴天之讎絶不與交則姜氏亦豈得無所感動而抑制其非哉主婚一事變仇讎為愛密易痛慼為懽慶其後與之同討伐共田狩相與狎昵使姜氏安於故非而益甚焉者莊公之罪也序猗嗟之詩者謂莊公不能防閑其母為二國患殆未知姜氏北轅而莊公為之闢燕路也何止不能防閑也哉乙酉宋公馮卒三年春王正月溺㑹齊師伐衛夏四月葬宋莊公五月葬桓王桓王之喪七年而後葬臣子之罪可見矣秋紀季以酅入於齊紀季度其國危請命於兄挈己邑而入於齊計出亡聊非竊邑叛君者比故不書奔叛然紀季不能輔佐其兄守死宗國而臨難茍免先為自全之計以邑事讎使紀卒亡由紀季之先去也冬公次于滑榖梁子曰次止也欲救紀而不能也夫欲救紀者莊公惻隱之心仁之端也然而不能者牽於母氏之邪欲而憚齊之强也盖雖有是心而剛不足以行之也故孔子語仁必有勇剛毅近仁者於此可見矣四年春王二月夫人姜氏饗齊侯于祝丘三月紀伯姬卒夏齊侯陳侯鄭伯遇于垂紀侯大去其國春秋凡書諸侯失國出奔者名之鄭伯突衛侯鄭之類是也紀侯見迫於齊度不能保其國於是聽其弟季以酅事齊而脫然去之非齊毁其宗廟不可曰滅非見逐於臣不可曰奔去而不知其所往故不可書所之之國而曰去其國焉其曰大者紀侯之名猶漢人褚大欒大爾春秋從失國之例而名紀侯豈謂之大去哉公榖二𫝊不以為名而以為大去者滅也不遺一人之辭也無義甚矣或曰紀侯迫於齊知國之不可保不待身辱民殘親見國家之覆而去之若紀侯者聖人所甚閔而賢之者也何以書曰不然昔鄭子皮授子産政子産辭曰國小而偪子皮曰子善相之國無小盖言小國無不可為者使其能修德而明政任賢而使能内撫其民而人民懐之外睦其鄰而四鄰慕之雖有强暴莫能加己故綸邑一旅迄克祀夏甲楯五千終能霸越夫豈以國小為患哉若使其有德於民而不以其所養人者害人雖去之而民懐戀當如邠人從太王於岐山之下歸者如市今紀侯咸無是焉迫於齊難不能自持徒恥於託諸侯且降齊也遂飄然長逝不知所往爾晉劉裕攻南燕或說南燕主超降超嘆曰吾寜奮劎而死不能銜璧而生觀紀侯之情亦若是而已矣然而絶先君之𫝊失社稷之守非可謂之善也故書曰紀侯大去其國以為不能自强其國者之戒焉六月乙丑齊侯葬紀伯姬紀侯急於去國雖其妻在殯而不暇葬焉可哀也已然伯姬吾女也吾不葬而仇人葬之吾非豺狼也哉秋七月冬公及齊人狩於禚五年春王正月夏夫人姜氏如齊師秋郳黎來來朝冬公會齊人宋人陳人蔡人伐衛六年春王三月王人子突救衛夏六月衛侯朔入于衛秋公至自伐衛螟冬齊人來歸衛俘諸侯伐衛為納朔也王人救衛不與朔也而朔卒入衛是諸侯敢於逆王命也諸侯敢於逆王命者貪衛寳之得也孟子曰未有仁而遺其親者也未有義而後其君者也自仁義不立利賂公行於是天下始有叛君父黨姦賊而不顧者焉其成宋亂立華督者為宋賂也其逆王命納衛朔者為衛寳也然則徇利之習可不懼哉宋賂者魯直取之宋故曰取郜大鼎于宋衛寳者齊取之衛而分之魯故曰齊人來歸衛寳七年春夫人姜氏會齊侯于防夏四月辛卯夜恒星不見夜中星隕如雨恒星不見謂恒見之星不見也星或晝見或夜不見皆反常也夜中星隕如雨言衆也漢永始二年二月癸未夜星隕如雨隋大定五年有流星數百四散而下亦雨之狀也西漢志謂天象者皆隂陽之精其本在地而上發于天政失于此則變見于彼猶影之象形響之應聲是以明君睹之而寤飭身正行思其咎譴則禍除而福至此即春秋書星變之義也秋大水無麥苗苗黍稷之苗也榖梁子曰麥苗同時也麥苗同時皆為大水所害故無麥苗秋無麥苗者周之秋夏之夏也冬夫人姜氏會齊侯于榖八年春王正月師次于郞以俟陳人蔡人說春秋者一曰魯將伐郕而次師以待援也一曰陳蔡將伐魯而次師以待冦也以經考之前年伐衛納朔之事魯方與陳蔡同役而未有釁也安得陳蔡伐魯哉其不為待冦明矣然魯之俟陳蔡是必與陳蔡有期也與陳蔡有期而陳蔡不至何也曰魯郕同姓之國也郕無罪而魯伐之是不道之兵也期陳蔡以援不道之兵此陳蔡所以不至也雖然伐衛納朔亦不道爾陳蔡何以從耶曰禮義之心人皆有之其所以失是心者或迫於勢力而不能自持爾至於勢力之所不迫則其理義之心未嘗不存也當是時齊之力足以雄諸侯而魯不逮也伐衛之事主謀者齊故陳蔡為齊役也伐郕之事主謀者魯故陳蔡不為魯役也陳蔡之為齊役者盖迫於勢力而失其理義之心者也孟子所謂激而行之可使在山是也陳蔡之不為魯役者盖勢力有所不迫而理義之心未嘗不存者也孟子所謂性善是也甲午治兵臧僖伯謂三年治兵入而振旅國之大事所宜講也甲午治兵何以書曰以其將伐郕也夫兵以禦冦非為冦也兵以衛民非疲民也伐無罪之國是為冦而己矣動無名之師是疲民而已矣為冦疲民而以治兵故聖人惡之而書也夏師及齊師圍郕郕降于齊師其曰師及齊師者言其俟陳蔡不至而後挾齊之力以壓郕也其不曰齊師降郕而曰郕降于齊師者見郕之自爲決擇也盖魯主圍郕之謀則郕之所怨在魯挾强齊之力而郕之所畏在齊此郕所以不降魯而降齊也秋師還老子曰兵者不祥之器又曰師之所處荆棘生焉正使動必以義聖人猶且難之而況伐無罪之國哉正月暴師至夏圍郕逮秋始還無故罷民三時不仁甚矣故聖人惡之而書也左氏載仲慶父請伐齊師公曰不可我實不徳齊師何罪罪我之由秋師還君子是以善魯莊公而杜預遂以克己復禮稱之過矣夫自度其力之不敵於齊而不敢爭爾豈其情於愧訟也哉試使情於愧訟所謂困而後悔亦非不逺復之道也冬十有一月癸未齊無知弑其君諸兒齊襄之爲君也政令無常狎近羣小禽獸之行宣淫於國使賢人如鮑叔者知其將亂而去之此所以及於禍也九年春齊人殺無知公及齊大夫盟于蔇公及齊大夫盟爲齊謀立君也為齊謀立君義也何以書惡其爲仇讎之國立君也或曰敵怨敵惠不在後嗣古之道也魯讎齊襄也齊襄旣死而易世猶敵怨乎曰怨有淺深敵怨不在後人者怨之淺者爾若父母之讎不與共戴天雖易世不可忘也此義明則足以存天理厚人倫矣夏公伐齊納子糾齊小白入于齊先儒或以子糾為兄如榖梁序子糾於小白之上是也或以小白為長如史稱齊桓殺其弟以反國是也二者皆不可攷所可攷者小白徒手而入國人與之比子糾挾外兵以求納不無逆順之異然君死在殯而二子爭國律以伯夷子臧之節皆罪而已矣秋七月丁酉葬齊襄公八月庚申及齊師戰于乾時我師敗績九月齊人取子糾殺之小白子糾以爭國相讎無兩存之勢小白立則殺子糾勢也所以一人心防後患也齊人取子糾殺之何以書曰古之聖人行一不義殺一不辜而得天下不為也況推刃同氣而得國者其可為乎小白旣立而子糾逃之親親之義可以無追矣取而殺之生竇之墟君子謂小白於是不仁矣後世人君惟漢惠帝之於如意為不可及焉冬浚洙孟子曰固國者不以山谿之險冬浚洙非固國之道也十年春王正月公敗齊師于長勺春秋無義戰其甚焉者詐戰是也公敗齊師于長勺乗其鼓竭也公敗宋師于鄑未陳而薄之也晉人敗秦師于殽要擊之於險也晉荀吳敗狄于大鹵誘之而困諸阨也皆詐戰也餘可以類推矣故詐而勝之曰敗某師二月公侵宋稱罪而討其國曰伐不稱罪而掠其境曰侵侵即書所謂侵于之疆是也昔之論侵伐者衆矣左氏以為有鍾皷曰伐無曰侵公羊子以為觕者曰侵精者曰伐榖梁子以為包人民驅牛馬曰侵斬林木壞宮室曰伐趙子纂例破三傳之説而自為説曰稱罪致討曰伐無名行師曰侵合是數説而攷之蓋左氏嘗聞聲罪之説而誤以爲鍾皷之聲也不知聲罪者猶稱其罪爾如齊伐楚則聲楚人不貢包茅之罪如晉伐秦必聲秦人背盟之罪豈得為鍾皷之聲哉春秋書侵如齊侯侵蔡晉侯侵楚之類皆用大師而摠數國若無鍾皷何以行師乎此左氏之説非也夫師之所處荆棘生焉當長驅敵國之際不有以節制之亦何所不至哉其為包人民驅牛馬斬木壞室者皆用兵必至之禍固無分於侵與伐也此榖梁之説非也春秋書侵伐雖有異辭而均之為挾私逞忿無王命而專兵焉爾若謂侵為無名則伐豈有名乎當時諸侯伐而稱罪如齊桓以包茅責楚猶為可言其他不過强加之罪爾非必稱當其罪而真為有名也至若書侵如齊侯侵蔡晉侯侵曹當時必謂其有附楚之罪而侵之不應無名也此趙子之説非也惟公羊以為觕曰侵精曰伐其説近之然亦未明也夫奉辭稱罪而討敵者敵必請服不請服則必出師以禦之是以經書伐者多至於戰如齊伐衛衛及齊戰宋伐齊齊及宋戰之類是也不奉辭稱罪而但侵擾其疆埸故敵國不暇請服而亦不及禦之是以經書侵者未嘗至於戰如齊人侵我西鄙公追齊師至酅弗及蓋疆埸之事知之後時追之已去矣故曰稱罪而討其國曰伐不稱罪而掠其境曰侵三月宋人遷宿徙其國邑人民曰遷葢取之也夏六月齊師宋師次于郎公敗宋師于乗丘秋九月荆敗蔡師于莘以蔡侯獻舞歸春秋之書荆有二義焉一辨其等以垂教也一明其禍以垂戒也荆者楚也左氏載桓六年楚武王侵隨求得志於漢東之國葢是時荆已僣號稱王雄據江漢矣今其進兵上國敗蔡師而俘獻舞春秋書之曰荆而已不以爵氏人名稱之也不以爵氏人名稱之者所以著其僭竊之罪也不惟於楚然也其於書吳也亦然此謂辨其等以垂教也夫辨其等者雖春秋之法而實古法也書稱西旅肅慎詩述玁狁荆蠻亦未嘗以爵氏人名稱之也雖然春秋之始書荆也不以爵氏人名稱之使不齒於中國及其乆也卒以爵氏人名稱之使無異於中國何哉葢履霜堅冰漸不可長方其稱兵比近之邦為禍猶㣲固可以古法待之也及其寖横則交政於中國爭長於齊盟役諸侯以奉己其實既盛强有不可掩者春秋不容不以爵氏人名稱之矣不惟楚也其書吳亦然其他茍不至於甚勝故始終簡言之此謂明其禍以垂戒也嗚呼自此教不明而後其無等殆有甚者焉故有幸其和親而妻以女者有喜其來朝而坐之于諸侯王之上者有借其兵力而以子行事之者有歳輸金繒而以稱臣奉之者自此戒不明而後其為禍更有烈者焉先無預防之謀甲兵朽斧鉞鈍飬宼玩敵以貽喪亡如西晉之永嘉其患有甚於東周之吳楚者矣然則春秋之學其可以不講哉冬十月齊師滅譚齊侯之出也過譚譚不禮焉及其入也諸侯皆賀譚又不至冬齊人滅譚是以私忿滅人之國也昔者湯一征自葛始天下信之為匹夫匹婦復讎也豈為己私忿哉欲知王覇之分無他公與私之間爾譚子奔莒國滅而奔可哀也已何以書咎不能死社稷也十有一年春王正月夏五月戊寅公敗宋師于鄑秋宋大水外國之災何以書公羊子曰及我也榖梁子曰王者之後也二者皆以為聖人之私意也信斯言也則春秋書齊大災宋衛陳鄭災者豈亦以為王者之後及我之害也哉蓋外災必書者均其憂也均其憂則均其愛矣春秋之教分殊而理一者也其不盡書者魯不弔則史不書爾宋大水公使弔焉因魯史書此故述之也冬王姬歸于齊王姬再歸于齊何以書盖亦魯主之爾主讎國之婚姻無親親之義也十有二年春王三月紀叔姬歸于酅紀季以酅入于齊是為齊之臣矣紀侯大去其國是其國已亡矣叔姬者紀侯之側室也國滅君亡義有死爾否則歸于宗國之魯爾顧乃徘徊亡國之墟至於七載再嫁為紀季之婦可謂失婦之節矣先儒皆謂紀叔姬非嫁也葢從紀季于酅以奉祀事爾春秋賢之而書也何其惑之甚哉禮婦人謂嫁曰歸如春秋書紀伯姬歸于紀王姬歸于齊皆嫁焉爾豈得以彼為嫁而此為非嫁耶試使非嫁則叔姬之於紀季葢嫂氏之列也以嫂依叔亦豈逺嫌之道哉以叔姬為賢則凡不能守義之婦皆賢矣夏四月秋八月甲午宋萬弑其君㨗及其大夫仇牧觀左氏南宫萬奔陳以其乗車輦其母一日而至葢多力善走其飛廉惡來之徒歟宋㨗不知用賢以輔政而所親近者乃多力善走之凶人連年暴師隂沴大作萬既囚于魯而復請之狎而怒之是猶縱猛虎於其側而撩其鬚以為戲也宜不免虎口哉仇牧㨗之傅也凶人在君側而莫之知不智也知之而不諫不忠也不忠不智卒於禍其身以及其君亦一孔父焉爾冬十月宋萬出奔陳十有三年春齊侯宋人陳人蔡人邾人㑹于北杏㑹于北杏齊始求霸也霸伯也左氏云五伯之霸也字音亦通漢書註伯讀曰霸古者王命作伯分統諸侯故齊桓竊是名以為侯主盖以伯自命而非王命也雖然自天下有霸而諸侯之散離者合矣中國有霸而蠻荆之侵陵者懼矣民其少康乎而春秋何以書曰非王者之道治世之事也禮樂征伐雖不散出於諸侯而卒出於諸侯也開功利之門廢正大之理使後世智力用事指王道為迂闊國無善治民不見德者自齊桓始故孟子曰五霸者三王之罪人也夏六月齊人滅遂秋七月冬公㑹齊侯盟于柯北杏之㑹魯遂皆不至也齊於魯又有納糾之憾有敗師之怨比於遂之可疾輕重較然矣然齊桓能忍於魯而㑹盟之不能忍於遂而殄滅之何歟盖遂小國也利其易虐則借以立威魯望國也知其難圖則結以為助凡其恩威異用大率聽於力放於利而已矣非能壹以禮義為節也故曰五霸者三王之罪人也十有四年春齊人陳人曹人伐宋夏單伯㑹伐宋秋七月荆入蔡冬單伯㑹齊侯宋公衛侯鄭伯于鄄十有五年春齊侯宋公陳侯衛侯鄭伯㑹于鄄北杏之㑹從者四國其君皆不親至也鄄之㑹從者亦四國而魯之君猶不親至也盖至于鄄之再㑹而宋陳衛鄭之君皆親至焉故左氏曰復㑹焉齊始霸也夫王者之得天下也盖久而後得之也周自后稷公劉太王王季世修其徳以至文王其道益光而後有二分天下之勢然猶退而事殷至武王廹於羣后之歸乃始剪商之亂以王天下此豈一歳月之功哉今齊桓之於諸侯皆列國爾地醜徳齊莫能相尚一旦起而號令之使前日匹敵之人而為今日之聽命如北杏之初㑹鄄之再㑹不數年而事業成其名雖霸而所以奔走天下者猶王者之勢也課其速效似若可喜然非由積徳累仁以聽天下之自至迫而後動不得已而後應也茍可以得志於天下者無不為之雖損徳害人而不暇恤焉作内政以强兵設輕重以富國滅小弱以廣地結强大以植援威聲震讋之下是以諸侯懼而從之如此其易也故曰以徳行仁者王以力假仁者霸王不求速懼損德也霸不暇德為求速也由此觀之凡後世之取天下治人民理財用功成於旦暮者皆霸者之餘術王者之罪人也夏夫人姜氏如齊秋宋人齊人邾人伐郳宋主伐郳而齊助之故先宋於齊也方宋背北杏之㑹而齊桓則悉師以伐宋不少須假之是待人不以恕也及其旣服則屈意以從之助其為虐焉是恱人不以義也所以然者由喜怒之失中也鄭人侵宋冬十月十有六年春王正月夏宋人齊人衛人伐鄭秋荆伐鄭冬十有二月㑹齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽同盟于幽齊霸始盛也公羊傳經曰公㑹而正經無公字盖闕文爾説春秋者一曰不言公㣲者也不知魯自盟柯已從齊矣單伯㑹伐宋矣又㑹于鄄矣至此大盟㑹不應魯以㣲者徃也一曰以諸侯私相推戴齊侯故去公以示貶也不知春秋書其事即見其罪焉爾不以去公為貶也若以去公為貶則從幽之盟者八國何獨貶公哉一曰不言公明罪不在魯也不知魯自盟柯以後已不免於從齊矣烏得無罪乎若夫盟而加同者録載書之辭爾葵丘盟曰凡我同盟之人盖同盟之辭在當時有之非孔子新筆也即是以知凡載書曰同盟于某故孔子修之亦曰同盟無此字則不書也説春秋者多謂諸侯同欲則書同盟謬矣同盟于清丘而衛將叛盟同盟于斷道而魯不肯盟同盟于平丘而齊不受盟豈同欲也哉邾子克卒十有七年春齊人執鄭詹夏齊人殱于遂齊師滅遂而戍之遂人疾之饗齊戍而殺之故書曰齊人殱于遂殱盡也言殺之盡也夫古之王者遣戍以守衞而采薇極慰勞之情徂征以求定而簞食見欣迎之意其重民命得人心也如此今齊桓以廣地之故覆滅小國勞師戍守至於五年之久以起讎疾而致殱殘比諸王者之事何如也故曰五霸者三王之罪人也秋鄭詹自齊逃來詹鄭卿也見執于齊而竊逃之是為臣而不能效死也鄭伯使詹為卿至於喪節是為君而不能知人也冬多麋麋不言有而言多者麋山澤常有之物故不以有為異而以多為異也杜預云麋多害稼故書十有八年春王三月日有食之夏公追戎于濟西不言戎侵伐我而言追戎者無宼而生事也秋有􅈮杜預云􅈮短狐含沙射人影為災也或謂短狐之􅈮盖出炎荒江海中非魯地所有盖文誤爾􅈮當作􅠀是不然經書有者不常有也􅈮非魯地所有故以有為異也爾雅蟲食葉曰􅠀若使是􅠀當從書螟之例不曰有也冬十月十有九年春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟公羊子謂大夫出疆有可以安社稷利國家者則專之可也漢廷議論多祖其説而不知其非也春秋之亂正由臣下擅主威大夫竊國命故春秋書大夫遂事以為戒於萬世公子結其尤者也陳人之婦則賤者之婦也安得魯侯使卿媵之此乃結之私行爾人臣非君命出疆又矯命以盟諸侯不臣莫大焉春秋正其誼不謀其利明其道不計其功就使結真能安國家而矯命已為可罪況秋與齊宋盟而冬受齊宋之伐則所謂安國家者奚在漢陳湯甘延壽矯制發兵共誅郅支單于傳首京師而匡衡非之以為延壽湯擅興師矯制命幸得不誅如復加爵土則後來使者爭欲乗危徼倖生事蠻夷為國招難劉向則曰延壽湯不煩漢士不費斗糧比於貳師功徳百之於是天子下詔封延壽湯侯盖向所稱者一時之功也衡所執者萬世之法也春秋不以一時之功而廢萬世之法衡則得之矣夫人姜氏如莒杜預云非父母國而徃書姦也冬齊人宋人陳人伐我西鄙二十年春王二月夫人姜氏如莒夏齊大災秋七月冬齊人伐戎齊人伐戎何以書曰古者聖王之於武備也不弛威以飬寇亦不生事而妄征故蠻夷猾夏則有刑玁狁孔熾則有伐茍非有罪則不以煩中國之兵也今荆楚陸梁入蔡伐鄭而齊莫之討也戎當此時未有猾夏之罪而必伐之是於楚有弛威飬寇之患而於戎有生事妄征之過矣二十有一年春王正月夏五月辛酉鄭伯突卒秋七月戊戌夫人姜氏薨冬十有二月葬鄭厲公二十有二年春王正月肆大眚肆赦也眚過也春秋不書肆眚而書肆大眚者此不可不明也書稱眚災肆赦孔子亦曰赦小過則是赦者聖人所不廢也特用於疑誤與夫小過焉爾非肆大眚也今魯莊肆大眚則是重辟與非疑誤者皆赦之如周樂運所謂施非常之惠以肆姦宄之惡是也失刑甚矣故聖人惡之而書也若夫罪疑過小而執必不赦之典此申韓之術非聖人忠厚之意也為政者當知春秋不書肆眚而書肆大眚則深殘姑息之弊可以兩戒矣癸丑葬我小君文姜書文姜明夫人不當諡也晉胡訥云禮婦人生以夫爵死以夫諡夫人有諡不復依禮爾此説得之而曹耽以為夫婦行不必同不得以夫諡諡婦者豈春秋之義哉陳人殺其公子禦寇夏五月秋七月丙申及齊髙徯盟于防冬公如齊納幣納幣卑者事也而君親之非禮也况喪娶乎行吉禮於衰絰之中無人子之心矣後世人主有公除而議昏亮隂而舉樂内無父子外無君臣者皆魯荘之類也二十有三年春公至自齊祭叔來聘不稱使而言聘者非王命而執聘禮也其外交於魯者猶祭伯之來也朝廷之上以世族用人如祭伯祭公祭叔之類背公營私外交侯國而欲其起王室之衰撥天下之亂難矣夏公如齊觀社公越境觀社淫于觀也夫居喪而納幣越境而觀社魯侯之縱情悖禮固已甚矣然齊霸方炎不能以一語止之而安受其非禮何哉盖霸者之道不以治己修身為本故齊桓内行不修而管仲以為不害霸故其視魯侯縱情悖禮之為則亦安之而不為異也使其能兢兢業業當無以逸欲為有邦之教卑服不皇必以庶邦惟正之供矣故曰五霸者三王之罪人也公至自齊荆人來聘公及齊侯遇于榖蕭叔朝公秋丹桓宫楹娶讎人女飾先君之廟以榮之罪也冬十有一月曹伯射姑卒十有二月甲寅公㑹齊侯盟于扈二十有四年春王三月刻桓宫桷葬曹莊公夏公如齊逆女親迎禮也何以書榖梁子曰不正其親迎於齊也秋公至自齊八月丁丑夫人姜氏入夫人之歸也朝于廟曰至未朝于廟曰入何以書讎國之女也戊寅大夫宗婦覿用幣公羊子以為大夫宗婦者大夫妻也孫氏亦云同宗大夫之婦是不然春秋非卿大夫不書其書宗婦即為同宗大夫之婦非賤者之婦明矣不必加大夫也盖大夫宗婦者大夫及宗婦也其不言及者如公㑹諸侯晉大夫之類亦列數之也夫梱以内夫人治之而大夫不得見也今使大夫與宗婦同贄而覿夫人可謂亂男女之别失内外之辨矣南史載晉宋婚禮初婚三日舅姑衆賔皆列觀盖援此也夫用三日之制可也不知所謂衆賔者豈亦大夫與宗婦同之耶大水冬戎侵曹戎雖侵暴亦有人心為中國者以理馭之則治以力勝之則亂何者治生於其心之有所畏服亂起於其心之有所不能平也戎自盟唐之後無迹於中國者幾四十年矣今乃復見於侵曹之役何哉盖當其無迹於中國之時而中國乃生事而妄征之如前年齊人伐戎是也伐之不以道則何以厭服其心此戎所以敢於肆侮加兵於齊之與國而不顧也曹羈出奔陳赤歸于曹鄭莊公卒旣葬突歸而忽出曹莊公卒旣葬羈出而赤歸觀忽突之事則知羈赤之事矣盖忽突者鄭莊之子羈赤者曹莊之子也君死嗣子在内即位而奉喪事如鄭忽曹羈者皆冝為君者也突赤出奔於外必甞得罪於君父不宜為君也然卒廢其所宜而立其所不宜者盖由有挾姦懷利之臣制其命焉爾忽突之廢置由祭仲為之也仲之事迹見於經傳詳矣雖曹之柄政者名氏無聞然亦祭仲之徒爾向使鄭莊曹荘者能為身後之慮選擇忠良俾輔於後嗣則安有他日奪正與邪之禍哉此可為萬世永鑒矣郭公郭公者郭亡也猶梁亡之類也得罪於民而民逃之則國為墟矣此非有滅取之者故春秋以自亡為文也二十有五年春陳侯使女叔來聘陳女叔來聘雖其君使之實出其臣之私意也盖是時原仲相陳季友相魯因二人有舊而相聘焉爾大夫交政於中國其見於此乎夏五月癸丑衛侯朔卒六月辛未朔日有食之鼓用牲于社日者衆陽之宗王者之象也故王者救日則奏鼓諸侯不與也今為諸侯而伐鼓用牲僣矣伯姬歸于杞秋大水鼓用牲于社于門禮惟祭天用大牲救日則奏鼓此大水而伐鼓用牲非也國有大水之災不知修徳以弭乖戾行政以救墊溺而區區以牲鼓厭禳之是淫巫瞽史之事非君人之道也冬公子友如陳二十有六年春公伐戎夏公至自伐戎曹殺其大夫春秋書殺大夫或稱國或稱人何也公榖傳云稱人以殺殺有罪也孫氏㳂其説遂謂殺大夫不以罪則稱國殺有罪則稱人盖見衛人殺州吁齊人殺無知而為例也信斯言也則稱國以殺皆不以罪也然而元咺以訟君見殺處父以專權見殺胥童以道君為亂見殺皆稱國焉豈不以罪哉稱人以殺皆有罪也而宋穆襄之族率國人以攻公殺公孫固公孫鄭則是以臣犯君而殺其君之大夫不可為公孫固公孫鄭之罪也宋襄夫人因戴氏之族殺司馬公子卬則是以婦人干國政而殺公朝之大夫不得為司馬之罪也而皆稱人以殺何哉若斯之例所謂質諸此而彼礙證於前而後違者也夫春秋固有以隻字為義而非字字有義也其稱國者猶曰杞不足徵宋不足徵不必以稱國為有辨也其稱人者猶曰殷人以柏周人以栗不必以稱人為有别也盖其所書之大義在於殺大夫而已矣其稱國猶君之國其稱人猶君之人書其事即見其君之罪焉爾夫大夫與國同體君之股肱也是以有道之世刑不上大夫及其無道也常多殺大夫何者有道之世位以稱徳茍命士以上必以俊彦為之況大夫乎故無至於犯罪而可殺有道之世明徳謹罸雖一介之民猶不以無罪戮之況大夫乎故無至於妄殺有道之世政自上出雖諸侯不得以專殺也況非諸侯乎故無至於亂殺及其無道也任非其人故有可殺之罪刑不當罪故有妄殺之事上無政刑故有亂殺之禍此春秋所以書之為萬世戒也使後之人君戒其可殺則當任忠賢戒其妄殺則當謹刑辟戒其亂殺則當壹政枋如是則無殺矣曹殺其大夫不書名衆也其諸亂殺之歟秋公㑹宋人齊人伐徐冬十有二月癸亥朔日有食之二十有七年春公㑹杞伯姬于洮杞伯姬於此年㑹其父于洮於僖五年朝其子于魯以婦人而行㑹朝之禮干諸侯之政其唐武韋后安樂公主之徒歟把伯受制於其婦而莫之遏魯莊聽命於其女而莫之違其唐髙中之主歟夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽秋公子友如陳葬原仲春秋書内大夫出聘者非禮者也然未有書其所為者此書葬原仲何也舉其尤者爾公子友託聘而私行以共原仲之葬内以欺其君外以成列國大夫之僣非罪之尤者乎冬把伯姬來莒慶來逆叔姬莒慶越境而自逆女見莒慶之專國也杞伯來朝公㑹齊侯于城濮二十有八年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績幽之再盟衛侯不至盖奪於喪制之故或可情恕也而齊遽伐之是齊之兵不度義而動也衛之不可以敵齊明矣不忍一朝之忿而與齊人戰卒貽喪師之禍是衛之兵不量力而鬭也二者皆罪也左氏以為齊侯奉王命討子頽之亂非也衛朔子頽之事十年矣齊霸已久矣不應至今方討之也且衛朔已死何乃討其子乎夏四月丁未邾子瑣卒秋荆伐鄭公㑹齊人宋人救鄭救義事也何以書盖齊桓之於楚有弛威飬寇之患焉夫不能攘定而以救鄭者為名而已矣冬築郿春秋凡書宫室園囿之役曰築如築王姬之館築臺築囿是也郿邑也非宫室園囿而築之何也榖梁子曰虞之也古者山林藪澤之利所以與民共也虞之非正也猶北魏甄琛所謂縣官障護河東鹽池而收其利是也古者有道澤梁無禁天地之藏所以資飬萬人也今障護而專其利使民不得共之豈為民父母之意哉悲夫後之為國者盡籠山澤之所出歸諸公上榷禁嚴密民以抵冐刑戮者歲不知其幾也吏詫其能勇於用法無惻然不忍之心焉使其嘗攷諸春秋知虞利為非正則宜媿於此矣或問周禮虞衡有官為之厲禁非歟曰然文王治岐之政周公成王宜世守之安得遽反之耶大無麥禾麥與苖同時也故並言之曰無麥苖宜也麥與禾不同時也而亦並言之曰大無麥禾何也因無禾而追書無麥也董仲舒云春秋他榖不書至於麥禾不成則書重生民之具也藏孫辰告糴于齊古之王者以三十年之通致九年之蓄雖有凶荒水旱而民無菜色今魯一年不熟告糴他國則其素無蓄積之政可知矣二十有九年春新延廐或謂皇祐中范公仲淹領浙西時歳饑召諸佛寺僧謂之曰饑歳工價至賤可大興工役於是諸寺工作鼎興又新敖倉吏舍日役千夫貿易飲食工技服力之人仰食於公私者無慮數萬是歳兩浙惟杭晏然民不流徙由此著令歳饑𤼵司農之粟募民興利范公之規也今觀魯莊當大無麥禾之歳國内艱食而新延廐城諸防不廢土木之功者得不與范公之事類乎曰不然魯莊公素非務徳愛民之主也觀其飾宫桷以為侈虞山澤以為利一歳而築臺者三彼直以土木困民爾豈知以此濟民哉榖梁子曰冬築郿春新延廐以其用民力為己悉矣故聖人惡之而書也又新廐者勞人以奉馬也夏鄭人侵許秋有蜚有者不常有也山海經載蜚如牛白首一目虵尾水行則竭草行則枯見者有兵役盖乖氣所致也冬十有二月紀叔姬卒城諸及防三十年春王正月夏師次于成秋七月齊人降鄣齊人降鄣者脅鄣使降也見齊之無道也公榖以鄣為紀邑豈有紀滅之後而一邑之民尚能二十餘年獨抗齊哉啖子非之當矣鄣小國也八月癸􅕀葬紀叔姬春秋内女之為外夫人者卒葬必書其為大夫妻則否紀季以酅事齊為齊邑之大夫叔姬歸于酅以嫁紀季不得為外夫人矣而書其卒葬何也盖魯以夫人之禮葬之也伯姬之卒也齊葬之故曰齊侯葬紀伯姬今叔姬卒于齊不曰齊葬者以是知魯葬之也當叔姬之存也而宗國之魯莫能恤也使其羈旅流落失身於紀季盖至死而後葬之豈得為親愛之義也哉九月庚午朔日有食之鼓用牲于社冬公及齊侯遇于魯濟齊人伐山戎三十有一年春築臺于郎夏四月薛伯卒築臺于薛自古人君荒怠不恤國事為宫室臺榭于淫于逸于游于觀者未有不底於喪亂者也魯莊公一歳之間而築臺者三則其恣情縱欲廢國勞民之迹可見矣故其身死骨未寒而慶父亂作般閔繼弑强齊謀取其國而猶存者幸爾其與瑶臺滅夏瓊宫喪殷虒祁成而諸侯叛阿房作而七廟墟者同一轍也為人君者可無戒哉六月齊侯來獻戎㨗先王之禦外侮也除其害而已矣非矜其功也今山戎未有可伐之罪而逺征之以其所得之㨗誇示於魯則齊侯之器小矣且獻㨗者下奉上之禮也齊侯於魯而用下奉上之禮者矜心亂之矣秋築臺于秦冬不雨三十有二年春城小榖小榖魯地故經以魯自城為文左氏釋云城小榖為管仲非也盖左氏因見昭十一年申無宇云齊桓公城穀而寘管仲焉遂誤以城小穀為城穀不知穀自是齊地小穀自是魯地也當以經文為定夏宋公齊侯遇于梁丘秋七月癸巳公子牙卒八月癸亥公薨于路寢冬十月己未子般卒案左氏公薨子般即位共仲使圉人犖賊子般是子般旣為君矣其不稱公不書葬者未踰年之君也公子慶父如齊慶父既賊子般國人不與故懼而適齊也其不言奔以聘禮而往也昔宋萬弑君其黨猛獲奔衛宋人請之衛人欲勿與石祁子曰不可天下之惡一也惡於宋而保於我保之何補與惡而棄好非謀也今慶父有弑逆之罪如齊而齊受之若桓公管仲者亦異於石祁子矣豈非幸魯之亂而有欲取之意遂不暇問其首亂之臣哉故曰五霸者三王之罪人也狄伐邢春秋通說卷三
