body:
  text: 春秋通說卷九宋黃仲炎撰成公元年春王正月公即位二月辛酉葬我君宣公無冰三月作丘甲作丘甲者杜預以為周制甸出甲士三人今魯使丘出之是丘出甸賦也孫覺氏非之以為丘出甸賦丘豈能供之哉魯成雖暴刻不應頓取於人如此之暴也蓋古者四邑為丘四丘為甸一甸之地兼有四丘而出長轂一乘戎馬四匹牛十二十二人成公始作丘甲則是丘出一甲而甸出甲士四人也往者三人今增其一丘出一人焉爾從孫氏之說則是一甸之地甲士一人則百甸所增者百人爾然魯將伐齊故作丘甲鞍之戰四卿並將蓋前此所未有也其勢必大益兵度其苛賦於民者不止於一甸增一甲士也夫仁人之為國也不虛內以事外不困民以奉敵不仁者反是貪戰勝攻取則增賦益兵於是民不勝憊矣孟子曰我能為君約與國戰必克今之所謂良臣古之所謂民賊也蓋言貪戰之必克則增賦益兵使民不堪命非民賊而何民賊者魯成公與四卿當之矣可不戒哉或謂丘出甸賦則什賦三四矣何至哀公時方有二猶不足之嘆耶曰魯為伐齊故作丘甲一時暴民非必以為常也惟初稅畝用田賦為常制爾故作丘甲不言賦夏臧孫許及晉侯盟于赤棘秋王師敗績于茅戎按左氏晉侯使瑕嘉平戎于王單襄公如晉拜成劉康公徼戎遂伐之敗焉蓋既平戎又徼而伐之乘其不備也王者不以信義服人心而挾詐以僥幸正使成功亦不足貴已矧喪師乎故書曰王師敗績于茅戎過在王師也其不言戰而以自敗為文者明至尊無敵之義也冬十月二年春齊侯伐我北鄙夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師會晉郤克衛孫良夫曹公子首及齊侯戰于鞍齊師敗績晉郤克切齒於婦人一笑之辱遂伐齊以泄其忿鞍之戰蓋晉大夫專權逞忿之兵也魯衛曹皆從霸令者也然魯獨以四卿會之何哉魯自季友卒政歸仲氏宣公薨歸父奔齊故四卿專政而懼歸父因齊以入也於是併力挫齊始分公室而不相下故輿尸之也秋七月齊侯使國佐如師己酉及國佐盟于爰婁楚屈完來盟于召陵不稱使見楚子之不屈也楚始強也齊國佐來盟于爰婁稱齊使見齊侯之屈也大夫強也八月壬午宋公鮑卒庚寅衛侯速卒取汶陽田爰婁之盟晉人使齊返魯衛之侵地故魯取汶陽田還舊地也還舊地正也何以書惡由諸大夫之力取之也冬楚師鄭師侵衛十有一月公會楚公子嬰齊于蜀丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀左氏謂蜀之盟卿不書匱盟也於是畏晉而竊與楚盟曰匱盟非也楚自得志于邲橫行於中國諸侯之不附楚者蓋鮮矣今其號召列國之君臣羣至于蜀而公然為之盟主而列國之君臣亦公然受楚之盟是豈謂之畏晉而竊盟哉使列國竊與楚盟而晉莫之知亦可謂塗塞耳目之甚矣三年春王正月公會晉侯宋公衛侯曹伯伐鄭辛亥葬衛穆公二月公至自伐鄭甲子新宫災三日哭新宫者三傳皆謂宣公新主入廟故曰新宫非也春秋書先君之宫未有不書諡者曰丹桓宫立煬宫有事于武宫之類是也若曰先公新主之廟故謂之新宫則閔二年吉禘于莊公文二年躋僖公者可謂新主矣何以不曰新宫而曰莊公僖公哉由此觀之則知新宫非宣宫明矣春秋於土木之功踰越舊制者則以新言之如新延廏新作南門新作雉門及兩觀是也魯成狃於戰鞍之勝侈欲橫生於是别為新宫如晉之築虒祁者怨讟動於民則天火之故曰新宫災明非舊制也所以為後世人君崇侈宫室者之戒也昭十八年鄭災三日哭國不市蓋為國與民哭之也今新宫災失侈欲之奉何哭之有故書曰三日哭言不當哭也檀弓以新宫為先君之宫三日哭為得禮蓋漢儒沿三傳之訛說爾乙亥葬宋文公夏公如晉鄭公子去疾帥師伐許公至自晉秋叔孫僑如帥師圍棘汶陽魯故地棘汶陽邑也昔奪於齊今歸於魯則其故邑人民宜懷其舊主願附於魯也今棘乃不服至勤用師以圍之何哉胡氏謂魯於是初稅畝作丘甲賦役繁重棘雖復舊而不願為之氓也成公不知行仁政去苛征以起人願附之心而區區恃兵威以加之則其叛自若也他日汶陽之田復歸于齊雖出於晉侯之命然亦其人民擕叛魯不得而留之爾有國家者可不戒哉大雩晉郤克衛孫良夫伐牆咎如冬十有一月晉侯使荀庚來聘衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟鄭伐許四年春宋公使華元來聘三月壬申鄭伯堅卒把伯來朝夏四月甲寅臧孫許卒公如晉葬鄭襄公秋公至自晉冬城鄆鄭伯伐許五年春王正月把叔姬來歸把叔姬見出而來歸猶郯伯姬也仲孫蔑如宋夏叔孫僑如會晉荀首于榖梁山崩易之剝象曰山附於地剝山足朽壤下剝上也是為隂陷陽臣逼君之象當春秋時諸侯僭天子大夫僭諸侯弒君亡國纍纍而見是則梁山崩不為無所自致矣梁山晉地也秋大水冬十有一月己酉天王崩十有二月己丑公會晉侯齊侯宋公衛侯鄭伯曹伯邾子把伯同盟于蟲牢六年春王正月公至自會二月辛巳立武宫周不毁廟三后稷文武魯不毁廟二周公伯禽若武公於魯為十一世祖而非始封之君世逺當遷久矣而復立武宫非禮可知也取鄟衛孫良夫帥師侵宋夏六月邾子來朝公孫嬰齊如晉壬申鄭伯費卒秋仲孫蔑叔孫僑如侵宋楚公子嬰齊帥師伐鄭冬季孫行父如晉晉欒書帥師救鄭七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛魯郊僭禮也鼷鼠食郊牛角者再是於僭禮之中又慢而不以誠也吳伐郯楚之始見也曰荆敗蔡吳之始見也曰吳伐郯其不以爵氏人名稱者雖春秋之法然亦以見其勢之猶微也方其勢之猶微使為中國者能深思逺慮抑遏其鋒則用力不難而遺禍不烈矣奈何楚之始見也當齊桓之初霸方欲飬其患以張已之功吳之始見也當晉景之不競方欲資其力以為已之助於是㳙溜不塞而成川爝火不撲而燎原其始事也簡其將畢也巨故吳楚之禍至於盟宋盟黃池此豈一朝夕之故哉易坤之初六曰履霜堅冰至蓋言順也由辨之不早辨也聖人於易示其象於春秋著其事所以為諸夏之戒明矣夏五月曹伯來朝不郊猶三望秋楚公子嬰齊帥師伐鄭公會晉侯齊侯宋公衛侯曹伯莒子邾子把伯救鄭八月戊辰同盟于馬陵公至自會吳入州來州來楚邑也晉通吳於中國而資之以撓楚故吳為之入州來也他日吳為中國之患有甚於楚者蓋自晉之通吳始矣冬大雩衛孫林父出奔晉八年春晉侯使韓穿來言汶陽之田歸之于齊說者謂春秋書晉侯使韓穿來言汶陽歸齊者惡豫奪之不常焉爾此非至論也夫制命之道義為大信次之義立而後可信也非義而信不可也使汶陽本齊之地而晉昔也劫而與魯今也命之歸齊謂之改過遷善可也豈得以與奪不常罪之惟汶陽本魯之舊既用師於齊而歸之魯矣於義不當復奪而與齊此韓穿來言所以必書於春秋也此論不明則恐世之為政者知戒夫與奪之不常而不以義權之則必有執過遂非之患矣晉欒書帥師侵蔡公孫嬰齊如莒宋公使華元來聘夏宋公使公孫壽來納幣晉殺其大夫趙同趙括秋七月天子使召伯來錫公命冬十月癸卯把叔姬卒晉侯使士燮來聘晉士燮來聘蓋役魯以伐郯也凡假聘以役諸侯不得為有禮故書叔孫僑如會晉士燮齊人邾人伐郯吳伐郯不能救郯事吳輒伐之故不救為不忠伐為不恕衛人來媵媵常事也何以書禮天子求后於諸侯王后歸于京師以姪娣從三國往媵之亦以姪娣從故一娶十二女諸侯嫁女于諸侯以姪娣從二國往媵之亦以姪娣從故一娶九女今魯嫁女于宋而三國媵之故書也夫為國君者妾媵不具固無以廣嗣然多而無節亦非禮也是以妾媵過多則費用廣而財匱御幸䟱而怨興嬖寵乘而政亂故春秋來媵不書而三國來媵則書之所以明妾媵過多為後世戒也嗚呼使此義明則後世人主安有掖庭數千人如晉武帝之淫侈者哉九年春王正月把伯來逆叔姬之喪以歸叔姬為把伯所出義與把絶矣禮女嫁未三月而死猶歸葬於女氏之黨豈有生而出死而返葬乎把伯來逆叔姬之喪以歸把非禮矣把伯逆叔姬之喪以歸而魯從之魯亦非禮也公會晉侯齊侯宋公衛侯鄭伯曹伯莒子把伯同盟于蒲公至自會二月伯姬歸于宋明不待親迎而行也夏季孫行父如宋致女禮婦人既嫁三月而後父母使人安之謂之致女致女常事也何以書嫌使卿致也晉人來媵秋七月丙子齊侯無野卒晉人執鄭伯晉欒書帥師伐鄭冬十有一月葬齊頃公楚公子嬰齊帥師伐莒庚申莒潰楚人入鄆春秋書被伐而潰者明不能固結其民心程子曰人君之道以民心悅服為本故雖率之以犯難則效死而不去夫能使民效死而不去豈有逃其上而潰者哉左氏謂莒城惡而潰楚遂入鄆非知本之論也秦人白狄伐晉鄭人圍許城中城十年春衛侯之弟黑背帥師侵鄭夏四月五卜郊不從乃不郊五月公會晉侯齊侯宋公衛侯曹伯伐鄭齊人來媵丙午晉侯獳卒秋七月公如晉冬十月十有一年春王三月公至自晉晉侯使郤犫來聘己丑及郤犫盟夏季孫行父如晉晉人止公九月而後歸之然猶亟於聘魯者豈復有親魯之意哉疑其叛而要結之也魯侯被晉之辱然猶繼朝而聘晉者豈復有德晉之心哉畏其威而諂事之也晉以要結為信魯以諂事為禮二者皆小人之相與焉爾秋叔孫僑如如齊冬十月十有二年春周公出奔晉夏公會晉侯衛侯于瑣澤秋晉人敗狄于交剛冬十月十有三年春晉侯使郤錡來乞師霸主帥諸侯以討伐之事而諸侯必以師從無待於乞師也其乞師者必有迫切之辭如楚申包胥乞師于秦曰使下臣告急之類故書曰乞師賤之也三月公如京師公如京師者假道于京師也左氏僖三十年秦將襲鄭過周北門左右免胄而下超乘者三百乘鄭商人弦高將市於周遇之以乘韋先牛十二犒師以此觀之秦兵東出必道自周故晉帥東諸侯西向以伐秦亦必假道於周明矣春秋魯十二公而覲天子者二皆不得謂之禮者僖朝于王所成如京師是也僖執朝王之禮而不行於京師則非其所矣成假道于京師因以朝王而意不在朝王矣故皆不得謂之禮也以其皆不得謂之禮故書夏五月公自京師遂會晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦春秋書秦晉之爭所以著二國往來之私憾非關於中國大計也左氏載此年晉侯帥諸侯伐秦使吕相絶秦其言若可觀而實非也如圍鄭一役晉文欲以報私忿爾而挾秦以圍之鄭使燭之武說秦君而秦為退師此乃秦君知過而改非可以是咎秦也當是時子犯請擊之而文公不聽亦理所當然何足以為賜而曰有大造於秦哉況晉止及秦圍鄭他無從諸侯而曰諸侯疾之將致命于秦如此等語大率皆誑秦爾夫奉辭臨敵不出於實而出於誑果何以服敵國之心哉曹伯廬卒于師秋七月公至自伐秦冬葬曹宣公十有四年春王正月莒子朱卒夏衛孫林父自晉歸于衛秋叔孫僑如如齊逆女春秋內逆女三皆大夫專之也觀翬遂之事則知僑如之事矣鄭公子喜帥師伐許九月僑如以夫人婦姜氏至自齊春秋內大夫或稱族或舍族者以前後一事故後從省文爾如前書叔孫豹及晉趙武楚屈建會于宋故後書豹及諸大夫盟于宋如前書晉人執季孫意如以歸故後書意如至自晉其稱族舍族者豈復有意義存乎其間哉左氏以僑如稱族為尊君命舍族為尊夫人者妄也冬十月庚寅衛侯臧卒秦伯卒十有五年春王二月葬衛定公三月乙巳仲嬰齊卒公之子曰公子公子之子曰公孫公孫之子以王父字為仲氏嬰齊者公孫歸父之子公子仲遂之孫以王父字為氏故曰仲嬰齊也公羊謂仲嬰齊為公孫嬰齊以弟後兄者妄矣癸丑公會晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚晉侯執曹伯歸于京師左氏載曹負芻殺世子自立之事不見於經是未必然晉合諸侯既列曹伯於盟而後執之蓋執之必不以其罪故書之也觀明年曹人再請曹伯于晉而始歸之使曹伯殺世子以自立當不為國人所與何至再請于晉哉公至自會夏六月宋公固卒楚子伐鄭秋八月庚辰葬宋共公宋華元出奔晉宋華元自晉歸于宋左氏載宋司馬蕩澤弱公室殺公子肥於是華元為右師曰我為右師君臣之訓師所司也今公室卑而不能正吾罪大矣不能治官敢賴寵乎乃出奔晉既而左師魚石自止華元于河上請討許之乃返使華喜公孫師帥國人攻蕩氏殺子山左師二司寇二宰遂出奔楚華元使向戌為左師老佐為司馬樂裔為司冦以靖國人觀此則華元之志在於強公室靖國亂且其出奔即返庶幾於易不逺復無祗悔之義也何以書曰即經意考之如曰華元出奔晉曰自晉歸于宋者可以見其結晉霸之援而求得志於其國也既得晉援而返國於是殺蕩澤逐五大夫舉宋國慶賞刑威之柄惟已之所欲為其所謂強公室者實弱之所為靖國亂者實亂之也此而不治則世之姦臣挾外援以求專其國者皆得借是以逞矣宋殺其大夫山宋魚石出奔楚冬十有一月叔孫僑如會晉士燮齊高無咎宋華元衛孫林父鄭公子鰌邾人會吳于鍾離殊會者往會之也往會之者尊之而不敢屈致之也王世子在首止而諸侯往會之故曰會王世子于首止吳在鍾離而諸侯之大夫往會之故曰會吳于鍾離許遷于葉十有六年春王正月雨木冰周之春正月夏之冬十一月也宜寒而燠非冬時之正故春秋以無冰為異而書也至若凝寒之極雖在正冬亦為災之象故春秋以雨木冰為異而書也雨木冰者雨才著木即成堅冰寒極可知矣如漢桓帝延熹中冬大寒殺鳥獸魚鱉竹柏之葉有枯傷者襄楷云不出二年天子當之是亦寒極為災也夏四月辛未滕子卒鄭公子喜帥師侵宋六月丙寅朔日有食之晉侯使欒黶來乞師甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績自邲之戰中國不振旅而楚遂狎主諸夏之盟終晉景之世不能雪此辱也今厲公不煩多助一戰勝楚鄢陵之功視城濮有光焉宜聖人與之也何以書曰上智謀國者不畏多難而畏無難不憂有敵而憂勝敵何者世惟賢哲之君能保勝持盈而侈暗之君幸有功名可矜無外患可懼鮮不底於喪亡者也左氏載鄢陵之戰晉諸大夫皆欲之獨范文子不欲曰吾先君之亟戰也有故秦狄齊楚皆強不盡力子孫將弱今三強服矣敵楚而已唯聖人能內外無患自非聖人外寧必有內憂盍釋楚以為外懼乎既戰楚師敗績文子使祝宗祈死曰君驕侈而克敵是天益其疾也難將作矣於是厲公反自鄢陵而侈益甚欲盡去諸大夫而立其左右逾年殺三郤立胥童欒書中行偃殺胥童弒厲公國內大亂卒如范文子之所料嚮使其不能勝楚恐恐乎敵國外患之來則君臣警懼當不至此矣是知鄢陵之功晉國之禍也故蘇轍氏論西晉之亂由於平吳之功以為使吳不亡則晉之君臣勵精不懈是吳不滅而晉不亂也羊祜畫平吳之策不如范文子先見之明信矣哉楚殺其大夫公子側秋公會晉侯齊侯衛侯宋華元邾人于沙隨不見公不見公者矜勝楚之功而驕諸侯也其侈益甚不待反自鄢陵而後見矣小夫淺人不能居成功者如是哉公至自會公會尹子晉侯齊國佐邾人伐鄭尹子王官也其致王官會伐者挾天子以令諸侯也曹伯歸自京師曹伯歸自京師正也何以書蓋晉侯挾天子以令諸侯雖置曹伯于京師而操縱在已也九月晉人執季孫行父舍之于苕丘冬十月乙亥叔孫僑如出奔齊十有二月乙丑季孫行父及晉郤犫盟于扈公至自會乙酉刺公子偃十有七年春衛北宫括帥師侵鄭夏公會尹子單子晉侯齊後宋公衛侯曹伯邾人伐鄭六月乙酉同盟于柯陵秋公至自會齊高無咎出奔莒九月辛丑用郊魯郊僭禮也九月郊非時也用郊又非禮也用郊者以郊為用也蓋諂神以求福爾如後世秦苻堅因王猛疾病特為親祈南北郊之類是也晉侯使荀罃來乞師冬公會單子晉侯宋公衛侯曹伯齊人邾人伐鄭十有一月公至自伐鄭壬申公孫嬰齊卒于貍脤十有二月丁巳朔日有食之邾子貜且卒晉殺其大夫郤錡郤犫郤至楚人滅舒庸十有八年春王正月晉殺其大夫胥童庚申晉弒其君州蒲晉厲公嗣霸數年之間北挫狄于交剛西敗秦于麻隧南破楚于鄢陵威名震赫逺過前代而卒以驕侈失德致殺身亂國之禍此可為萬世永戒矣故秦并六國而二世滅隋一天下而煬帝亡秦苻堅平燕翦代而為淝水之敗唐莊宗滅梁下蜀而有嗣源之禍李景取閩并楚而有淮南之失故曰有道之主能持勝信矣左氏載晉欒書中行偃使程滑弒厲公而春秋不名首弒者蓋厲公得罪於諸大夫而弒之者衆首從難分故稱國以弒也齊殺其大夫國佐公如晉夏楚子鄭伯伐宋宋魚石復入于彭城公至自晉晉侯使士丐來聘秋把伯來朝八月邾子來朝築鹿囿己丑公薨于路寢冬楚人鄭人侵宋晉侯使士魴來乞師十有二月仲孫蔑會晉侯宋公衛侯邾子齊崔杼同盟于虛朾丁未葬我君成公春秋通說卷九
