body:
  text: 春秋通說卷一宋黃仲炎撰隱公元年說元年者有二曰體元也曰明僭也所謂體元者曰春秋以一為元示大始而欲正本也王者即位必體元以施化也使如其說則春秋黜周而王魯矣是不然所謂明僭者曰古者列國無私史諸侯不得自稱元年於其國是亦豈然哉虞書稱月正元日商書稱太甲元年則是一為元者從古以然非春秋之新意也古者諸侯得臣其國內之人稱於國曰君其得紀年於國無可疑者內則所記生子者書於閭史閭猶有書況國乎魯莊公如齊觀社曹劌諫曰諸侯有王王有巡守以大習之非是君不舉矣君舉必書蓋諸侯有王王有巡守則周盛時也周盛時列國已各有史矣漢荀悅亦云古者天子諸侯有事必告於廟廟有二史以此觀之非可以僭言也然則元年者魯史舊文爾聖人述之以紀事而後世必以意義求過矣春孔子曰行夏之時蓋以商周之時異於夏之時也若三代不易時則孔子不應獨取夏時也歲有四時而春必冠焉夏后氏以建寅為歲首則寅為首春矣周人以建子為歲首則子為首春矣孟子謂秋陽以暴蓋周之秋夏之夏也七八月之間旱蓋周之七八月夏之五六月也春秋於成元年襄二十八年書春無冰則知書春為周時明矣蓋周之孟春仲春即夏之仲冬季冬也宜寒而燠故以無冰為異而書也若是夏時之春東風解凍豈可以無冰為異而繫於其下哉孔子雖因顔淵之問有取於夏時不應修春秋而遽有所改定也胡安國氏謂春秋以夏時冠月而朱熹氏非之當矣孔子之於春秋述舊禮者也如惡諸侯之强而尊天子疾大夫之逼而存諸侯憤荆蠻之橫而貴中國此皆臣子所得為者孔子不敢辭焉若夫更革當代之王制如所謂夏時冠月竊用天子之賞罰如所謂豫奪諸侯大夫之爵氏者決非孔子意也夫孔子修春秋方將以律當世之僭其可自為僭哉王正月元年者魯侯之元年王正月者周之正月也何言乎周之正月明諸侯奉周之正朔也夫尊為一人統臨天下此王者之常勢天地之大義堯舜三王之所同也周自幽王失德諸侯背叛戎狄因之遂墟其國逮于平王不能自振始去酆鄗之都東徙洛邑四旁之地已入于侯國者不可復取因寡就狹儕於邾滕於是貢賦不至而有下求朝覲不集而有下聘諸侯之大者自相雄長顧宗周蔑如也至於怨而取其未怒而執其使傲而請隧逼而問鼎鬬兵於繻葛召㑹於河陽常勢墮而大義泯矣夫因是以習習以為常雖有才識之士如晉叔向鄭子産齊晏嬰之倫出乎其間畢謀悉辨自為其國不以無王室為非也蓋至於春秋之末則又甚矣故孔子喟然嘆曰如有用我者吾其為東周乎蓋謂周室雖微名義未改將以道濟天下舍東周其誰哉既乃即春秋以正一王之義當是時王室已不能班歷于諸侯諸侯已不復受朔于王室久矣而書于春秋必曰王正月焉所以挈天下垂散之統而還於周之王也此教行則世之為臣子者當不以衰微喪亂而易其尊君戴上之心而僭竊之禍息矣其後諸葛亮用一隅之蜀圖興漢祚庶幾仲尼存周之志也若夫周瑜賈詡之徒自安於吳魏之佐非罪歟三月公及邾儀父盟于蔑古者不盟盟者不相信也或謂三代之俗惟周為薄盟詛之事生於誥誓之窮蓋世變之不得不然歟曰非也世變雖下而人心之信未嘗一日不存也左氏述哀十四年小邾射以句繹來奔曰使季路要我吾無盟矣蓋子路之行誼聞於鄰國雖背叛之臣猶且信之以為無事於盟況不為背叛者乎以此觀之凡諸侯之交際必有待於盟者是不能為子路而已矣故春秋於此年書公及邾盟於七年書公伐邾所以見信不由中者未有不背者也三傳謂儀父者邾子克之字非也春秋諸侯未有書字者何獨於邾子而字之其曰邾儀父者蓋邾之大夫任政者也儀父名也如魯季孫行父晉荀林父皆以父為名也春秋之世凡不相信而後有盟不辨禮而後公及大夫盟夏五月鄭伯克段于鄢舜在側微象日以殺己為事及為天子則封象於庳而富貴之故曰仁人之於弟也不藏怒焉不宿怨焉親愛之而已矣鄭莊公叔段同姜氏所出姜氏愛假而欲立之段驕其母之私愛而不恭其兄此固莊公之所不能堪也既而段不得立而莊公立為莊公者亦可以善處此矣奈何藏怒宿怨處段於京初不加裁制飬成其惡而遂討除之使無所容於其國仁者處天倫之際果如是乎春秋書鄭伯克段于鄢克者勝之之辭也所以為世之為人兄者之戒也茍知以鄭莊為戒則知以舜為法矣左氏謂段不弟故不言弟非也假之不弟固無足言而春秋亦未嘗以去親為貶也若以不言弟見其不弟則有書弒父而言子如楚世子商臣之類者豈見其子也哉秋七月天王使宰咺來歸惠公仲子之賵天王者代天理物之稱也宰冢宰也咺其名也仲子惠公之妾也仲子死於惠公之末年至是平王使來賵之待之以夫人也故以夫人待仲子則嫡庶亂矣以歸賵役冢宰則朝廷輕矣以天子諂諸侯而歸其妾之賵則君臣易位矣一動而三失萃焉此東周所以衰壞而春秋所由始也司馬通鑑論周威烈始侯三晉以為天子自壞其禮不知周自壞禮固已起於平王之末陵夷二百四十餘年間其紀綱法度蕩然久矣尚何責於威烈也哉春秋書宰三宰咺也宰渠伯糾也宰周公也皆居冢宰之任者也然而或稱名或稱公何也咺未賜爵而攝也糾以伯爵充也周公以三公兼也三者皆托史之實而已矣九月及宋人盟于宿盟者不相信也春秋此年書及宋人盟十年書翬伐宋敗宋師取郜防以見世之從事於盟約而無由中之信者未有不背者也不書公微者盟也冬十有二月祭伯來君子在位則紀綱正紀綱正則國勢重矣小人在位則紀綱壞紀綱壞則國勢輕矣故君子小人者國勢重輕所係也觀祭伯以王朝卿士而外交諸侯可謂小人之壞紀綱者矣朝廷之上用小人以壞紀綱則國勢安得而不輕哉此春秋諸侯所以無王者亦王朝有以致之也向使朝有君子守節死義為淮南所憚如汲黯公正不私無疆外之交如朱邑以正紀綱而尊國勢則周駕雖東必可復振無諸侯僣上之禍矣春秋書祭伯來豈不可為有國者用小人之明戒哉公子益師卒春秋書大夫卒有二義焉一以明君臣之義一以見當時專用公族為大夫之非明君臣之義者所謂教也明當時專用公族為大夫者所謂戒也夫股肱之虧元首之痛也故君於卿大夫之喪比葬不食肉比卒哭不舉樂三月之內裼衰以居不接吉事春秋以來禮廢義薄至有卿喪未葬而君舉樂如晉平公者矣故春秋卿大夫卒必書之惟弒賊出奔與夫黜免者則不書所以重人臣之終明君臣之義也若夫古者諸侯貢士於天子天子親命之使還其國為卿大夫蓋以賢選也春秋列國之大夫惟取公族甚者如魯三桓之子孫世執國政不復以賢選矣故春秋書公子公弟公孫叔仲季孫卒無他姓者所以見魯專用公族為大夫之非也使後之人君行其所教則遇臣有恩當不以土芥犬馬視其臣矣用其所戒則任官惟賢當不以天位私於公族矣二年春公㑹戎于潛中國者五政之所加七賦之所養衣冠禮樂之所存也自古聖人分天下為五服而以周索戒索辨其疆者非特人事亦天理也自周道衰王國無采薇之政諸侯無費誓之規於是以强陵弱以衆暴寡列國既日尋于干戈彼亦起而承其弊遂乃畏其威而列于㑹者相繼矣夏五月莒人入向入者以兵據其國都也左氏載定四年吳入郢吳子以班處宫是以兵據其國都也春秋紀兵之形十有二侵伐圍入戰敗遷滅襲取城追其事雖不同然為挾私逞忿無王命而專兵者罪一而已莒人娶于向向姜不安莒而歸故莒人入向以姜氏還觀向姜之不安其室是莒子不能正家道不行於妻子也不知自反而怒其姻國以兵入據之向之民何罪焉故書曰莒人入向忿兵也不能正家反已之所為也無駭帥師入極觀左氏載隱四年諸侯伐鄭宋公使來乞師公辭之羽父請以師㑹之公弗許固請而行則隱之不能制其大夫可知矣然則無駭入極之師亦豈其君之命也哉春秋書無駭帥師翬帥師以見君弱臣强之禍此其始也書其事即見其罪矣不以去氏族為貶也三𫝊皆以去氏族為貶非矣翬他日弒隱公罪不容於死而得稱公子者豈無貶歟秋八月庚辰公及戎盟于唐㑹戎非禮也盟戎非䇿也故春秋於此年書公及戎盟於七年書戎伐凡伯以歸所以著要盟無信之不可恃也唐渾瑊與吐蕃㑹盟而栁渾計其必叛豈非有見於春秋之教哉九月紀裂繻來逆女冬十月伯姬歸于紀紀裂繻來逆女見紀侯之不親迎也伯姬歸于紀見伯姬之不待親迎而行也紀侯之不親迎是紀侯失夫之義也伯姬之不待親迎而行是伯姬失婦之節也王通氏曰昏禮廢天下無家道矣紀子帛莒子盟于密說紀子帛者一曰紀子君也帛其名也一曰裂繻之字也以書法考之若是紀君之名則莒子何以不名若以為裂繻之字則大夫不當加君蓋紀子者紀君也帛文誤爾或曰紀侯也何以稱子曰滕侯也而亦稱子蓋時王黜之爾十有二月乙卯夫人子氏薨夫人卒稱薨葬稱小君尊之也尊夫人者尊君之敵也子氏者何也穀梁子謂隱妻是也蓋周公武公娶于薛孝惠娶于宋自桓以下娶于齊是隱所娶猶宋女也春秋於隱元年書仲子必繫之惠公所以别夫人子氏之為隱妻也文四年冬十一月成風薨其眀年正月王使榮叔歸含且賵蓋死而後賵含之也隱元年之前而仲子既死非今之子氏眀矣左氏因誤以今之夫人子氏薨為仲子薨遂以前年歸賵為豫凶事不亦誣哉平王雖昏弱亦何至歸賵於未死之人乎必無是也夫人薨不地眀有常所也子氏之不書葬何也隱有遜桓之志不以成禮葬其妻也鄭人伐衛三年春王二月巳已日有食之春秋之世周道陵遲王綱圮壞於是謫見于天日為之食故春秋書日食者三十六以明王者失道所致也可無畏哉何休以為日有食之應一國一臣之事謬矣夫日光虧奪所關者大非君天下者何以當之李尋云日者衆陽之長輝光所燭萬物同晷人君之表也君不修道則日失其度暗昧亡光豈為一國一臣之應哉善乎漢文帝二年十一月日食詔曰朕不能治育群生上以纍三光之明令二三執政悉思朕之過失及知見之所不及以啓告朕及舉賢良方正能言極諌者以正朕之不逮此蓋庶幾春秋之義也若夫宣帝以五鳯四年日食歸咎於楊惲而誅之不亦何休之謬哉杜預以為日食忌正陽之月尤非也書曰季秋月朔辰弗集于房瞽奏鼓嗇夫馳庶人走夏之季秋非正陽月也未嘗不以為忌也詩十月之交朔日辛卯日有食之亦孔之醜周之十月夏之八月非正陽也而詩人醜之亦豈不以為忌哉三月庚戌天王崩夏四月辛卯尹氏卒尹氏王卿也書尹氏卒明世王卿也案尹氏自宣王幽王之時已居大臣之位故節南山之詩曰尹氏太師維周之氐常武之詩曰王謂尹氏命程伯休父至此當一再世而又告喪于魯故此年書尹氏卒其後昭公二十三年又書尹氏立王子朝二十六年又書尹氏以王子朝奔楚是尹氏世執東周之政也夫執政大臣國命所寄不能公選天下之賢而使尹氏得世世居之蓋其間必有弗克象賢者以壞法亂政此東周所以衰微也不惟周也魯三桓晉六卿齊崔氏陳氏皆世其官以執國政卒成僣逆之禍春秋備書其事為有國者之戒嚴矣哉秋武氏子來求賻莊十五年家父來求車書天王使而此不書使何也古者君在亮隂百官總己以聽於冢宰三年平王崩桓王方立冢宰攝行軍國之事故不得以王命書也禮喪無求賻況天子乎以天子不能治喪而求賻於諸侯以諸侯不能賻天子之喪而待於求君臣之義胥廢矣八月庚辰宋公和卒諸侯生相往來死相赴弔有朋友之義焉故春秋書外諸侯卒葬以見其恩且明易代也內曰薨外曰卒非異之也外諸侯薨而以卒赴者自執卑禮也故魯史因之冬十有二月齊侯鄭伯盟于石門癸未葬宋穆公四年春王二月莒人伐杞取牟婁戊申衛州吁弒其君完春秋書弒逆之事不徒正名定罪而已蓋使後世為君父者明其為禍之慘而謹戒之務絶其萌焉爾易曰臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也左氏載衛州吁有寵於莊公而好兵公弗禁石碏諫而弗聽既而立桓公故州吁弒桓而代之立桓之見弒由莊之不早辨也驕其子而不教恣其弄兵而不禁雖惡物醜類天稟自出然習則生常其流逺矣為人君父者可不戒哉夏公及宋公遇于清遇者邂逅相㑹於道塗之間者也詩曰邂逅相遇適我願兮人之情也何以書曰古者諸侯行役以王事故不以相遇為非春秋諸侯行役以私謀故以相遇為罪宋公陳侯蔡人衛人伐鄭州吁阻兵而修怨則伐鄭者衛爾而首宋公者推宋公主兵且序爵也衛有弒逆之惡諸侯不加討而反助其逞兵是黨逆也黨逆之君有不導其臣以逆者鮮矣他日宋督之禍非兆於此哉秋翬帥師㑹宋公陳侯蔡人衛人伐鄭翬帥師助衛翬黨逆也黨逆之臣必自為逆者也他日寪氏之變非兆於此哉九月衛人殺州吁于濮春秋書衛人殺州吁齊人殺無知有二義焉天子在上聞天下弒逆之賊而不能討也於是衛齊之臣子憤而討之以見天子之失刑也然州吁弒而卒殺於衛無知弒而卒殺於齊以見世雖喪亂而弒逆之人猶無所容其身也故曰作春秋而亂臣賊子懼冬十有二月衛人立晉衛公子晉者非有天子之命先君之傳徒以衛人推而立之故衛人立晉言下人得置君也下人置君者大亂之道也後世如唐肅宗以平盧節度使卒遣使撫慰就察軍中所欲立者授以旌節自是方鎮廢立出於士卒非衛人立晉之類乎五年春公矢魚于棠矢魚者射魚也何以知其射魚也觀左氏載臧僖伯之諫其專及於搜田獮狩治兵振旅末云鳥獸之肉不登於爼皮革齒牙不登於器則君不射古之制也以是知其為射魚也隱於當時必驅役兵徒逺至于棠之地如韓愈氏驅鰐魚文所謂選才技吏民操强弓毒矢與鰐魚從事者是也然韓子志於除害而棠之役何為哉恣情縱欲極於樂而已矣後世如秦始皇幸琅琊候大魚出而射之漢武帝自尋陽親射蛟江中皆魯隱之為也夏四月葬衛桓公秋衛師入郕九月考仲子之宫晉武帝追崇庶母宣太后或謂宜配食中宗臧燾建議曰春秋之義母以子貴故仲子成風遂稱夫人經言考宫若配食惠廟則宫無緣别築前漢孝文孝昭太后並繫子為號祭於寢園不配於髙祖太宗之廟義同春秋又漢立寢於陵其制非古宜逺準春秋考宫之義别建寢廟議者從之蓋臧燾之論雖明庶母不得祔廟然以仲子成風遂稱夫人與考宫為禮則誣春秋矣春秋妾母之稱夫人者自成風始蓋上僣也仲子未嘗稱夫人也仲子之不稱夫人者是隱公猶不敢以夫人稱妾母也隱公不敢以夫人稱妾母而亦不敢以妾母祔姑於是别宫以祭之自以為得禮矣不知妾母之子為君則得立别廟子祭孫止仲子雖是桓公之母然在隱公時桓未為君豈得築宫以祀之哉今隱公考仲子之宫而用備樂焉是猶僣夫人也臧燾之議但當言庶母於禮不祔廟不必以春秋書考宫為得禮可也自此義不眀而後世人主溺於嬖妾之愛如宋武帝為宣貴妃立廟都中亦以為春秋所與豈不可恨也哉初獻六羽獻六羽言初者見前此僣用八佾今始殺而用六也雖始殺而用六然薦之仲子之宫則僣矣且六羽之殺止於仲子之宫而羣公之廟僣樂如故也何以知羣公之僣如故也子家羈謂昭公曰諸侯僣天子久矣設兩觀乘大路朱干玉戚以舞大夏八佾以舞大武此皆天子之禮也以是知羣公之僣如故也邾人鄭人伐宋螟大田之詩曰去其螟螣及其蟊賊毛氏注云食心曰螟食葉曰螣食根曰蟊食節曰賊此四種皆蝗也觀漢循吏治民有道蝗不入境則知蝗之為災非不道所致乎夫民火耕水耨終歲作苦禾稼垂成而蟲蝗敗之則饑饉流亡之禍至矣此春秋所以書也冬十有二月辛巳公子彄卒宋人伐鄭圍長葛六年春鄭人來輸平輸者有所輸也委送財幣之辭也如左氏載晉饑秦輸之粟是也鄭人厚財幣以求平於魯故曰輸平輸者蓋釋怨爭為和好也釋怨爭為和好美意也何以書蓋鄭方仇宋而求得志焉圜視列國如魯之望者可與為援而不可與爭故來輸平而非誠於為遷善也夏五月辛酉公㑹齊侯盟于艾古者天子合諸侯故謂之㑹傳云穆有塗山之㑹是也春秋諸侯始私相㑹盟矣蓋上僣也秋七月冬宋人取長葛七年春王三月叔姬歸于紀春秋內女為諸侯之嫡夫人者則書其歸餘姪娣不書也伯姬歸于紀則既為嫡夫人矣叔姬娣也何以書蓋魯不以叔姬為伯姬之娣而以紀夫人之禮歸之紀侯亦不以叔姬為娣而以嫡夫人之禮納之也辛伯曰內寵並后亂之本也故書滕侯卒春秋於外諸侯卒凡赴告無大小悉書之一視同仁之義也左氏謂不書名未同盟也凡諸侯同盟於是稱名故薨則赴之以名趙子非之曰豈有君薨在殯臣子正當創巨痛深之日乃忍稱其君父之名哉又曰凡諸侯同盟名於䇿書朝㑹名於要約聘告名於簡牘故於卒赴可得而紀此說得之考諸春秋凡十人卒不書名皆當時並無朝㑹聘告事迹所以不知其名爾餘皆有往來事迹則知而名之然亦不必同盟但嘗往來亦書名也或曰成二年公及秦人盟而十四年秦伯卒不名十三年公㑹滕人伐秦而十六年滕子卒不名何也曰是與其大夫㑹盟爾非其君也非其君猶不知其名也夏城中丘易稱設險守國而城中丘何以書蓋城郭溝池雖有國者所必有而非古人所恃以為固者也楚子囊城郢沈尹戌曰子常必亡郢茍不能衛城無益也古者天子守在四夷天子卑守在諸侯諸侯守在四鄰諸侯卑守在四竟謹其四竟結其四援民狎其野三務成功民無內憂又無外懼國焉用城北魏朝羣臣請增京城世祖曰古人有言在德不在險屈丐蒸土築長城而朕滅之豈在城也今天下未平方須民力土功之事朕所不為故楚不以城郢而安魏不以城小而危是知春秋諸侯不修德政以為結人心之本而區區倚城郭溝池為固輕用民力者皆非也榖梁子曰凡城之志皆譏此說得之矣如近世城築之患抑有甚焉者守牧之官類以治城郭為能事往往悉取辦於民力而聲於人曰吾能不費縣官而了此役也是以城堞雖美而政無以得民其不資寇者幸爾然則春秋之教其可以不明哉齊侯使其弟年來聘禮緣人情則諸侯之交於鄰國宜有往來聘問之禮也齊使弟年來聘何以書左氏云結艾之盟也蓋為鄭人植黨以仇宋也秋公伐邾冬天王使凡伯來聘戎伐凡伯于楚丘以歸王使至魯而戎伐之是敢于蔑王章也戎伐王使而魯不救是敢于藐共主也至于敢于蔑王章藐共主此所以為東周之亂也八年春宋公衛侯遇于垂三月鄭伯使宛來歸祊春秋諸侯相伐取地者多有之矣未有捐地以與人者也捐地與人以懲爭利之習宜聖人必與也鄭伯使宛來歸祊何以書惡譎也蓋鄭方有宋之爭而求得志焉顧已力之不能逞也則資魯以助之懼魯之不盡力也則歸祊以餌之魯受今日之餌則他日為己役者宜不得辭焉此其用術殆與晉獻公以璧馬賂虞而假道伐虢者不異也然晉之力足以亡虢而取虞鄭之力不足以亡宋而取魯庚寅我入祊非其所有而取之非義也受人餌己而不知人之將役己非智也庚寅我入祊豈復有羞惡是非之心哉夏六月己亥蔡侯考父卒辛亥宿男卒秋七月庚午宋公齊侯衛侯盟于瓦屋易曰履霜堅冰至蓋言順也其作始也簡其將畢也必巨春秋之初有三國相與私盟而後有諸侯之參盟有諸侯之參盟而有諸侯之羣盟諸侯羣盟則天下有霸而無王矣八月葬蔡宣公九月辛卯公及莒人盟于浮來不相信而後有盟不辨禮而後公及大夫盟莒人者大夫也螟冬十有二月無駭卒九年春天王使南季來聘據周禮有天子聘問諸侯之禮而與諸記傳不合榖梁子曰聘諸侯非正也言天子不當聘諸侯也左氏載晉叔向云明王之制使諸侯歲聘以志業間朝以講禮蓋聘朝者皆諸侯事天子之禮爾戴禮聘義天子制諸侯比年小聘三年大聘亦是使諸侯交聘而非天子聘諸侯也當周之盛時諸侯未相吞併而四方之國固多矣若如周禮所稱天子必時聘以結諸侯之好殷俯以除邦國之慝間問以諭諸侯之志歸脤以交諸侯之福賀慶以贊諸侯之喜致禬以補諸侯之災則頻歲之間當盡出王朝之士使奔走於四方亦恐不暇給也又案左氏僖二十四年宋成公如楚還入于鄭鄭伯將享之問禮於皇武子對曰宋先代之後也於周為客天子有事膰焉有喪拜焉蓋膰焉者即歸脤也王室歸脤乃是賔先代之特禮豈例用於諸侯哉舉此一事他可知已漢承秦滅學之後五經立博士皆有師授獨周禮晚出王莾時劉歆為國師始建立其間容有可疑者故不得不以諸傳記為定也或謂古者天子尚有聘士之禮如漢世用羔鴈元纁蒲輪玉帛下聘巖穴之布韋者況諸侯乎曰不然此為有道者屈故以特禮聘召之非以時聘問也當春秋之世諸侯僣禮竊權蔑視王室縱不能討而反加聘問焉以上諂下亂之道也故書三月癸酉大雨震電庚辰大雨雪周之三月夏之正月也陽氣未力而震電若盛陽之月雷雨既動而雨雪若凝隂之時況大而非常則隂陽之錯繆甚矣春秋書之以眀當時人事乖戾皇之不極至於干隂陽而召災異者如此其影響也有國家者可無畏哉挾卒無駭翬挾之不稱族氏何也趙子曰隱不爵命大夫是也或謂隱桓之世大夫多不稱族氏蓋未命於天子者也未命者猶有待於命也莊以後大夫皆世為之不待命於天子而稱族氏矣不知隱桓之時亦豈待天子之命耶夏城郎秋七月冬公㑹齊侯于防十年春王二月公㑹齊侯鄭伯于中丘夏翬帥師㑹齊人鄭人伐宋六月壬戌公敗宋師于菅魯之君臣悉力以翦宋者蓋為鄭役也為鄭役者蓋為鄭人歸祊之利也辛未取郜辛巳取防左氏工於載事而謬於釋經其叙鄭師入郜辛未歸于我庚辰鄭師入防辛巳歸于我未為不得其實至謂鄭莊公以王命討不庭不貪其土以勞王爵為得正之體何其無識之甚哉鄭莊者當時諸侯之至姦黠者也為王卿士而際王室之衰遍視侯國如齊魯宋衛之君皆庸瑣不足以有為也於是奮其詐力隂有霸諸侯之志方宋人伐鄭圍長葛而取之鄭莊乃待之以不校豈真不校也哉正兵法所謂鷙鳥將擊必斂其翼當不校之時莫非深為計之日也故其始以祊田餌魯而魯輒附之因魯連齊而後用師于宋以泄已忿焉於王命乎何有既敗宋師而求逞其所大欲者未已也於是又取宋二邑以與魯掩人之有而為己惠既以報魯又將以終役魯爾其與晉文公分曹衛之田以賜宋人使之納賂於齊秦而藉以濟城濮之師者同一詭道也春秋方惡其譎而左氏乃以正之體稱之豈不悖哉然春秋不書鄭歸郜防而以魯自取為文者眀魯隱之貪也貪得於外而不知喪身之禍伏於蕭牆也秋宋人衛人入鄭宋人蔡人衛人伐戴鄭伯伐取之宋殤不懲其敗而興伐戴之師鄭莊必乘其敝而收取戴之利蓋成宋殤之禍者在好兵稔鄭莊之惡者在用譎冬十月壬午齊人鄭人入郕伐宋入郕入許皆鄭為謀主而書首齊者鄭推齊主兵也十有一年春滕侯薛侯來朝古者諸侯有因相見無私相朝何謂因相見古者諸侯旅見于京師與羣至于方嶽行役以王事而因得以相見也自周轍既東天子無巡守方嶽之事諸侯無朝覲京師之禮於是弱為强所制小為大所役而後有私相朝者矣如魯之類弱於齊晉則畏事齊晉而朝齊晉滕薛杞邾之類弱於魯則畏事魯而朝魯故春秋書諸侯來朝與公如他國者皆所以見其慢上行私非禮焉爾三傳妄以諸侯相朝為得禮而世儒多從之不知諸侯之職為天子守民社者也寧有天王在上而諸侯非奉王命而荒棄民社以朝事敵己之國哉夏公㑹鄭伯于時來秋七月壬午公及齊侯鄭伯入許冬十有一月壬辰公薨左氏載羽父請殺桓公將以求大宰公曰為其少故也吾將授之矣羽父懼反譖公於桓公而弒之蓋隱之禍隱之自取也夫天下之惡一也亂臣賊子譬諸蝮蛇無往而不螫也人望而疾之豈必其螫己哉隱有遜桓之志而翬請殺之絶人兄弟之親此其用謀何減蝮螫使隱公於此亟謀誅翬而遜國於桓則雖夷齊之讓無以加矣不知慮此而坐遭反噬故曰隱之禍隱之自取也蘇軾氏引秦氏論此謂李斯聞趙髙廢立之謀非其本意初懼䝉恬之奪其權故勉而聽髙使斯聞趙髙之言召百官陳六師而斬之其有德於扶蘇豈有既哉何䝉恬之足憂釋此不為而具五刑於市非下愚而何信矣隱之縱翬猶斯之聽髙也而皆不免焉故太史公曰為人君而不知春秋者前有讒而不見後有賊而不知此之謂也為內諱故不言弒眀臣子之義痛悼其君父而不忍言也然不曰薨于某寢某宫則弒自見矣其不書葬者公榖謂君弒賊不討不書葬非也蔡景許悼弒而賊未討皆書葬也蓋不書葬有二或仇人當國或國內亂不以禮葬之與在外之國方有變雖葬而不暇赴故不書爾隱之不書葬仇人當國不以禮葬之也是皆托其實而已矣春秋通說卷一
